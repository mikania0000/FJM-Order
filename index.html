        async function saveSystemSettings() {
            const checkboxes = document.querySelectorAll('.shop-checkbox:checked');
            const openedShops = Array.from(checkboxes).map(cb => cb.value);
            
            const data = {
                isOpen: document.getElementById('setIsOpen').checked,
                openedShops: openedShops,
                deadline: document.getElementById('setDeadline').value
            };
            
            showLoading('更新設定中...');
            const res = await apiCall('adminUpdateSystemSettings', data);
            if (res) { 
                showAlert(res); 
                silentReload();
            }
        }

        async function updateShopInfo() {
            const shop = document.getElementById('updateShopName').value;
            const imageUrl = document.getElementById('updateShopImg').value.trim();
            const phone = document.getElementById('updateShopPhone').value.trim();
            const shopExtra = document.getElementById('updateShopExtra').value.trim();
            
            if (!shop) return showAlert('請選擇店家');
            
            showLoading('更新店家資料中...');
            const res = await apiCall('adminUpdateShopInfo', { shop, imageUrl, phone, shopExtra });
            if (res) { 
                showAlert(res); 
                silentReload();
            }
        }

        function loadShopDataForUpdate(shopName) {
            if (!shopName) {
                document.getElementById('updateShopImg').value = '';
                document.getElementById('updateShopPhone').value = '';
                document.getElementById('updateShopExtra').value = '';
                return;
            }
            document.getElementById('updateShopImg').value = state.data.shopImages[shopName] || '';
            document.getElementById('updateShopPhone').value = state.data.shopPhones[shopName] || '';
            document.getElementById('updateShopExtra').value = state.data.shopExtraNames[shopName] || '';
        }

        async function overwriteShopMenu() {
            const shop = document.getElementById('overwriteShopName').value;
            const rawData = document.getElementById('overwriteShopMenuData').value.trim();
            
            if (!shop) return showAlert('請選擇要覆寫的店家！');
            if (!rawData) return showAlert('請貼上 Excel 菜單資料！');

            const rows = rawData.split('\n');
            const menuData = rows.map(row => row.split('\t').map(cell => cell.trim()));

            showLoading(`正在覆寫 ${shop} 的菜單...`);
            const res = await apiCall('adminOverwriteShopMenu', { shop, menuData });
            if (res) {
                showAlert(res);
                document.getElementById('overwriteShopMenuData').value = '';
                silentReload();
            }
        }

        async function addNewShop() {
            const shop = document.getElementById('newShopName').value.trim();
            const rawData = document.getElementById('newShopMenuData').value.trim();
            const imageUrl = document.getElementById('newShopImg').value.trim();
            const phone = document.getElementById('newShopPhone').value.trim();
            const shopExtra = document.getElementById('newShopExtra').value.trim();

            if (!shop) return showAlert('請輸入新店家的名稱！');
            if (!rawData) return showAlert('請在對應欄位貼上從 Excel 複製的菜單資料！');

            const rows = rawData.split('\n');
            const menuData = rows.map(row => row.split('\t').map(cell => cell.trim()));

            showLoading('皮客覓正在開墾新店家...');
            const res = await apiCall('adminAddShop', { shop, menuData, imageUrl, phone, shopExtra });
            if (res) {
                showAlert(res);
                loadInitialData(); 
            }
        }

        async function adminUpdatePopularity() {
            showLoading('正在掃描歷史紀錄計算人氣...');
            const res = await apiCall('adminUpdatePopularity');
            if (res) { 
                showAlert(res); 
                silentReload();
            }
        }

        function adminCloseAndArchive() {
            showConfirm('確定要執行日落打烊嗎？這將會把今日紀錄封存並關閉點餐。', async () => {
                showLoading('皮客覓正在封存物資紀錄...');
                const res = await apiCall('adminCloseAndArchive');
                if (res) { showAlert(res); loadInitialData(); }
            });
        }

        function openQrModal(event) {
            if(event) {
                event.preventDefault(); 
                event.stopPropagation();
            }

            const baseUrl = window.location.href.split('?')[0];
            const shareUrl = `${baseUrl}?guest=1`;
            document.getElementById('shareUrlInput').value = shareUrl;

            new QRious({
                element: document.getElementById('qrCodeCanvas'),
                value: shareUrl,
                size: 250,
                background: 'white',
                foreground: '#0f172a',
                level: 'H'
            });

            const modal = document.getElementById('qrModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeQrModal() {
            const modal = document.getElementById('qrModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function copyShareUrl() {
            const input = document.getElementById('shareUrlInput');
            input.select();
            input.setSelectionRange(0, 99999);
            document.execCommand('copy');
            showAlert('已經成功複製專屬報到連結！');
        }

        let currentImgWidth = 100;
        
        function zoomImg(delta) {
            currentImgWidth += delta;
            if (currentImgWidth < 50) currentImgWidth = 50;
            if (currentImgWidth > 400) currentImgWidth = 400;
            
            const img = document.getElementById('lightbox-img');
            img.style.width = `${currentImgWidth}%`;
            img.style.minWidth = `${currentImgWidth}%`;
            document.getElementById('zoom-level').textContent = `${currentImgWidth}%`;
        }

        function openLightbox(url) {
            currentImgWidth = window.innerWidth > 768 ? 100 : 120;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            
            img.src = url;
            img.style.width = `${currentImgWidth}%`;
            img.style.minWidth = `${currentImgWidth}%`;
            document.getElementById('zoom-level').textContent = `${currentImgWidth}%`;
            
            lightbox.classList.remove('hidden');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
        }
    </script>
</body>
