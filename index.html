<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>皮客覓 PickMeal - 專屬點餐小幫手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Panzoom 套件 (用於圖片縮放) -->
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>
    <style>
        html { font-size: 16px; }
        body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background-color: #F4F7F6; color: #333; }
        
        /* 皮客覓專屬品牌色系 (星巴克綠基底 + 皮克敏三原色點綴) */
        :root {
            --brand-color: #006241;
            --brand-light: #E8F5E9;
            --pik-red: #E53935;
            --pik-yellow: #FDD835;
            --pik-blue: #1E88E5;
        }
        .bg-brand { background-color: var(--brand-color); }
        .text-brand { color: var(--brand-color); }
        .border-brand { border-color: var(--brand-color); }
        .bg-brand-light { background-color: var(--brand-light); }
        
        .card { 
            background-color: white; border-radius: 1.25rem; padding: 1.25rem; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); 
            border: 1px solid #edf2f7; transition: all 0.2s ease; 
        }
        .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); transform: translateY(-2px); }
        
        .btn-primary { 
            background-color: var(--brand-color); color: white; font-weight: 900; 
            padding: 1rem 1.5rem; border-radius: 9999px; box-shadow: 0 4px 6px rgba(0, 98, 65, 0.2); 
            transition: all 0.2s; font-size: 1.125rem; width: 100%; display: flex; justify-content: center; align-items: center; gap: 0.5rem; border: none; cursor: pointer;
        }
        .btn-primary:hover { background-color: #004d33; transform: translateY(-1px); box-shadow: 0 6px 8px rgba(0, 98, 65, 0.3); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { background-color: #9ca3af; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .btn-secondary { 
            background-color: #f3f4f6; color: #4b5563; font-weight: bold; 
            padding: 1rem 1.5rem; border-radius: 9999px; transition: all 0.2s; font-size: 1.125rem; width: 100%; border: none; cursor: pointer;
        }
        .btn-secondary:hover { background-color: #e5e7eb; color: #1f2937; }
        .btn-secondary:active { transform: scale(0.97); }
        
        input, select, textarea { 
            font-size: 16px !important; border-radius: 1rem; border: 2px solid #e5e7eb; 
            padding: 1rem; width: 100%; outline: none; transition: all 0.2s;
            box-sizing: border-box; background-color: #f9fafb; font-weight: 600; color: #374151;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--brand-color); background-color: white; box-shadow: 0 0 0 4px rgba(0, 98, 65, 0.1); 
        }

        /* 盆栽小綠芽發芽動畫 */
        @keyframes sprout-grow {
            0% { transform: scaleY(0) translateY(10px); opacity: 0; }
            50% { transform: scaleY(1.2) translateY(-2px); opacity: 1; }
            100% { transform: scaleY(1) translateY(0); opacity: 1; }
        }
        .animate-sprout { transform-origin: bottom center; animation: sprout-grow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        .animate-sway { animation: sway 2s infinite ease-in-out; transform-origin: bottom center; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)) !important; }
        }

        /* 菜單手風琴動畫 */
        .accordion-content { overflow: hidden; transition: max-height 0.3s ease-in-out; max-height: 0; }
        .accordion-content.expanded { max-height: 2000px; }
        .accordion-icon { transition: transform 0.3s ease; }
        .expanded .accordion-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="antialiased pb-24 selection:bg-brand-light selection:text-brand">

    <div id="app" class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#F4F7F6] overflow-hidden flex flex-col">
        
        <!-- 全域 Loading 遮罩 (盆栽培育版) -->
        <div id="loader" class="fixed inset-0 bg-white/95 backdrop-blur-sm z-[100] flex flex-col items-center justify-center hidden">
            <div class="relative w-32 h-32 flex items-center justify-center mb-4">
                <!-- 盆栽底座 -->
                <div class="absolute bottom-0 w-16 h-12 bg-brand rounded-b-2xl rounded-t-lg z-10 border-4 border-[#004d33]">
                    <div class="w-full h-3 bg-[#004d33] rounded-t-sm opacity-50"></div>
                </div>
                <!-- 小綠芽 -->
                <svg class="w-12 h-12 text-green-500 absolute bottom-8 z-0 animate-sway" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C7 2 4 6 4 10c0 2.5 1 4.5 2.5 6.5C8 18.5 11 22 12 22c1 0 4-3.5 5.5-5.5C19 14.5 20 12.5 20 10c0-4-3-8-8-8zm0 18c-1-1.5-3-4-4-5.5C6.5 13 6 11.5 6 10c0-3 2-6 6-6s6 3 6 6c0 1.5-.5 3-2 4.5-1 1.5-3 4-4 5.5z"/>
                    <path fill="#fff" d="M10 9a1 1 0 100-2 1 1 0 000 2zm4 0a1 1 0 100-2 1 1 0 000 2z"/>
                </svg>
            </div>
            <p class="text-brand font-black text-xl animate-pulse" id="loaderText">皮客覓正在培育餐點中...</p>
        </div>

        <!-- 自訂對話框 Modal -->
        <div id="alertModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm transform scale-95 transition-transform duration-300 shadow-2xl">
                <div class="w-12 h-12 bg-brand-light text-brand rounded-full flex items-center justify-center mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 id="alertTitle" class="text-2xl font-black mb-3 text-gray-800 tracking-tight">提示</h3>
                <p id="alertMessage" class="text-gray-500 text-lg mb-8 leading-relaxed font-medium"></p>
                <div class="flex gap-3" id="alertButtons">
                    <button onclick="closeAlert()" class="btn-primary" id="alertBtnOk">確定</button>
                </div>
            </div>
        </div>

        <!-- 圖片放大燈箱 Lightbox (Panzoom) -->
        <div id="lightbox" class="fixed inset-0 bg-black/95 z-[110] flex items-center justify-center hidden flex-col">
            <div class="absolute top-4 right-4 z-50">
                <button onclick="closeLightbox()" class="text-white bg-gray-800/80 hover:bg-gray-700 rounded-full w-12 h-12 flex items-center justify-center text-xl font-bold backdrop-blur">✕</button>
            </div>
            <div class="absolute bottom-8 text-white/60 text-sm font-bold bg-black/50 px-4 py-2 rounded-full pointer-events-none">
                支援雙指縮放、滑鼠滾輪與拖曳
            </div>
            <!-- Panzoom 容器 -->
            <div id="panzoom-container" class="w-full h-full flex items-center justify-center overflow-hidden">
                <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain cursor-move" alt="菜單大圖">
            </div>
        </div>

        <div id="viewLogin" class="p-8 flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-brand-light to-[#F4F7F6]">
            <!-- 盆栽 Logo 區塊 -->
            <div class="relative w-32 h-32 mb-4">
                <div class="absolute inset-0 bg-white rounded-3xl shadow-xl transform rotate-3 flex items-center justify-center border-4 border-brand"></div>
                <div class="absolute inset-0 bg-brand text-white rounded-3xl shadow-xl transform -rotate-3 flex flex-col items-center justify-center">
                     <svg class="w-12 h-12 mb-1 animate-sway" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                     <div class="w-16 h-8 bg-white/20 rounded-t-lg border-b-4 border-white/40 flex items-end justify-center pb-1">
                         <div class="w-2 h-2 bg-white rounded-full mx-1"></div>
                         <div class="w-2 h-2 bg-white rounded-full mx-1"></div>
                     </div>
                </div>
            </div>

            <!-- 精緻文字排版 -->
            <div class="text-center mb-10">
                <h1 class="text-5xl font-black text-gray-800 tracking-tight mb-1">皮客覓</h1>
                <h2 class="text-xl font-bold tracking-[0.3em] text-brand uppercase">PickMeal</h2>
            </div>
            
            <div class="w-full space-y-5 bg-white p-8 rounded-[2rem] shadow-lg border border-gray-100">
                <div>
                    <label class="block text-gray-500 text-sm font-bold mb-2 ml-1">探險家帳號</label>
                    <input type="text" id="loginUser" placeholder="請輸入帳號">
                </div>
                <div>
                    <label class="block text-gray-500 text-sm font-bold mb-2 ml-1">通關密碼</label>
                    <input type="password" id="loginPass" placeholder="請輸入密碼">
                </div>
                <div>
                    <label class="block text-gray-500 text-sm font-bold mb-2 ml-1">稱呼 <span class="text-xs font-normal opacity-70">(選填)</span></label>
                    <input type="text" id="loginName" placeholder="您希望皮克敏怎麼稱呼您？">
                </div>
                <button onclick="doLogin()" class="btn-primary mt-8">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                    登入基地
                </button>
            </div>
        </div>

        <div id="viewMain" class="hidden flex-col h-screen">
            <header class="bg-brand text-white pt-6 pb-5 px-6 rounded-b-[2rem] shadow-lg z-20 shrink-0">
                <div class="flex justify-between items-start">
                    <div id="greetingText" class="leading-tight flex-1">
                        <!-- 動態問候語 -->
                    </div>
                    <button onclick="logout()" class="bg-white/10 hover:bg-white/20 rounded-full p-2.5 transition flex items-center justify-center shrink-0 ml-4 border border-white/10 backdrop-blur-sm">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>

            <!-- 內容區 (滾動區域) -->
            <main id="mainContent" class="flex-1 overflow-y-auto p-4 pb-10"></main>

            <nav class="bg-white/90 backdrop-blur-md border-t border-gray-200 fixed bottom-0 w-full max-w-md flex justify-around pb-safe pt-2 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-40 shrink-0">
                <button onclick="switchTab('menu')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition relative group" id="nav-menu">
                    <div class="absolute inset-0 bg-brand-light opacity-0 group-hover:opacity-100 rounded-xl transition-opacity z-[-1] scale-90"></div>
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <span class="text-[11px] font-black uppercase tracking-wide">尋覓物資</span>
                </button>
                <button onclick="switchTab('cart')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand relative transition group" id="nav-cart">
                    <div class="absolute inset-0 bg-brand-light opacity-0 group-hover:opacity-100 rounded-xl transition-opacity z-[-1] scale-90"></div>
                    <span id="cartBadge" class="absolute top-1 right-[25%] bg-[var(--pik-red)] text-white text-[10px] font-black rounded-full min-w-[20px] h-5 flex items-center justify-center hidden shadow-md px-1 border-2 border-white">0</span>
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="text-[11px] font-black uppercase tracking-wide">物資背包</span>
                </button>
                <button onclick="switchTab('orders')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition group" id="nav-orders">
                    <div class="absolute inset-0 bg-brand-light opacity-0 group-hover:opacity-100 rounded-xl transition-opacity z-[-1] scale-90"></div>
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    <span class="text-[11px] font-black uppercase tracking-wide">我的探險</span>
                </button>
                <button onclick="switchTab('admin')" class="hidden flex-col items-center p-2 w-full text-gray-400 hover:text-[var(--pik-blue)] transition group" id="nav-admin">
                    <div class="absolute inset-0 bg-blue-50 opacity-0 group-hover:opacity-100 rounded-xl transition-opacity z-[-1] scale-90"></div>
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="text-[11px] font-black uppercase tracking-wide">指揮官室</span>
                </button>
            </nav>
        </div>

        <div id="configModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] flex items-end justify-center hidden opacity-0 transition-opacity">
            <div class="bg-white w-full max-w-md rounded-t-[2rem] p-6 pb-safe transform translate-y-full transition-transform duration-300 shadow-[0_-10px_30px_rgba(0,0,0,0.15)] flex flex-col max-h-[90vh]" id="configModalContent">
                
                <div class="flex justify-between items-start mb-4 shrink-0 relative">
                    <div class="w-12 h-1.5 bg-gray-200 rounded-full absolute -top-3 left-1/2 transform -translate-x-1/2"></div>
                    <div class="pr-10">
                        <h3 class="text-2xl font-black text-gray-800 tracking-tight leading-tight" id="cfgName">品項名稱</h3>
                        <p class="text-brand font-black text-xl mt-1.5" id="cfgPriceBase">$0</p>
                    </div>
                    <button onclick="closeConfig()" class="bg-gray-100 rounded-full p-2.5 text-gray-500 hover:bg-gray-200 transition shrink-0 absolute right-0 top-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <!-- 選項捲動區 -->
                <div id="cfgOptions" class="space-y-6 overflow-y-auto no-scrollbar flex-1 pb-4 min-h-[30vh]">
                    <!-- 動態選項產生區 -->
                </div>

                <!-- 底部操作區 -->
                <div class="mt-4 pt-4 border-t border-gray-100 flex items-center gap-4 shrink-0 bg-white">
                    <div class="flex items-center bg-gray-50 border border-gray-200 rounded-[1.25rem] p-1">
                        <button onclick="adjQty(-1)" class="w-12 h-12 rounded-xl text-gray-500 hover:bg-white hover:shadow-sm text-2xl font-bold transition flex items-center justify-center active:scale-90">−</button>
                        <span id="cfgQty" class="w-10 text-center text-xl font-black text-gray-800">1</span>
                        <button onclick="adjQty(1)" class="w-12 h-12 rounded-xl text-brand hover:bg-white hover:shadow-sm text-2xl font-bold transition flex items-center justify-center active:scale-90">+</button>
                    </div>
                    <button onclick="confirmAddToCart()" class="btn-primary flex-1 py-4 text-xl justify-between px-6 shadow-[0_4px_15px_rgba(0,98,65,0.25)]">
                        <span>放入背包</span>
                        <span id="cfgTotal" class="font-black bg-white/20 px-3 py-1 rounded-lg tracking-wider">$0</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🚨 替換成您的最新 Google Apps Script 網址
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyI7t1pS-fQvFkZzUfS9eRz_jECAKj02QWp32YI3B11w7dF1V_41aRIfYc8Ym_E689Ciw/exec';
        
        let state = {
            user: null,
            token: localStorage.getItem('sessionToken'),
            system: { isOpen: false, openedShops: [], deadline: '' },
            allShops: [], 
            menuData: {},
            shopImages: {},
            shopPhones: {},
            userOrders: [],
            cart: [],
            currentTab: 'menu',
            activeShop: '',
            tempItem: null, 
            proxyName: '' // 指揮官代點姓名
        };

        let pzInstance = null; 
        let pzWheelHandler = null; 

        // --- UI 工具 ---
        function showLoading(text = '皮客覓培育中...') {
            document.getElementById('loaderText').innerText = text;
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            // 重置動畫
            const sprout = loader.querySelector('svg');
            sprout.classList.remove('animate-sprout');
            void sprout.offsetWidth; 
            sprout.classList.add('animate-sprout');
        }
        function hideLoading() {
            document.getElementById('loader').classList.add('hidden');
        }
        
        function showAlert(msg, title = '系統提示', buttons = [{text: '確定', primary: true, action: 'closeAlert()'}]) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerHTML = msg;
            
            const btnContainer = document.getElementById('alertButtons');
            btnContainer.innerHTML = '';
            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.className = b.primary ? 'btn-primary flex-1' : 'btn-secondary flex-1';
                btn.innerText = b.text;
                if(!b.primary) btn.style.color = '#374151';
                btn.onclick = () => { eval(b.action); };
                btnContainer.appendChild(btn);
            });

            const modal = document.getElementById('alertModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95');
            }, 10);
        }

        function closeAlert() {
            const modal = document.getElementById('alertModal');
            modal.classList.add('opacity-0');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function showLightbox(url) {
            if(!url) return showAlert('指揮官尚未上傳這家店的菜單圖片。', '查無資源');
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const container = document.getElementById('panzoom-container');
            
            img.src = url;
            lightbox.classList.remove('hidden');

            setTimeout(() => {
                if (pzInstance) pzInstance.destroy();
                pzInstance = Panzoom(img, {
                    maxScale: 6, 
                    minScale: 0.1, // 允許縮得更小
                    contain: 'outside', 
                    step: 0.3,
                    cursor: 'move'
                });
                
                if (pzWheelHandler) {
                    container.removeEventListener('wheel', pzWheelHandler);
                }
                // 綁定滑鼠滾輪縮放
                pzWheelHandler = function(event) {
                    // 防止頁面跟著捲動
                    event.preventDefault();
                    pzInstance.zoomWithWheel(event);
                };
                container.addEventListener('wheel', pzWheelHandler, { passive: false });
            }, 100);
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
            document.getElementById('lightboxImg').src = '';
            if(pzInstance) {
                pzInstance.reset();
            }
        }

        // --- 空狀態 (Empty State) 產生器 ---
        function getEmptyStateHtml(message, iconSvg) {
            return `
            <div class="flex flex-col items-center justify-center h-72 text-gray-400 mt-8">
                <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-6 shadow-sm border-4 border-brand-light relative">
                    ${iconSvg}
                    <div class="absolute -bottom-2 w-16 h-4 bg-gray-200 rounded-[100%] opacity-50 filter blur-sm"></div>
                </div>
                <p class="text-xl font-black text-gray-500">${message}</p>
            </div>`;
        }

        async function apiCall(action, data = {}) {
            try {
                // 修正 CORS 錯誤的關鍵：不傳 headers, 使用 text/plain (GAS 預設接受), redirect follow
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    body: JSON.stringify({ action, token: state.token, data })
                });
                const res = await response.json();
                if (res.status === 'error') {
                    if (res.message.includes('過期')) logout();
                    throw new Error(res.message);
                }
                return res.data;
            } catch (error) {
                console.error('API Error:', error);
                showAlert(error.message || '無法連接到伺服器，請檢查網路狀態。', '連線中斷');
                return null;
            }
        }

        // --- 核心邏輯 ---
        function checkIsPastDeadline() {
            if (!state.system.deadline) return false;
            const now = new Date();
            const [hours, minutes] = state.system.deadline.split(':').map(Number);
            const deadlineDate = new Date();
            deadlineDate.setHours(hours, minutes, 0, 0);
            return now > deadlineDate;
        }

        async function init() {
            if (state.token) {
                showLoading('正在集結皮客覓小隊...');
                const initialData = await apiCall('getInitialData');
                hideLoading();
                if (initialData) {
                    const savedUser = JSON.parse(localStorage.getItem('userMeta'));
                    if(savedUser) {
                        state.user = savedUser;
                        applyInitialData(initialData);
                        renderApp();
                    } else {
                        logout();
                    }
                }
            }
        }

        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const name = document.getElementById('loginName').value.trim();
            
            if (!username || !password) return showAlert('請輸入完整的帳號與通關密碼。', '資料不全');
            
            showLoading('驗證探險家身分中...');
            const res = await apiCall('login', { username, password, name });
            hideLoading();
            
            if (res) {
                state.token = res.token;
                state.user = res.user;
                localStorage.setItem('sessionToken', res.token);
                localStorage.setItem('userMeta', JSON.stringify(res.user));
                applyInitialData(res.initialData);
                renderApp();
            }
        }

        function logout() {
            localStorage.removeItem('sessionToken');
            localStorage.removeItem('userMeta');
            location.reload();
        }

        function applyInitialData(data) {
            state.system = data.systemStatus;
            state.allShops = data.allShops || []; 
            state.menuData = data.menuData;
            state.shopImages = data.shopImages;
            state.shopPhones = data.shopPhones || {};
            state.userOrders = data.userOrders;
            
            if(state.system.openedShops.length > 0 && !state.system.openedShops.includes(state.activeShop)) {

            }
        }

        // 輔助函式：解析加價字串 (例如：可樂(大)+5 或 +$6換麻辣麵線)
        function parseOptionString(str) {
            if (!str) return [];
            return String(str).split('/').map(opt => {
                let name = opt.trim();
                let price = 0;
                // 正則匹配 +$數字 或 +數字
                const match = name.match(/\+\$?\s*(\d+)/);
                if (match) {
                    price = parseInt(match[1], 10);
                    // 從原本的名字中移除加價字串，保持乾淨
                    name = name.replace(match[0], '').trim();
                }
                return { label: name, price: price, original: opt.trim() };
            });
        }

            // 初始化暫存物件
            state.tempItem = {
                shop: state.activeShop,
                name: item['品項'],
                basePrice: 0, 
                selectedSizeName: '',
                selections: {}, 
                quantity: 1,
                name_override: state.proxyName || '' 
            };

            document.getElementById('cfgName').innerText = state.tempItem.name;
            document.getElementById('cfgQty').innerText = '1';
            
            const cfgOptions = document.getElementById('cfgOptions');
            let optionsHtml = '';

            // 定義排除欄位 (剩餘的就是尺寸/基本價位選項)
            const excludeKeys = ['類別', '品項', '單價', '甜度選項', '冰塊選項', '口味與客製化', '附餐飲料', '_originalIndex'];
            const sizeKeys = Object.keys(item).filter(k => !excludeKeys.includes(k) && item[k] !== '');

            // 1. 基本定價邏輯 (判斷是單一價格還是分尺寸)
            if (item['單價'] && item['單價'] !== '') {
                // 單一價格模式 (如丹丹、梁社漢)
                state.tempItem.basePrice = parseInt(item['單價'], 10) || 0;
                state.tempItem.selectedSizeName = ''; // 不特別顯示尺寸
            } else if (sizeKeys.length > 0) {
                // 多尺寸模式 (如50嵐、麻古)
                const sizeOpts = sizeKeys.map(k => ({ label: k, price: parseInt(item[k], 10) || 0 }));
                optionsHtml += buildRadioGroup('選擇規格', 'size', sizeOpts);

                state.tempItem.basePrice = sizeOpts[0].price;

                state.tempItem.basePrice = 0; // 容錯

                const parsed = parseOptionString(item['甜度選項']);
                optionsHtml += buildRadioGroup('甜度', 'sweet', parsed);
                state.tempItem.selections['sweet'] = parsed[0].label;

                state.tempItem.selections['sweet'] = '甜度固定';
            }

            // 3. 冰塊選項
            if (item['冰塊選項'] && !item['冰塊選項'].includes('固定')) {
                const parsed = parseOptionString(item['冰塊選項']);
                optionsHtml += buildRadioGroup('溫度/冰塊', 'ice', parsed);
                state.tempItem.selections['ice'] = parsed[0].label;
            } else if (item['冰塊選項'] && item['冰塊選項'].includes('固定')) {
                state.tempItem.selections['ice'] = item['冰塊選項'];
            }

            // 4. 客製化選擇 (口味、飯麵切換等)
            if (item['口味與客製化']) {
                 const parsed = parseOptionString(item['口味與客製化']);
                 optionsHtml += buildRadioGroup('客製化選擇', 'custom', parsed);
                 state.tempItem.selections['custom'] = parsed[0].label;
                 state.tempItem._customPrice = parsed[0].price || 0;
            }

            // 5. 附餐飲料 (渲染成下拉選單，並格式化文字)
            if (item['附餐飲料']) {
                const parsed = parseOptionString(item['附餐飲料']);
                
                optionsHtml += `
                <div class="bg-gray-50/80 p-5 rounded-[1.5rem] border border-gray-200">
                    <h5 class="font-black text-gray-800 text-lg mb-3 flex items-center gap-2">

                                return `<option value="${i}">${p.label}${priceText}</option>`;

                state.tempItem._drinkPrice = parsed[0].price || 0;

            cfgOptions.innerHTML = optionsHtml;

                document.getElementById('configModalContent').classList.remove('translate-y-full');
            }, 10);
        }

        function buildRadioGroup(title, groupName, options) {
            let html = `
            <div class="mb-2">
                <h5 class="font-black text-gray-800 text-lg mb-3 flex items-center gap-2">
                    <span class="w-2 h-2 bg-brand rounded-full"></span>
                    ${title}
                </h5>
                <div class="flex flex-wrap gap-2.5">`;
            options.forEach((opt, idx) => {
                const checked = idx === 0 ? 'bg-brand text-white border-brand shadow-md' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300';
                const priceTxt = opt.price ? `<span class="text-sm font-bold opacity-80 ml-1 bg-black/10 px-1.5 py-0.5 rounded">+$${opt.price}</span>` : '';
                html += `
                <button id="btn-${groupName}-${idx}" 
                    onclick="updateCfgSelection('${groupName}', ${idx}, '${opt.label}', ${opt.price||0}, ${options.length})"
                    class="border-2 rounded-xl px-4 py-2 font-bold text-base transition-all active:scale-95 flex items-center justify-center ${checked}">
                    ${opt.label} ${priceTxt}
                </button>`;
            });
            html += `</div></div>`;
            return html;
        }

        function updateCfgSelection(group, idx, label, price, totalOpts) {
            if (group === 'drink') {
                const opt = state.tempItem._drinkOptions[idx];
                state.tempItem.selections['drink'] = opt.label;
                state.tempItem._drinkPrice = opt.price || 0;
            } else {
                for(let i=0; i<totalOpts; i++){
                    const btn = document.getElementById(`btn-${group}-${i}`);
                    if(btn) {
                        btn.classList.remove('bg-brand', 'text-white', 'border-brand', 'shadow-md');
                        btn.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
                    }
                }
                const activeBtn = document.getElementById(`btn-${group}-${idx}`);
                activeBtn.classList.add('bg-brand', 'text-white', 'border-brand', 'shadow-md');
                activeBtn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');

                if (group === 'size') {
                    state.tempItem.selectedSizeName = label;
                    state.tempItem.basePrice = price;
                } else {
                    state.tempItem.selections[group] = label;
                    if(group === 'custom') state.tempItem._customPrice = price || 0;
                }
            }
            updateCfgTotal();
        }

        function adjQty(delta) {
            state.tempItem.quantity += delta;
            if (state.tempItem.quantity < 1) state.tempItem.quantity = 1;
            document.getElementById('cfgQty').innerText = state.tempItem.quantity;
            updateCfgTotal();
        }

        function updateCfgTotal() {
            let unitPrice = state.tempItem.basePrice 
                          + (state.tempItem._drinkPrice || 0)
                          + (state.tempItem._customPrice || 0);
            
            let total = unitPrice * state.tempItem.quantity;
            document.getElementById('cfgPriceBase').innerText = `$${unitPrice}`;
            document.getElementById('cfgTotal').innerText = `$${total}`;
        }

        function closeConfig() {
            const modal = document.getElementById('configModal');
            document.getElementById('configModalContent').classList.add('translate-y-full');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function confirmAddToCart() {
            let specArr = [];
            if(state.tempItem.selectedSizeName) specArr.push(state.tempItem.selectedSizeName);
            if(state.tempItem.selections.sweet && state.tempItem.selections.sweet !== '甜度固定') specArr.push(state.tempItem.selections.sweet);
            if(state.tempItem.selections.ice && !state.tempItem.selections.ice.includes('固定')) specArr.push(state.tempItem.selections.ice);
            if(state.tempItem.selections.custom) specArr.push(state.tempItem.selections.custom);
            if(state.tempItem.selections.drink) specArr.push(`附: ${state.tempItem.selections.drink}`);

            let unitPrice = state.tempItem.basePrice 
                          + (state.tempItem._drinkPrice || 0)
                          + (state.tempItem._customPrice || 0);

            const cartItem = {
                shop: state.tempItem.shop,
                name: state.tempItem.name,
                spec: specArr.join(' / '),
                price: unitPrice,
                quantity: state.tempItem.quantity,
                name_override: state.tempItem.name_override
            };

            state.cart.push(cartItem);
            updateCartBadge();
            closeConfig();
            
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (state.cart.length > 0) {
                badge.innerText = state.cart.length;
                badge.classList.remove('hidden');
                badge.classList.add('animate-bounce');
                setTimeout(()=>badge.classList.remove('animate-bounce'), 1000);
            } else {
                badge.classList.add('hidden');
            }
        }

        async function saveAdminSettings(isOpen) {
            const checkboxes = document.querySelectorAll('.shop-checkbox');
            const selectedShops = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            const deadline = document.getElementById('adminDeadline').value;
            
            showLoading('寫入任務設定中...');
            const res = await apiCall('adminUpdateSystemSettings', { isOpen, openedShops: selectedShops, deadline });
            if (res) {
                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                hideLoading();
                showAlert(`系統已切換為：<b>${isOpen ? '任務進行中' : '停止任務'}</b>`, '設定成功');
                renderAdminTab(document.getElementById('mainContent'));
            } else {
                hideLoading();
            }
        }

        function advShopChanged() {
            const shop = document.getElementById('advShopSelect').value;
            document.getElementById('advImageUrl').value = shop && state.shopImages[shop] ? state.shopImages[shop] : '';
            document.getElementById('advPhone').value = shop && state.shopPhones[shop] ? state.shopPhones[shop] : '';
        }

        async function executeInfoUpdate() {
            const shop = document.getElementById('advShopSelect').value;
            const imageUrl = document.getElementById('advImageUrl').value.trim();
            const phone = document.getElementById('advPhone').value.trim();
            if(!shop) return showAlert('請先選擇要維護的店家。', '資料缺失');
            
            showLoading('上傳情報中...');
            const res = await apiCall('adminUpdateShopInfo', { shop, imageUrl, phone });
            hideLoading();
            if(res) {
                state.shopImages[shop] = imageUrl; 
                state.shopPhones[shop] = phone;
                showAlert(res, '更新成功');
            }
        }

                    const shopData = data.summaryByShop[shop];
                    const phone = state.shopPhones[shop] || '';
                    const phoneBtn = phone ? `<a href="tel:${phone}" class="ml-auto text-sm font-bold text-white bg-[var(--pik-yellow)] hover:bg-yellow-500 px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-sm transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>${phone}</a>` : '';

                    html += `<div class="bg-white mb-6 rounded-[2rem] border border-gray-200 overflow-hidden shadow-sm">
                                <div class="bg-gray-800 p-4 flex items-center gap-3">
                                    <h4 class="font-black text-xl text-white tracking-wide">${shop}</h4>
                                    ${phoneBtn}
                                </div>
                                <div class="p-2">
                                    <ul class="divide-y divide-gray-100">`;
                    
                    for (const itemName in shopData.items) {
                        const itemInfo = shopData.items[itemName];
                        html += `       <li class="p-3">
                                            <p class="font-bold text-lg text-gray-800 leading-tight mb-2">${itemName}</p>
                                            <div class="flex justify-between items-center bg-gray-50 rounded-lg p-2 px-3 border border-gray-100">
                                                <span class="text-sm font-bold text-gray-500">共 <span class="text-xl text-gray-800 mx-1">${itemInfo.count}</span> 份</span>
                                                <span class="font-black text-lg text-brand">$${itemInfo.subtotal}</span>
                                            </div>
                                        </li>`;
                    }
                    
                    html += `       </ul>
                                </div>
                                <div class="bg-brand-light/50 p-4 border-t border-brand-light flex justify-between items-end">
                                    <span class="text-brand font-bold text-sm uppercase tracking-widest">此店家總結算</span>
                                    <span class="text-3xl font-black text-brand">$${shopData.totalRevenue}</span>
                                </div>
                            </div>`;
                }
            }
            document.getElementById('mainContent').innerHTML = html;
        }

        async function openDistributeDash() {
            showLoading('整理發餐核銷檯...');
            const data = await apiCall('adminGetTodayData');
            hideLoading();
            if(!data) return;

            let html = `
            <div class="mb-6 flex items-center justify-between sticky top-0 bg-[#F4F7F6]/90 backdrop-blur pb-2 z-10 pt-2 -mt-2">
                <button onclick="switchTab('admin')" class="text-gray-500 font-bold flex items-center bg-white border border-gray-200 px-3 py-1.5 rounded-full hover:bg-gray-50 transition active:scale-95 shadow-sm">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg> 返回
                </button>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">發餐核銷檯</h2>
            </div>`;

            if (data.summaryByUser.length === 0) {
                 html += getEmptyStateHtml('今日尚未接獲任何物資需求', `<svg class="w-16 h-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`);
            } else {
                let totalExpected = 0;
                
                data.summaryByUser.forEach(user => {
                    totalExpected += user.total;
                    const allPaid = user.orders.every(o => o['繳費情形'] === '已繳費' || o['繳費狀態'] === '已繳費');
                    const allTaken = user.orders.every(o => o['取餐情形'] === '已取餐' || o['取餐狀態'] === '已取餐');
                    const cardBg = (allPaid && allTaken) ? 'bg-gray-100 border-gray-200 opacity-60' : 'bg-white border-brand/20';
                    
                    html += `
                    <div class="mb-5 rounded-[2rem] border-2 ${cardBg} overflow-hidden shadow-sm transition-all duration-300">
                        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <h3 class="text-xl font-black text-gray-800 flex items-center gap-2">
                                <div class="w-8 h-8 bg-brand-light text-brand rounded-full flex items-center justify-center text-sm">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                                </div>
                                ${user.name}
                            </h3>
                            <span class="text-2xl font-black text-brand">$${user.total}</span>
                        </div>
                        <div class="p-2 space-y-2">`;
                    
                    user.orders.forEach(order => {
                        const id = order['訂單編號'];
                        const isPaid = order['繳費情形'] === '已繳費' || order['繳費狀態'] === '已繳費';
                        const isTaken = order['取餐情形'] === '已取餐' || order['取餐狀態'] === '已取餐';
                        
                        // 獨立按鈕樣式
                        const payBtn = isPaid 
                            ? `<button onclick="updateSingleStatus('${id}', 'pay', '未繳費')" class="flex-1 py-2 rounded-xl text-sm font-bold bg-green-100 text-green-700 border border-green-200 shadow-inner active:scale-95 transition">已付款</button>`
                            : `<button onclick="updateSingleStatus('${id}', 'pay', '已繳費')" class="flex-1 py-2 rounded-xl text-sm font-bold bg-white text-gray-500 border-2 border-gray-200 hover:border-green-400 hover:text-green-600 shadow-sm active:scale-95 transition">收錢</button>`;
                            
                        const takeBtn = isTaken
                            ? `<button onclick="updateSingleStatus('${id}', 'take', '未取餐')" class="flex-1 py-2 rounded-xl text-sm font-bold bg-blue-100 text-[var(--pik-blue)] border border-blue-200 shadow-inner active:scale-95 transition">已領取</button>`
                            : `<button onclick="updateSingleStatus('${id}', 'take', '已取餐')" class="flex-1 py-2 rounded-xl text-sm font-bold bg-white text-gray-500 border-2 border-gray-200 hover:border-blue-400 hover:text-blue-600 shadow-sm active:scale-95 transition">給餐</button>`;

                        html += `
                            <div class="p-3 bg-white rounded-xl border border-gray-100 shadow-sm">
                                <p class="text-xs font-black text-white bg-gray-400 px-2 py-0.5 rounded inline-block mb-1">${order['店家']}</p>
                                <div class="flex justify-between items-start mb-2">
                                    <p class="font-bold text-gray-800 leading-snug pr-2">${order['品項']} <span class="text-gray-400 text-xs font-medium block mt-0.5">${order['規格'] || order['訂購內容']}</span></p>
                                    <span class="font-black text-lg text-gray-700 shrink-0 bg-gray-100 px-2 py-0.5 rounded-lg">x${order['數量']}</span>
                                </div>
                                <div class="flex gap-2 mt-3 border-t border-gray-50 pt-3">
                                    ${payBtn}
                                    ${takeBtn}
                                </div>
                            </div>`;
                    });

                    html += `   </div>
                    </div>`;
                });
                
                html += `
                <div class="mt-8 mb-20 text-right bg-white p-6 rounded-[2rem] shadow-sm border border-gray-200">
                    <p class="text-gray-400 text-sm font-bold mb-1 uppercase tracking-widest">今日全團預計收入</p>
                    <p class="text-5xl font-black text-gray-800">$${totalExpected}</p>
                </div>`;
            }
            document.getElementById('mainContent').innerHTML = html;
        }

        async function updateSingleStatus(orderId, type, status) {
            // 由於是單項更新，不顯示全螢幕 loading，改用輕量提示或直接更新
            if (navigator.vibrate) navigator.vibrate(20);
            
            // 這裡暫時顯示 loading 確保資料一致，若嫌慢後續可改為 optimistic UI
            showLoading('更新狀態...'); 
            const res = await apiCall('adminUpdateStatus', { orderIds: [orderId], type, status });
            if (res) {
                openDistributeDash(); // 重新渲染發餐檯
            } else {
                hideLoading();
            }
        }

        async function confirmCloseAll() {
            showAlert('<span class="text-[var(--pik-red)] font-black text-xl mb-2 block">日落歸巢確認</span>確定要關閉點餐，並將今日所有物資紀錄封存嗎？<br><br>此操作無法復原，請確認帳款已結清。', '指揮官最終確認', [
                { text: '取消', primary: false, action: 'closeAlert()' },
                { text: '確定封存', primary: true, action: 'executeCloseAll()' }
            ]);
        }

        async function executeCloseAll() {
            closeAlert();
            showLoading('執行日落封存程序...');
            const res = await apiCall('adminCloseAndArchive');
            hideLoading();
            if(res) {
                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                showAlert('系統已順利打烊，所有皮客覓皆已安全歸巢！', '程序完成');
                switchTab('admin');
            }
        }

        // --- 啟動程式 ---
        window.onload = init;
    </script>
</body>
</html>
