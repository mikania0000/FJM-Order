<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>皮客覓 PickMeal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7f6; -webkit-tap-highlight-color: transparent; }
        
        /* iPhone 底部安全距離防呆 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: calc(4.5rem + env(safe-area-inset-bottom)) !important; }
        }
        
        /* 隱藏卷軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 菜單收合動畫 */
        .accordion-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, padding 0.3s ease;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.expanded {
            max-height: 2000px; /* 隨意給個夠大的值 */
            opacity: 1;
        }
        .accordion-icon { transition: transform 0.3s ease; }
        .accordion-icon.expanded { transform: rotate(180deg); }

        /* 盆栽與小芽動畫 */
        @keyframes sprout-grow {
            0% { transform: translateY(10px) scale(0.5); opacity: 0; }
            50% { transform: translateY(-5px) scale(1.1); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes sprout-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes float-sparkle {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .animate-sprout { animation: sprout-grow 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-bounce-slow { animation: sprout-bounce 2s infinite ease-in-out; }
        .sparkle-1 { animation: float-sparkle 2s infinite ease-in-out; }
        .sparkle-2 { animation: float-sparkle 2.5s infinite ease-in-out 0.5s; }
        .sparkle-3 { animation: float-sparkle 1.8s infinite ease-in-out 1s; }

        /* 主題色配置 */
        .theme-green { background-color: #006241; }
        .theme-text { color: #006241; }
        .theme-light { background-color: #e8f3ee; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden flex flex-col h-screen">

    <!-- === 浮動提示框 === -->
    <div id="alertBox" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full theme-light theme-text flex items-center justify-center shrink-0">
                    <i data-lucide="info" class="w-5 h-5"></i>
                </div>
                <h3 id="alertTitle" class="text-lg font-bold text-slate-800">提示</h3>
            </div>
            <p id="alertMessage" class="text-slate-600 text-base mb-6 leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full theme-green text-white text-base font-bold py-4 rounded-xl hover:bg-emerald-800 active:scale-95 transition-all">
                確定，探險家！
            </button>
        </div>
    </div>

    <!-- === 全域 Loading 動畫 (盆栽培養中) === -->
    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="relative w-28 h-28 mb-4">
            <div class="absolute bottom-0 w-full h-1/2 bg-[#006241] rounded-b-xl opacity-20"></div>
            <i data-lucide="sprout" class="w-20 h-20 theme-text absolute bottom-4 left-4 animate-bounce-slow"></i>
        </div>
        <h2 id="loadingText" class="text-xl font-bold theme-text tracking-wide">皮客覓培育中...</h2>
    </div>

    <!-- === 圖片放大燈箱 (Panzoom) === -->
    <div id="lightbox" class="fixed inset-0 z-[60] bg-black/95 hidden flex flex-col">
        <div class="flex justify-between items-center p-4 text-white absolute top-0 w-full z-10 bg-gradient-to-b from-black/60 to-transparent">
            <span class="text-sm font-medium opacity-80"><i data-lucide="move" class="inline w-4 h-4 mr-1"></i>雙指/滾輪縮放，單指拖曳</span>
            <button onclick="closeLightbox()" class="p-2 bg-white/20 rounded-full backdrop-blur"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="panzoom-container" class="flex-1 overflow-hidden relative touch-none flex items-center justify-center w-full h-full p-4">
            <!-- 加入 object-contain 確保初始大小適中 -->
            <img id="lightbox-img" src="" alt="菜單" class="max-w-full max-h-full object-contain pointer-events-none rounded-lg shadow-2xl">
        </div>
    </div>

    <!-- === 登入頁面 (登陸基地) === -->
    <div id="loginPage" class="fixed inset-0 z-40 bg-slate-50 flex flex-col items-center justify-center p-6 transition-transform duration-500">
        <div class="w-full max-w-md">
            <!-- 精緻版 Logo -->
            <div class="flex flex-col items-center mb-8">
                <div class="w-32 h-32 theme-green rounded-[2rem] shadow-xl flex flex-col items-center justify-center relative mb-5">
                    <!-- Sparkles -->
                    <svg class="absolute top-4 right-5 w-10 h-10 text-white sparkle-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    <svg class="absolute top-3 left-6 w-5 h-5 text-white sparkle-2" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5 4.5 1.5-4.5 1.5L12 14l-1.5-4.5-4.5-1.5 4.5-1.5z"/></svg>
                    <svg class="absolute bottom-10 left-5 w-6 h-6 text-white sparkle-3" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5 4.5 1.5-4.5 1.5L12 14l-1.5-4.5-4.5-1.5 4.5-1.5z"/></svg>
                    
                    <!-- Sprout -->
                    <svg class="w-12 h-12 text-white mt-2 animate-bounce-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.7-4.3 1.4-4.9 2z"/></svg>
                    <!-- Pot -->
                    <div class="absolute bottom-0 w-24 h-10 bg-white/20 rounded-t-2xl backdrop-blur-sm border-t border-white/30 flex justify-center gap-3 pt-3">
                        <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                        <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                    </div>
                </div>
                <!-- 標題排版優化 -->
                <h1 class="text-[2.75rem] font-black text-slate-800 tracking-wider leading-none">皮客覓</h1>
                <p class="text-base font-bold theme-text tracking-[0.3em] mt-2 uppercase">PickMeal</p>
                <p class="text-sm text-slate-400 mt-2 tracking-widest font-medium">你的專屬點餐小幫手</p>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm p-7 border border-slate-100">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-500 mb-2 ml-1">探險家帳號</label>
                        <input type="text" id="username" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-base focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-medium" placeholder="請輸入帳號">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-500 mb-2 ml-1">通關密碼</label>
                        <input type="password" id="password" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-base focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-medium" placeholder="請輸入密碼">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-500 mb-2 ml-1">稱呼 <span class="text-slate-400 font-normal">(選填)</span></label>
                        <input type="text" id="displayName" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-base focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-medium" placeholder="您希望皮客覓怎麼稱呼您？">
                    </div>
                    <button onclick="login()" class="w-full theme-green text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-emerald-900/20 mt-4 flex justify-center items-center gap-2 hover:bg-emerald-800 active:scale-95 transition-all">
                        <i data-lucide="log-in" class="w-6 h-6"></i> 登入基地
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- === 主應用程式 (App 佈局) === -->
    <div id="mainApp" class="hidden flex-1 flex flex-col h-full bg-slate-50 relative">
        
        <!-- 頂部導航 (加回問候語) -->
        <header class="bg-white px-5 py-4 shadow-sm z-20 flex flex-col sticky top-0">
            <div class="flex justify-between items-center mb-1">
                <div class="flex items-center gap-2">
                    <i data-lucide="sprout" class="w-7 h-7 theme-text"></i>
                    <div>
                        <h1 class="text-xl font-black text-slate-800 leading-tight">皮客覓</h1>
                        <p class="text-[11px] theme-text font-bold tracking-widest leading-none">PICKMEAL</p>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-base font-bold text-slate-700" id="userGreeting">探險家</div>
                    <div class="text-xs text-slate-500 font-medium" id="appDeadline">截止時間: 載入中</div>
                </div>
            </div>
            <!-- 加回問候打氣語 -->
            <p class="text-[13px] text-slate-500 font-medium mt-1">探險家，今天想尋覓什麼美味的物資呢？🌱</p>
        </header>

        <!-- 主要內容區 -->
        <main id="mainContent" class="flex-1 overflow-y-auto no-scrollbar pb-safe w-full max-w-3xl mx-auto"></main>

        <!-- 底部導覽列 -->
        <nav class="bg-white border-t border-slate-100 px-6 py-3 pb-[calc(0.75rem+env(safe-area-inset-bottom))] flex justify-between items-center fixed bottom-0 w-full max-w-3xl left-1/2 -translate-x-1/2 z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] rounded-t-3xl">
            <button onclick="switchTab('menu')" id="tab-menu" class="flex flex-col items-center p-2 flex-1 theme-text transition-transform active:scale-90">
                <i data-lucide="map" class="w-6 h-6 mb-1"></i>
                <span class="text-xs font-bold">探索菜單</span>
            </button>
            <button onclick="switchTab('cart')" id="tab-cart" class="flex flex-col items-center p-2 flex-1 text-slate-400 hover:text-slate-600 transition-transform active:scale-90 relative">
                <i data-lucide="backpack" class="w-6 h-6 mb-1"></i>
                <span class="text-xs font-bold">物資背包</span>
                <span id="cartBadge" class="absolute top-1 right-1/4 translate-x-2 -translate-y-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
            <button onclick="switchTab('profile')" id="tab-profile" class="flex flex-col items-center p-2 flex-1 text-slate-400 hover:text-slate-600 transition-transform active:scale-90">
                <i data-lucide="user" class="w-6 h-6 mb-1"></i>
                <span class="text-xs font-bold">指揮所</span>
            </button>
        </nav>
    </div>

    <!-- 點餐彈窗 (BottomSheet) -->
    <div id="itemModal" class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm hidden opacity-0 transition-opacity flex flex-col justify-end">
        <div class="bg-white w-full max-w-3xl mx-auto rounded-t-3xl shadow-2xl p-6 transform translate-y-full transition-transform duration-300 max-h-[85vh] flex flex-col">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4 shrink-0"></div>
            <div class="flex justify-between items-start mb-4 shrink-0">
                <div>
                    <!-- 字體放大 -->
                    <h2 id="modalItemName" class="text-2xl font-black text-slate-800"></h2>
                    <p id="modalItemPrice" class="theme-text font-black text-xl mt-1"></p>
                </div>
                <button onclick="closeItemModal()" class="p-2 bg-slate-100 rounded-full text-slate-500 active:scale-90 transition-transform"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto no-scrollbar -mx-2 px-2" id="modalOptionsArea">
                <!-- 選項會動態渲染在這裡 -->
            </div>

            <div class="mt-6 pt-4 border-t border-slate-100 shrink-0 flex gap-4 items-center">
                <div class="flex items-center bg-slate-100 rounded-2xl p-1">
                    <button onclick="adjustQty(-1)" class="w-12 h-12 flex items-center justify-center text-slate-600 font-bold text-2xl active:bg-slate-200 rounded-xl">-</button>
                    <span id="modalQty" class="w-10 text-center font-bold text-xl text-slate-800">1</span>
                    <button onclick="adjustQty(1)" class="w-12 h-12 flex items-center justify-center text-slate-600 font-bold text-2xl active:bg-slate-200 rounded-xl">+</button>
                </div>
                <!-- 按鈕字體放大 -->
                <button onclick="addToCart()" class="flex-1 theme-green text-white font-bold text-lg py-4 rounded-2xl flex justify-center items-center gap-2 active:scale-95 transition-transform shadow-lg shadow-emerald-900/20">
                    <i data-lucide="plus" class="w-6 h-6"></i> 放入背包 <span id="modalBtnPrice" class="ml-1 bg-white/20 px-2 py-0.5 rounded text-base"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 系統設定區
        // ==========================================
        // ⚠️ 請填入您最新的 Google Apps Script 網頁應用程式網址
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZomnJRCpnTT6IJXXuCBdTlaqDhPITyt-2ACh8JZBz42rctAaAfYdpwNYgBtvzHXtNCQ/exec'; 
        
        const state = {
            user: null, token: null,
            system: { isOpen: false, openedShops: [], deadline: '' },
            data: { allShops: [], menuData: {}, shopImages: {}, shopPhones: {}, userOrders: [] },
            cart: [],
            currentTab: 'menu',
            activeShop: '',
            tempItem: null, // 暫存正在選擇的餐點
            adminProxyName: '' // 指揮官代點姓名
        };

        let pzInstance = null;
        let pzWheelHandler = null;

        // ==========================================
        // UI 基礎工具
        // ==========================================
        lucide.createIcons();

        function showLoading(text = '皮客覓培育中...') {
            document.getElementById('loadingText').textContent = text;
            const el = document.getElementById('loading');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.remove('opacity-0'), 10);
        }
        function hideLoading() {
            const el = document.getElementById('loading');
            el.classList.add('opacity-0');
            setTimeout(() => el.classList.add('hidden'), 300);
        }

        function showAlert(msg, title = '系統提示') {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = msg;
            const el = document.getElementById('alertBox');
            el.classList.remove('hidden');
            setTimeout(() => {
                el.classList.remove('opacity-0');
                el.querySelector('div').classList.remove('scale-95');
            }, 10);
        }
        function closeAlert() {
            const el = document.getElementById('alertBox');
            el.classList.add('opacity-0');
            el.querySelector('div').classList.add('scale-95');
            setTimeout(() => el.classList.add('hidden'), 300);
        }

        // ==========================================
        // API 溝通層
        // ==========================================
        async function apiCall(action, data = {}) {
            if(!SCRIPT_URL) {
                showAlert('請先在 HTML 程式碼中設定 SCRIPT_URL 網址！', '系統設定錯誤');
                hideLoading(); return null;
            }
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, token: state.token, data })
                });
                const result = await response.json();
                if (result.status === 'error') {
                    if (result.message.includes('Token')) logout();
                    throw new Error(result.message);
                }
                return result.data;
            } catch (error) {
                hideLoading();
                showAlert(error.message, '連線異常');
                return null;
            }
        }

        // ==========================================
        // 系統初始化與登入
        // ==========================================
        window.onload = () => {
            const savedToken = localStorage.getItem('pickmeal_token');
            const savedUser = localStorage.getItem('pickmeal_user');
            if (savedToken && savedUser) {
                state.token = savedToken;
                state.user = JSON.parse(savedUser);
                loadInitialData();
            } else {
                document.getElementById('loginPage').classList.remove('-translate-y-full');
            }
        };

        async function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const n = document.getElementById('displayName').value.trim();
            if (!u || !p) return showAlert('請輸入完整的探險家帳號與密碼！');

            showLoading('正在驗證探險家身分...');
            const res = await apiCall('login', { username: u, password: p, name: n });
            if (res) {
                state.token = res.token;
                state.user = res.user;
                localStorage.setItem('pickmeal_token', res.token);
                localStorage.setItem('pickmeal_user', JSON.stringify(res.user));
                processInitialData(res.initialData);
                enterApp();
            }
        }

        function logout() {
            localStorage.removeItem('pickmeal_token');
            localStorage.removeItem('pickmeal_user');
            location.reload();
        }

        async function loadInitialData() {
            showLoading('正在與基地同步資料...');
            const res = await apiCall('getInitialData');
            if (res) {
                processInitialData(res);
                enterApp();
            }
        }

        function processInitialData(data) {
            state.system = data.systemStatus;
            state.data = data;
            document.getElementById('userGreeting').textContent = `${state.user.role === '管理' ? '指揮官' : '探險家'} ${state.user.name}`;
            document.getElementById('appDeadline').textContent = state.system.deadline ? `打烊時間: ${state.system.deadline}` : '隨時可發射洋蔥號';
            
            if (state.system.openedShops.length > 0 && !state.activeShop) {
                state.activeShop = state.system.openedShops[0];
            }
        }

        function enterApp() {
            hideLoading();
            document.getElementById('loginPage').classList.add('-translate-y-full');
            document.getElementById('mainApp').classList.remove('hidden');
            switchTab('menu');
            lucide.createIcons();
        }

        // ==========================================
        // 頁籤切換與渲染
        // ==========================================
        function switchTab(tabId) {
            state.currentTab = tabId;
            ['menu', 'cart', 'profile'].forEach(id => {
                const btn = document.getElementById(`tab-${id}`);
                if (id === tabId) {
                    btn.classList.add('theme-text');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('theme-text');
                    btn.classList.add('text-slate-400');
                }
            });
            const content = document.getElementById('mainContent');
            if (tabId === 'menu') renderMenuTab(content);
            if (tabId === 'cart') renderCartTab(content);
            if (tabId === 'profile') renderProfileTab(content);
            lucide.createIcons();
        }

        // ==========================================
        // Tab 1: 探索菜單 (智慧解析引擎 + 手風琴效果)
        // ==========================================
        function renderMenuTab(container) {
            if (!state.system.isOpen) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-8 text-center text-slate-500">
                        <div class="w-28 h-28 theme-light rounded-full flex items-center justify-center mb-6">
                            <i data-lucide="moon" class="w-12 h-12 theme-text"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-700 mb-2">日落了</h2>
                        <p class="text-base text-slate-500">皮客覓已回歸洋蔥號，<br>目前基地不開放物資採集。</p>
                    </div>`;
                return;
            }

            let html = `<div class="p-4 space-y-4">`;

            // 指揮官代點模式
            if (state.user.role === '管理') {
                html += `
                <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 shadow-sm relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-16 h-16 bg-amber-100 rounded-bl-full -z-10"></div>
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="headset" class="w-5 h-5 text-amber-600"></i>
                        <span class="font-bold text-amber-800 text-sm">指揮官呼叫支援 (代點模式)</span>
                    </div>
                    <!-- 字體放大 -->
                    <input type="text" id="proxyNameInput" value="${state.adminProxyName}" onchange="state.adminProxyName = this.value" class="w-full bg-white border border-amber-200 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-amber-500" placeholder="輸入代點姓名 (留空則為自己點)">
                </div>`;
            }

            // 店家切換與資訊
            html += `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-2 flex overflow-x-auto no-scrollbar gap-2 sticky top-0 z-10">
                    ${state.system.openedShops.map(shop => `
                        <button onclick="state.activeShop='${shop}'; renderMenuTab(document.getElementById('mainContent'))" 
                            class="whitespace-nowrap px-6 py-3 rounded-2xl font-bold text-base transition-all ${state.activeShop === shop ? 'theme-green text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}">
                            ${shop}
                        </button>
                    `).join('')}
                </div>`;

            const imgUrl = state.data.shopImages[state.activeShop];
            const phone = state.data.shopPhones[state.activeShop];
            
            if (imgUrl || phone) {
                html += `<div class="flex gap-2">`;
                if(imgUrl) {
                    html += `
                    <div class="flex-1 bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:scale-95 transition-transform" onclick="openLightbox('${imgUrl}')">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 theme-light rounded-xl flex items-center justify-center"><i data-lucide="image" class="w-5 h-5 theme-text"></i></div>
                            <span class="font-bold text-slate-700 text-base">查看完整菜單</span>
                        </div>
                        <i data-lucide="zoom-in" class="w-5 h-5 text-slate-400"></i>
                    </div>`;
                }
                if(phone) {
                    html += `
                    <a href="tel:${phone}" class="bg-slate-800 text-white rounded-2xl p-4 shadow-sm flex items-center justify-center gap-2 active:scale-95 transition-transform px-6">
                        <i data-lucide="phone" class="w-6 h-6"></i>
                    </a>`;
                }
                html += `</div>`;
            }

            // 智慧渲染菜單列表 (加入手風琴邏輯)
            const menu = state.data.menuData[state.activeShop] || [];
            
            // 重新組織資料結構：以「類別」分群
            const categorizedMenu = {};
            let lastCategory = '未分類';
            
            menu.forEach((item, index) => {
                if (!item['品項']) return;
                
                let cat = item['類別'];
                // 處理合併儲存格導致類別空白的情況
                if (cat) {
                    lastCategory = cat;
                } else {
                    cat = lastCategory;
                }

                if (!categorizedMenu[cat]) categorizedMenu[cat] = [];
                // 將原始 index 存入，方便點擊時抓取正確資料
                item._realIndex = index; 
                categorizedMenu[cat].push(item);
            });

            html += `<div class="pb-4 space-y-3">`;
            
            let isFirstCategory = true;

            // 渲染分類手風琴
            for (let category in categorizedMenu) {
                const items = categorizedMenu[category];
                if(items.length === 0) continue;

                const isExpanded = isFirstCategory; // 預設只展開第一個
                
                html += `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <!-- 類別標題 (點擊展開/收合) -->
                    <button onclick="toggleAccordion('${category.replace(/\s+/g, '-')}')" class="w-full bg-slate-50/80 px-5 py-4 flex items-center justify-between border-l-4 border-[#006241] transition-colors hover:bg-slate-100 active:bg-slate-200">
                        <span class="font-black text-slate-800 text-lg">${category}</span>
                        <i data-lucide="chevron-down" id="icon-${category.replace(/\s+/g, '-')}" class="w-6 h-6 text-slate-400 accordion-icon ${isExpanded ? 'expanded' : ''}"></i>
                    </button>
                    
                    <!-- 該類別下的餐點列表 -->
                    <div id="content-${category.replace(/\s+/g, '-')}" class="accordion-content ${isExpanded ? 'expanded' : ''}">
                        <div class="flex flex-col">`;
                
                items.forEach((item) => {
                    // 解析價格
                    let basePrice = 0;
                    let priceLabels = [];
                    for (let key in item) {
                        if (key === '_originalIndex' || key === '類別' || key === '品項' || key === '_realIndex') continue;
                        if (key.includes('價格') || key.includes('單價') || key === 'L' || key === 'M' || key === '瓶') {
                            const p = parseInt(item[key]);
                            if (!isNaN(p) && p > 0) {
                                priceLabels.push({ label: key, price: p });
                                if (basePrice === 0) basePrice = p;
                            }
                        }
                    }

                    if (basePrice > 0) {
                        html += `
                        <div onclick="openItemModal(${item._realIndex})" class="px-5 py-5 border-b border-slate-50 last:border-0 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-colors">
                            <div class="pr-4 flex-1">
                                <!-- 品項字體放大至 16px 以上 -->
                                <h4 class="font-bold text-slate-800 text-lg leading-tight mb-1">${item['品項']}</h4>
                                ${priceLabels.length > 1 ? `<p class="text-sm text-slate-500 font-medium">多種規格可選</p>` : ''}
                            </div>
                            <div class="flex items-center gap-4 shrink-0">
                                <!-- 金額字體放大 -->
                                <span class="font-black theme-text text-xl tracking-tight">$${basePrice}</span>
                                <div class="w-10 h-10 rounded-full theme-light flex items-center justify-center shrink-0">
                                    <i data-lucide="plus" class="w-5 h-5 theme-text"></i>
                                </div>
                            </div>
                        </div>`;
                    }
                });

                html += `       </div>
                            </div>
                        </div>`;
                isFirstCategory = false; // 之後的分類預設都收合
            }
            
            html += `</div></div>`;
            container.innerHTML = html;
        }

        // 手風琴切換邏輯
        function toggleAccordion(categoryId) {
            const content = document.getElementById(`content-${categoryId}`);
            const icon = document.getElementById(`icon-${categoryId}`);
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                icon.classList.remove('expanded');
            } else {
                content.classList.add('expanded');
                icon.classList.add('expanded');
            }
        }

        // ==========================================
        // 點餐彈窗邏輯 (智慧選項解析)
        // ==========================================
        function openItemModal(itemIndex) {
            const itemData = state.data.menuData[state.activeShop][itemIndex];
            
            // 初始化暫存項目
            state.tempItem = {
                shop: state.activeShop,
                name: itemData['品項'],
                basePrice: 0,
                selectedSpec: {},
                extraPrice: 0,
                quantity: 1
            };

            document.getElementById('modalItemName').textContent = itemData['品項'];
            document.getElementById('modalQty').textContent = '1';

            let optionsHtml = '';
            let isFirstPriceSet = false;

            // 分類解析所有欄位
            for (let key in itemData) {
                if (key === '_originalIndex' || key === '類別' || key === '品項' || key === '_realIndex' || !itemData[key]) continue;

                // 1. 處理「價格規格」
                if (key.includes('價格') || key.includes('單價') || key === 'L' || key === 'M' || key === '瓶') {
                    const price = parseInt(itemData[key]);
                    if (!isNaN(price)) {
                        if(!isFirstPriceSet) {
                            state.tempItem.basePrice = price;
                            state.tempItem.selectedSpec['規格'] = key.includes('單價') ? '' : key;
                            isFirstPriceSet = true;
                        }
                        
                        optionsHtml += `
                        <div class="mb-5">
                            <h4 class="text-sm font-bold text-slate-500 mb-3 border-l-2 border-[#006241] pl-2">選擇${key.includes('單價') ? '價格' : '規格'}</h4>
                            <div class="flex flex-wrap gap-2">
                                <label class="relative cursor-pointer">
                                    <input type="radio" name="spec_price" value="${price}" data-label="${key.includes('單價') ? '' : key}" class="peer sr-only" ${isFirstPriceSet && state.tempItem.basePrice === price ? 'checked' : ''} onchange="updateTempItemSpec('規格', this.dataset.label, ${price})">
                                    <div class="px-5 py-3 rounded-xl border border-slate-200 text-base font-bold text-slate-600 peer-checked:bg-[#006241] peer-checked:text-white peer-checked:border-[#006241] transition-all">
                                        ${key.includes('單價') ? `單價 (+$${price})` : `${key} (+$${price})`}
                                    </div>
                                </label>
                            </div>
                        </div>`;
                    }
                } 
                // 2. 處理「客製化選項」(下拉選單)
                else {
                    const optString = String(itemData[key]);
                    const options = optString.split(/[\/,]/).map(s => s.trim()).filter(s => s);
                    
                    if (options.length > 0) {
                        state.tempItem.selectedSpec[key] = ''; // 預設空

                        optionsHtml += `
                        <div class="mb-5 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <h4 class="text-sm font-bold text-slate-600 mb-3 flex justify-between items-center">
                                <span>${key}</span>
                                <span class="text-xs font-normal text-slate-400 bg-white px-2 py-1 rounded-md border border-slate-200">必選</span>
                            </h4>
                            <select onchange="updateTempItemOption('${key}', this.value)" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-4 text-base font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-[#006241] appearance-none cursor-pointer">
                                <option value="" disabled selected>-- 請選擇 --</option>`;
                        
                        options.forEach(opt => {
                            let extra = 0;
                            let displayName = opt;
                            const priceMatch = opt.match(/\+\s*\$?\s*(\d+)/); 
                            if (priceMatch) {
                                extra = parseInt(priceMatch[1]);
                                displayName = opt.replace(priceMatch[0], '').trim() + ` (+$${extra})`;
                            }
                            const valueData = `${displayName}|${extra}`;
                            optionsHtml += `<option value="${valueData}">${displayName}</option>`;
                        });
                        optionsHtml += `</select></div>`;
                    }
                }
            }

            document.getElementById('modalOptionsArea').innerHTML = optionsHtml;
            updateModalPrice();
            
            const modal = document.getElementById('itemModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('translate-y-full');
            }, 10);
        }

        function closeItemModal() {
            const modal = document.getElementById('itemModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
            state.tempItem = null;
        }

        function updateTempItemSpec(groupName, label, basePrice) {
            state.tempItem.basePrice = basePrice;
            state.tempItem.selectedSpec[groupName] = label;
            updateModalPrice();
        }

        function updateTempItemOption(groupName, valueData) {
            state.tempItem.selectedSpec[groupName] = valueData;
            let totalExtra = 0;
            for(let key in state.tempItem.selectedSpec) {
                if(key !== '規格' && state.tempItem.selectedSpec[key]) {
                    const parts = state.tempItem.selectedSpec[key].split('|');
                    if(parts.length > 1) totalExtra += parseInt(parts[1]);
                }
            }
            state.tempItem.extraPrice = totalExtra;
            updateModalPrice();
        }

        function adjustQty(delta) {
            let q = state.tempItem.quantity + delta;
            if (q < 1) q = 1;
            state.tempItem.quantity = q;
            document.getElementById('modalQty').textContent = q;
            updateModalPrice();
        }

        function updateModalPrice() {
            const singlePrice = state.tempItem.basePrice + state.tempItem.extraPrice;
            const total = singlePrice * state.tempItem.quantity;
            document.getElementById('modalItemPrice').textContent = `$${singlePrice}`;
            document.getElementById('modalBtnPrice').textContent = `$${total}`;
        }

        function addToCart() {
            for(let key in state.tempItem.selectedSpec) {
                if(key !== '規格' && !state.tempItem.selectedSpec[key]) {
                    return showAlert(`請選擇「${key}」！`);
                }
            }

            let specArr = [];
            if(state.tempItem.selectedSpec['規格']) specArr.push(state.tempItem.selectedSpec['規格']);
            for(let key in state.tempItem.selectedSpec) {
                if(key !== '規格' && state.tempItem.selectedSpec[key]) {
                     specArr.push(state.tempItem.selectedSpec[key].split('|')[0]); 
                }
            }
            const finalSpec = specArr.join(' / ');
            const finalPrice = state.tempItem.basePrice + state.tempItem.extraPrice;

            state.cart.push({
                shop: state.tempItem.shop,
                name: state.tempItem.name,
                spec: finalSpec,
                price: finalPrice,
                quantity: state.tempItem.quantity,
                name_override: state.adminProxyName || ''
            });

            updateCartBadge();
            closeItemModal();
            
            const tabBtn = document.getElementById('tab-cart');
            tabBtn.classList.add('scale-110', 'text-[#006241]');
            setTimeout(() => tabBtn.classList.remove('scale-110', 'text-[#006241]'), 300);
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (state.cart.length > 0) {
                badge.textContent = state.cart.length;
                badge.classList.remove('hidden');
                badge.classList.add('animate-sprout');
                setTimeout(()=> badge.classList.remove('animate-sprout'), 600);
            } else {
                badge.classList.add('hidden');
            }
        }

        // ==========================================
        // Tab 2: 物資背包 (購物車)
        // ==========================================
        function renderCartTab(container) {
            if (state.cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-8 text-center">
                        <div class="w-36 h-36 bg-slate-100 rounded-full flex items-center justify-center mb-6 relative">
                            <div class="absolute bottom-6 w-20 h-14 bg-slate-300 rounded-b-xl"></div>
                            <div class="absolute bottom-20 w-5 h-5 bg-slate-200 rounded-full"></div>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-700 mb-3">物資背包空空的</h2>
                        <p class="text-slate-500 text-base">趕快去菜單播下美味的種子吧！</p>
                        <button onclick="switchTab('menu')" class="mt-8 px-8 py-4 theme-light theme-text text-lg font-bold rounded-2xl active:scale-95 transition-transform">去探索菜單</button>
                    </div>`;
                return;
            }

            let total = 0;
            let html = `<div class="p-4 pb-32">
                <h2 class="text-xl font-black text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="backpack" class="w-6 h-6 theme-text"></i> 已收集的物資</h2>
                <div class="space-y-4">`;

            state.cart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex gap-4 animate-sprout" style="animation-delay: ${idx * 0.05}s">
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-slate-800 text-lg">${item.name}</h4>
                            <button onclick="state.cart.splice(${idx}, 1); updateCartBadge(); renderCartTab(document.getElementById('mainContent'));" class="text-red-400 p-2 hover:text-red-600 active:scale-90"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                        <p class="text-sm text-slate-500 mb-3">${item.shop} ${item.spec ? `· ${item.spec}` : ''}</p>
                        ${item.name_override ? `<p class="text-xs bg-amber-100 text-amber-800 inline-block px-2 py-1 rounded-md font-bold mb-3">代點: ${item.name_override}</p>` : ''}
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-sm font-bold text-slate-400">$${item.price} x ${item.quantity}</span>
                            <span class="font-black theme-text text-xl">$${itemTotal}</span>
                        </div>
                    </div>
                </div>`;
            });

            html += `</div></div>
            <div class="fixed bottom-[calc(4.5rem+env(safe-area-inset-bottom))] w-full max-w-3xl left-1/2 -translate-x-1/2 p-4 bg-gradient-to-t from-white via-white to-transparent z-20">
                <div class="bg-slate-800 rounded-3xl p-5 flex justify-between items-center shadow-2xl">
                    <div class="text-white">
                        <p class="text-sm opacity-70 mb-0.5">預估總計</p>
                        <p class="text-2xl font-black">$${total}</p>
                    </div>
                    <button onclick="submitOrder()" class="theme-green text-white font-bold px-8 py-4 rounded-2xl flex items-center gap-2 hover:bg-emerald-800 active:scale-95 transition-transform shadow-lg shadow-emerald-900/50 text-lg">
                        發射洋蔥號 <i data-lucide="rocket" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        function checkIsPastDeadline() {
            if (!state.system.deadline) return false;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            return timeStr > state.system.deadline;
        }

        async function submitOrder() {
            if (checkIsPastDeadline()) {
                showAlert('已經超過今日點餐截止時間，皮客覓無法為您搬運物資囉！', '日落了');
                return;
            }
            showLoading('皮客覓奮力搬運物資中...');
            const res = await apiCall('submitOrder', state.cart);
            if (res) {
                showAlert(res, '發射成功！');
                state.cart = [];
                updateCartBadge();
                loadInitialData();
            }
        }

        // ==========================================
        // Tab 3: 指揮所 (個人紀錄 / 店長後台)
        // ==========================================

                    <div class="grid grid-cols-2 gap-4 mb-6">

                            <div class="w-12 h-12 theme-light rounded-full flex items-center justify-center"><i data-lucide="users" class="w-6 h-6 theme-text"></i></div>

                            <div class="w-12 h-12 theme-light rounded-full flex items-center justify-center"><i data-lucide="phone-call" class="w-6 h-6 theme-text"></i></div>

        async function deleteOrder(id) {
            showLoading('正在取消派遣...');
            const res = await apiCall('deleteOrder', { orderId: id });
            if (res) {
                showAlert(res);
                loadInitialData();
            }
        }

        // ==========================================
        // 指揮官功能: 獲取資料
        // ==========================================
        async function fetchAdminData(viewType) {
            showLoading('讀取物資報告中...');
            const res = await apiCall('adminGetTodayData');
            hideLoading();
            if (res) {
                const container = document.getElementById('mainContent');
                if (viewType === 'dashboard') renderAdminDashboard(container, res.summaryByUser);
                if (viewType === 'list') renderAdminOrderList(container, res.summaryByShop);
            }
        }

        // ==========================================
        // 指揮官功能: 發餐與核銷檯 (高效率 一鍵收費版)
        // ==========================================
        function renderAdminDashboard(container, summaryByUser) {
            let html = `
            <div class="p-4 pb-safe bg-slate-50 min-h-full">
                <div class="flex items-center gap-3 mb-6">
                    <button onclick="switchTab('profile')" class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-slate-600 active:scale-90"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <h2 class="text-2xl font-black text-slate-800">發餐與核銷檯</h2>
                </div>`;

            if (summaryByUser.length === 0) {
                html += `<div class="text-center text-slate-500 text-lg mt-12">今日尚無物資紀錄</div></div>`;
                container.innerHTML = html; lucide.createIcons(); return;
            }

            summaryByUser.forEach(user => {
                const isAllDone = user.paid && user.taken;
                html += `
                <div class="bg-white rounded-3xl shadow-sm border ${isAllDone ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200'} p-6 mb-5 relative overflow-hidden transition-colors">
                    ${isAllDone ? `<div class="absolute top-0 right-0 w-20 h-20 bg-emerald-100 rounded-bl-full flex items-start justify-end p-4"><i data-lucide="check-circle" class="w-6 h-6 text-emerald-500"></i></div>` : ''}
                    
                    <div class="flex justify-between items-end mb-5 border-b border-slate-100 pb-4">
                        <h3 class="text-2xl font-black text-slate-800">${user.name}</h3>
                        <div class="text-right">
                            <p class="text-xs text-slate-400 font-bold mb-1">應收總計</p>
                            <p class="text-3xl font-black theme-text leading-none">$${user.total}</p>
                        </div>
                    </div>
                    
                    <div class="space-y-4">`;

                const unpaidIds = [];
                const untakenIds = [];

                user.orders.forEach(order => {
                    const oId = order['訂單編號'];
                    const isPaid = (order['繳費狀態'] || order['繳費情形']) === '已繳費';
                    const isTaken = (order['取餐狀態'] || order['取餐情形']) === '已取餐';
                    
                    if(!isPaid) unpaidIds.push(oId);
                    if(!isTaken) untakenIds.push(oId);
                    
                    html += `
                        <div class="flex flex-col gap-2 p-4 bg-slate-50 rounded-2xl">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-xs font-bold text-white bg-slate-800 px-2 py-1 rounded mr-2">${order['店家']}</span>
                                    <span class="font-bold text-slate-700 text-base">${order['品項']} x${order['數量']}</span>
                                    ${order['規格']||order['訂購內容'] ? `<p class="text-sm text-slate-500 mt-1">${order['規格']||order['訂購內容']}</p>` : ''}
                                </div>
                                <span class="font-bold text-slate-700 text-lg">$${order['小計']}</span>
                            </div>
                            <div class="flex gap-2 mt-2">
                                <span class="flex-1 py-1.5 text-center rounded-lg text-xs font-bold ${isPaid ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-400'}">
                                    ${isPaid ? '✓ 已繳錢' : '未繳錢'}
                                </span>
                                <span class="flex-1 py-1.5 text-center rounded-lg text-xs font-bold ${isTaken ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-400'}">
                                    ${isTaken ? '✓ 已取餐' : '未取餐'}
                                </span>
                            </div>
                        </div>`;
                });
                
                html += `</div>`;

                // 一鍵操作大按鈕區
                if (unpaidIds.length > 0 || untakenIds.length > 0) {
                    html += `<div class="flex gap-3 pt-4 mt-4 border-t border-slate-100">`;
                    if (unpaidIds.length > 0) {
                        html += `
                        <button onclick="adminQuickUpdate('${unpaidIds.join(',')}', 'pay', '已繳費', this)" class="flex-1 bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white py-3.5 rounded-xl text-base font-bold transition-all shadow-sm flex items-center justify-center gap-2">
                            <i data-lucide="dollar-sign" class="w-5 h-5"></i> 點收 $${user.total}
                        </button>`;
                    }
                    if (untakenIds.length > 0) {
                        html += `
                        <button onclick="adminQuickUpdate('${untakenIds.join(',')}', 'take', '已取餐', this)" class="flex-1 bg-blue-500 hover:bg-blue-600 active:scale-95 text-white py-3.5 rounded-xl text-base font-bold transition-all shadow-sm flex items-center justify-center gap-2">
                            <i data-lucide="coffee" class="w-5 h-5"></i> 發給全餐點
                        </button>`;
                    }
                    html += `</div>`;
                }

                html += `</div>`;
            });

            html += `</div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        async function adminQuickUpdate(orderIdsStr, type, status, btnElement) {
            const originalClass = btnElement.className;
            const originalText = btnElement.innerHTML;
            btnElement.className = 'flex-1 py-3.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 bg-slate-200 text-slate-500';
            btnElement.innerHTML = '<i class="lucide-loader w-4 h-4 animate-spin"></i> 處理中';

            const res = await apiCall('adminUpdateStatus', { orderIds: orderIdsStr, type, status });
            if (res) { fetchAdminData('dashboard'); } 
            else { btnElement.className = originalClass; btnElement.innerHTML = originalText; }
        }

        // ==========================================
        // 指揮官功能: 實戰訂購清單 (電話叫餐)
        // ==========================================
        function renderAdminOrderList(container, summaryByShop) {
            let html = `
            <div class="p-4 pb-safe bg-slate-50 min-h-full">
                <div class="flex items-center gap-3 mb-6">
                    <button onclick="switchTab('profile')" class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-slate-600 active:scale-90"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <h2 class="text-2xl font-black text-slate-800">實戰訂購清單</h2>
                </div>`;

            const shops = Object.keys(summaryByShop);
            if (shops.length === 0) {
                html += `<div class="text-center text-slate-500 text-lg mt-12">今日尚無訂單</div></div>`;
                container.innerHTML = html; lucide.createIcons(); return;
            }

            shops.forEach(shop => {
                const shopData = summaryByShop[shop];
                const phone = state.data.shopPhones[shop] || '';
                
                html += `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">
                    <div class="flex justify-between items-center mb-5 border-b border-slate-100 pb-4">
                        <h3 class="text-2xl font-black text-slate-800 bg-slate-100 px-4 py-1.5 rounded-xl">${shop}</h3>
                        ${phone ? `
                            <a href="tel:${phone}" class="flex items-center gap-1.5 bg-slate-800 text-white text-sm font-bold px-4 py-2.5 rounded-xl active:scale-95 transition-transform">
                                <i data-lucide="phone" class="w-4 h-4"></i> 撥打: ${phone}
                            </a>` : '<span class="text-sm text-slate-400">無電話資料</span>'}
                    </div>
                    
                    <div class="space-y-4 mb-5">`;
                
                for (let itemName in shopData.items) {
                    const item = shopData.items[itemName];
                    html += `
                        <div class="flex justify-between items-start border-b border-slate-50 pb-3">
                            <div class="pr-3">
                                <p class="font-bold text-slate-700 text-base leading-snug">${itemName}</p>
                            </div>
                            <div class="text-right shrink-0">
                                <p class="font-black theme-text text-lg">共 ${item.count} 份</p>
                                <p class="text-sm text-slate-400 font-bold">$${item.subtotal}</p>
                            </div>
                        </div>`;
                }

                html += `
                    </div>
                    <div class="bg-slate-50 rounded-2xl p-4 flex justify-between items-center">
                        <span class="text-base font-bold text-slate-500">此店家訂購總額</span>
                        <span class="text-2xl font-black theme-text">$${shopData.totalAmount}</span>
                    </div>
                </div>`;
            });

            html += `</div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        // ==========================================
        // 指揮官功能: 基地系統設定 (Checkbox版)
        // ==========================================
        function renderAdminSettings() {
            const container = document.getElementById('mainContent');
            
            // 產生 Checkbox 清單 (排除內部工作表後的 allShops)
            let shopCheckboxesHtml = '';
            state.data.allShops.forEach(shop => {
                const isChecked = state.system.openedShops.includes(shop) ? 'checked' : '';
                shopCheckboxesHtml += `
                <label class="flex items-center p-4 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer transition-colors active:bg-slate-100">
                    <input type="checkbox" value="${shop}" class="shop-checkbox w-6 h-6 text-[#006241] rounded focus:ring-[#006241]" ${isChecked}>
                    <span class="ml-3 text-lg font-bold text-slate-700">${shop}</span>
                </label>
                `;
            });

            let html = `
            <div class="p-4 pb-safe bg-slate-50 min-h-full">
                <div class="flex items-center gap-3 mb-6">
                    <button onclick="switchTab('profile')" class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-slate-600 active:scale-90"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <h2 class="text-2xl font-black text-slate-800">基地系統設定</h2>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">
                    <h3 class="font-bold text-slate-800 text-lg mb-5 border-l-4 border-[#006241] pl-3">營運開關</h3>
                    <div class="flex items-center justify-between mb-6">
                        <span class="text-base font-bold text-slate-600">開放點餐</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="setIsOpen" class="sr-only peer" ${state.system.isOpen ? 'checked' : ''}>
                            <div class="w-14 h-8 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-[#006241]"></div>
                        </label>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-slate-500 mb-3">今日開放店家 (請勾選)</label>
                        <div class="grid grid-cols-2 gap-3">
                            ${shopCheckboxesHtml}
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-slate-500 mb-2">點餐截止時間 (例如: 10:30)</label>
                        <input type="time" id="setDeadline" value="${state.system.deadline}" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-lg focus:ring-2 focus:ring-[#006241] outline-none">
                    </div>
                    <button onclick="saveSystemSettings()" class="w-full theme-green text-white text-lg font-bold py-4 rounded-2xl active:scale-95 transition-transform shadow-md">儲存系統設定</button>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">
                    <h3 class="font-bold text-slate-800 text-lg mb-5 border-l-4 border-[#006241] pl-3">更新店家資訊</h3>
                    <div class="space-y-4">
                        <select id="updateShopName" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-base font-bold focus:ring-2 focus:ring-[#006241] outline-none">
                            <option value="">-- 選擇店家 --</option>
                            ${state.data.allShops.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                        <input type="text" id="updateShopImg" placeholder="線上圖片網址 (https://...)" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-base focus:ring-2 focus:ring-[#006241] outline-none">
                        <input type="text" id="updateShopPhone" placeholder="聯絡電話 (例如: 07-1234567)" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-base focus:ring-2 focus:ring-[#006241] outline-none">
                        <button onclick="updateShopInfo()" class="w-full bg-slate-800 text-white text-lg font-bold py-4 rounded-2xl active:scale-95 transition-transform shadow-md">更新店家資料</button>
                    </div>
                </div>

                <button onclick="adminCloseAndArchive()" class="w-full bg-red-50 text-red-600 border border-red-200 font-bold py-4 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-transform mt-8 text-lg">
                    <i data-lucide="archive" class="w-6 h-6"></i> 執行日落打烊與封存
                </button>
            </div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        async function saveSystemSettings() {
            // 抓取被勾選的 checkbox
            const checkedShops = Array.from(document.querySelectorAll('.shop-checkbox:checked')).map(cb => cb.value);

            const data = {
                isOpen: document.getElementById('setIsOpen').checked,
                openedShops: checkedShops,
                deadline: document.getElementById('setDeadline').value
            };
            showLoading('更新設定中...');
            const res = await apiCall('adminUpdateSystemSettings', data);
            if (res) { showAlert(res); loadInitialData(); }
        }

        async function updateShopInfo() {
            const shop = document.getElementById('updateShopName').value;
            const imageUrl = document.getElementById('updateShopImg').value.trim();
            const phone = document.getElementById('updateShopPhone').value.trim();
            if (!shop) return showAlert('請選擇店家');
            showLoading('更新店家資料中...');
            const res = await apiCall('adminUpdateShopInfo', { shop, imageUrl, phone });
            if (res) { showAlert(res); loadInitialData(); }
        }

        async function adminCloseAndArchive() {
            if (!confirm('確定要執行日落打烊嗎？這將會把今日紀錄封存並關閉點餐。')) return;
            showLoading('皮客覓正在封存物資紀錄...');
            const res = await apiCall('adminCloseAndArchive');
            if (res) { showAlert(res); loadInitialData(); }
        }

        // ==========================================
        // 圖片縮放工具 (Panzoom) 記憶體優化版
        // ==========================================
        function openLightbox(url) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const container = document.getElementById('panzoom-container');
            
            img.src = url;
            lightbox.classList.remove('hidden');

            setTimeout(() => {
                if (pzInstance) pzInstance.destroy();
                // 修正參數：初始大小為 1 (符合 object-contain)
                pzInstance = Panzoom(img, {
                    maxScale: 6, minScale: 1, contain: 'outside', step: 0.3, startScale: 1
                });
                
                if (pzWheelHandler) container.removeEventListener('wheel', pzWheelHandler);
                pzWheelHandler = pzInstance.zoomWithWheel;
                container.addEventListener('wheel', pzWheelHandler);
            }, 100);
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
            if (pzInstance) {
                pzInstance.reset();
            }
        }
    </script>
</body>
</html>
