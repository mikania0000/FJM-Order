<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>皮客覓 PickMeal v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 本地端 QR Code 產生庫，解決破圖問題 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7f6; -webkit-tap-highlight-color: transparent; }
        
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: calc(5rem + env(safe-area-inset-bottom)) !important; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 自訂Lightbox捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar { width: 14px; height: 14px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.5); border-radius: 8px; border: 3px solid rgba(0,0,0,0.8); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.8); }

        @keyframes sprout-grow { 0% { transform: translateY(10px) scale(0.5); opacity: 0; } 50% { transform: translateY(-5px) scale(1.1); opacity: 1; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes sprout-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes float-sparkle { 0%, 100% { opacity: 0.5; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        .animate-sprout { animation: sprout-grow 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-bounce-slow { animation: sprout-bounce 2s infinite ease-in-out; }
        .sparkle-1 { animation: float-sparkle 2s infinite ease-in-out; }
        .sparkle-2 { animation: float-sparkle 2.5s infinite ease-in-out 0.5s; }
        .sparkle-3 { animation: float-sparkle 1.8s infinite ease-in-out 1s; }

        .theme-green { background-color: #006241; }
        .theme-text { color: #006241; }
        .theme-light { background-color: #e8f3ee; }
        
        /* 隱藏 details 預設箭頭 */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; }
            #mainApp, #lightbox, #alertBox, #confirmBox, #itemModal, nav, header { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden flex flex-col h-screen">

    <div id="printArea" class="hidden absolute top-0 left-0 w-full h-auto bg-white p-8"></div>

    <div id="alertBox" class="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 rounded-full theme-light theme-text flex items-center justify-center shrink-0">
                    <i data-lucide="info" class="w-7 h-7"></i>
                </div>
                <h3 id="alertTitle" class="text-2xl font-bold text-slate-800">提示</h3>
            </div>
            <p id="alertMessage" class="text-xl text-slate-600 mb-6 leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full theme-green text-white font-bold py-4 rounded-xl hover:bg-emerald-800 active:scale-95 transition-all text-xl">
                確定，探險家！
            </button>
        </div>
    </div>

    <div id="confirmBox" class="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center shrink-0">
                    <i data-lucide="alert-triangle" class="w-7 h-7"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-800">重大操作確認</h3>
            </div>
            <p id="confirmMessage" class="text-xl text-slate-600 mb-6 leading-relaxed"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm(false)" class="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl active:scale-95 transition-all text-xl">取消</button>
                <button onclick="closeConfirm(true)" class="flex-1 bg-red-500 text-white font-bold py-4 rounded-xl hover:bg-red-600 active:scale-95 transition-all text-xl">確定執行</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 transform scale-95 transition-transform duration-300 text-center flex flex-col items-center">
            <div class="w-16 h-16 rounded-full theme-light theme-text flex items-center justify-center mb-4">
                <i data-lucide="qr-code" class="w-8 h-8"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">專屬團購報到條碼</h3>
            <p class="text-slate-500 mb-6 font-medium">探險家只要掃描此條碼或點擊連結，<br>輸入暱稱即可馬上點餐！</p>
            
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6 w-full flex justify-center">
                <canvas id="qrCodeCanvas"></canvas>
            </div>
            
            <div class="w-full flex items-center bg-slate-50 border border-slate-200 rounded-xl p-2 mb-6">
                <input type="text" id="shareUrlInput" readonly class="bg-transparent w-full px-2 text-sm text-slate-600 outline-none font-mono">
                <button onclick="copyShareUrl()" class="p-2 bg-white rounded-lg border border-slate-200 hover:bg-slate-100 active:scale-95 transition-transform text-slate-600 shadow-sm shrink-0">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                </button>
            </div>
            
            <button onclick="closeQrModal()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-700 active:scale-95 transition-all text-xl">關閉</button>
        </div>
    </div>

    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="relative w-24 h-24 mb-4">
            <div class="absolute bottom-0 w-full h-1/2 bg-[#006241] rounded-b-xl opacity-20"></div>
            <i data-lucide="sprout" class="w-16 h-16 theme-text absolute bottom-4 left-4 animate-bounce-slow"></i>
        </div>
        <h2 id="loadingText" class="text-2xl font-bold theme-text tracking-wide">皮客覓準備中...</h2>
    </div>

    <div id="lightbox" class="fixed inset-0 z-[60] bg-slate-900 hidden flex flex-col">
        <div class="flex justify-between items-center p-4 text-white absolute top-0 w-full z-10 bg-gradient-to-b from-slate-900/90 to-transparent">
            <span class="text-lg font-bold opacity-90 drop-shadow-md flex items-center gap-2"><i data-lucide="mouse-pointer-2" class="w-6 h-6"></i>滑動捲軸查看菜單</span>
            <button onclick="closeLightbox()" class="p-3 bg-white/20 hover:bg-white/40 rounded-full backdrop-blur transition-colors"><i data-lucide="x" class="w-8 h-8"></i></button>
        </div>
        
        <div class="flex-1 overflow-auto w-full h-full pt-20 pb-24 px-4 custom-scrollbar">
            <img id="lightbox-img" src="" alt="菜單" class="block mx-auto h-auto transition-[width] duration-300 origin-top">
        </div>
        
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-6 bg-slate-800/80 backdrop-blur-md px-6 py-3 rounded-full text-white z-20 shadow-xl border border-slate-700">
            <button onclick="zoomImg(-20)" class="p-3 hover:bg-white/20 rounded-full active:scale-90 transition-all"><i data-lucide="zoom-out" class="w-8 h-8"></i></button>
            <span id="zoom-level" class="text-xl font-bold font-mono w-14 text-center">100%</span>
            <button onclick="zoomImg(20)" class="p-3 hover:bg-white/20 rounded-full active:scale-90 transition-all"><i data-lucide="zoom-in" class="w-8 h-8"></i></button>
        </div>
    </div>

    <div id="loginPage" class="fixed inset-0 z-40 bg-slate-50 flex flex-col items-center justify-center p-4 overflow-y-auto transition-transform duration-500">
        <div class="w-full max-w-md my-auto py-2">
            <div class="flex flex-col items-center mb-4">
                <div class="w-20 h-20 theme-green rounded-[1.5rem] shadow-xl flex flex-col items-center justify-center relative mb-3">
                    <svg class="absolute top-2 right-2 w-6 h-6 text-white sparkle-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    <svg class="absolute top-1.5 left-3 w-4 h-4 text-white sparkle-2" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5 4.5 1.5-4.5 1.5L12 14l-1.5-4.5-4.5-1.5 4.5-1.5z"/></svg>
                    <svg class="w-8 h-8 text-white mt-0.5 animate-bounce-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.7-4.3 1.4-4.9 2z"/></svg>
                    <div class="absolute bottom-0 w-12 h-5 bg-white/20 rounded-t-xl backdrop-blur-sm border-t border-white/30 flex justify-center gap-1.5 pt-1">
                        <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                    </div>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-wider">皮客覓</h1>
                <p class="text-sm font-bold theme-text tracking-[0.3em] mt-0.5 uppercase">PickMeal <span class="text-slate-400 font-normal ml-1">v2.0</span></p>
                <p id="loginSubtitle" class="text-base text-slate-500 mt-2 font-medium">探險家，準備好出發採集物資了嗎？</p>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-4 border border-slate-100 relative overflow-hidden">
                <div id="guestModeBadge" class="absolute top-0 right-0 bg-amber-500 text-white text-xs font-bold px-3 py-1 rounded-bl-xl hidden shadow-sm">團購快速報到</div>
                
                <div class="space-y-3">
                    <div id="usernameGroup">
                        <label class="block text-sm font-bold text-slate-500 mb-1 ml-1">探險家帳號</label>
                        <input type="text" id="username" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#006241] focus:bg-white transition-all text-base" placeholder="請輸入帳號">
                    </div>
                    <div id="passwordGroup">
                        <label class="block text-sm font-bold text-slate-500 mb-1 ml-1">通關密碼</label>
                        <input type="password" id="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#006241] focus:bg-white transition-all text-base" placeholder="請輸入密碼">
                    </div>
                    <div>
                        <label id="nameLabel" class="block text-sm font-bold text-slate-500 mb-1 ml-1">稱呼 <span class="text-slate-400 font-normal" id="nameOptionalText">(選填)</span></label>
                        <input type="text" id="displayName" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#006241] focus:bg-white transition-all text-base" placeholder="您希望皮客覓怎麼稱呼您？">
                    </div>
                    <button onclick="login()" id="loginBtn" class="w-full theme-green text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-900/20 mt-2 flex justify-center items-center gap-2 hover:bg-emerald-800 active:scale-95 transition-all text-lg">
                        <i data-lucide="log-in" class="w-5 h-5"></i> <span id="loginBtnText">登入基地</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden flex-1 flex flex-col h-full bg-slate-50 relative">
        <header class="bg-white px-5 py-4 shadow-sm z-20 flex justify-between items-center sticky top-0">
            <div class="flex items-center gap-3">
                <i data-lucide="sprout" class="w-9 h-9 theme-text"></i>
                <div>
                    <h1 class="text-3xl font-black text-slate-800 leading-tight">皮客覓</h1>
                    <p class="text-[12px] theme-text font-bold tracking-widest leading-none mt-1">PICKMEAL <span class="text-slate-400 font-normal ml-1">v2.0</span></p>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xl font-bold text-slate-700" id="userGreeting">探險家</div>
                <div class="text-base text-slate-500 mt-1 font-medium" id="appDeadline">截止時間: 載入中</div>
            </div>
        </header>
        
        <div class="bg-white px-5 py-3 border-b border-slate-100 flex items-center gap-2 z-10 shadow-sm">
            <i data-lucide="sun" class="w-7 h-7 text-amber-500"></i>
            <p class="text-lg font-bold text-slate-600">探險家，今天想尋覓什麼美味呢？</p>
        </div>

        <main id="mainContent" class="flex-1 overflow-y-auto no-scrollbar pb-safe w-full max-w-3xl mx-auto"></main>

        <div id="batchSaveBar" class="fixed bottom-[calc(4.5rem+env(safe-area-inset-bottom))] w-full max-w-3xl left-1/2 -translate-x-1/2 p-4 z-40 hidden transition-all transform translate-y-full opacity-0">
            <div class="bg-slate-800 rounded-2xl p-4 flex justify-between items-center shadow-2xl border-t border-slate-700 gap-2">
                <div class="text-white flex items-center gap-3">
                    <i data-lucide="save" class="w-6 h-6 text-emerald-400 shrink-0"></i>
                    <div>
                        <p class="text-sm text-slate-400 font-bold leading-none mb-1">有變更尚未儲存</p>
                        <p id="batchSaveCountText" class="text-lg font-black leading-none truncate">待更新 X 筆資料</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="cancelBatchUpdates()" class="bg-slate-600 text-white font-bold px-4 py-3 rounded-xl flex items-center gap-2 hover:bg-slate-500 active:scale-95 transition-transform shadow-lg text-sm sm:text-base">
                        <i data-lucide="x" class="w-5 h-5 hidden sm:block"></i> 取消
                    </button>
                    <button onclick="commitBatchUpdates()" class="bg-emerald-500 text-white font-bold px-4 sm:px-6 py-3 rounded-xl flex items-center gap-1 sm:gap-2 hover:bg-emerald-600 active:scale-95 transition-transform shadow-lg text-sm sm:text-base">
                        <i data-lucide="check-circle" class="w-5 h-5 hidden sm:block"></i> 儲存變更
                    </button>
                </div>
            </div>
        </div>

        <nav class="bg-white border-t border-slate-100 px-6 py-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] flex justify-between items-center fixed bottom-0 w-full max-w-3xl left-1/2 -translate-x-1/2 z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.04)] rounded-t-3xl">
            <button onclick="switchTab('menu')" id="tab-menu" class="flex flex-col items-center p-2 flex-1 theme-text transition-transform active:scale-90">
                <i data-lucide="map" class="w-8 h-8 mb-1"></i>
                <span class="text-base font-bold">探索菜單</span>
            </button>
            <button onclick="switchTab('cart')" id="tab-cart" class="flex flex-col items-center p-2 flex-1 text-slate-400 hover:text-slate-600 transition-transform active:scale-90 relative">
                <i data-lucide="backpack" class="w-8 h-8 mb-1"></i>
                <span class="text-base font-bold">物資背包</span>
                <span id="cartBadge" class="absolute top-1 right-1/4 translate-x-3 -translate-y-1 bg-red-500 text-white text-sm font-bold px-2 py-0.5 rounded-full hidden">0</span>
            </button>
            <button onclick="switchTab('profile')" id="tab-profile" class="flex flex-col items-center p-2 flex-1 text-slate-400 hover:text-slate-600 transition-transform active:scale-90">
                <i id="profileIcon" data-lucide="user" class="w-8 h-8 mb-1"></i>
                <span id="profileTabText" class="text-base font-bold">指揮所</span>
            </button>
        </nav>
    </div>

    <div id="itemModal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden opacity-0 transition-opacity flex flex-col justify-end">
        <div class="bg-white w-full max-w-3xl mx-auto rounded-t-3xl shadow-2xl p-4 sm:p-6 transform translate-y-full transition-transform duration-300 max-h-[85vh] flex flex-col">
            <div class="w-16 h-1.5 bg-slate-200 rounded-full mx-auto mb-4 sm:mb-5 shrink-0"></div>
            <div class="flex justify-between items-start mb-4 sm:mb-5 shrink-0">
                <div class="flex-1 pr-4">
                    <h2 id="modalItemName" class="text-2xl sm:text-3xl font-black text-slate-800 leading-snug break-words"></h2>
                    <p id="modalItemPrice" class="theme-text font-black text-2xl sm:text-3xl mt-1 sm:mt-2"></p>
                </div>
                <button onclick="closeItemModal()" class="p-2 sm:p-3 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-600 shrink-0 transition-colors"><i data-lucide="x" class="w-6 h-6 sm:w-8 sm:h-8"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto no-scrollbar -mx-2 px-2" id="modalOptionsArea"></div>

            <div class="mt-4 sm:mt-6 pt-4 sm:pt-5 border-t border-slate-100 shrink-0 flex gap-3 sm:gap-4 items-center">
                <div class="flex items-center bg-slate-100 rounded-xl p-1 sm:p-1.5">
                    <button onclick="adjustQty(-1)" class="w-10 h-10 sm:w-14 sm:h-14 flex items-center justify-center text-slate-600 font-bold text-3xl sm:text-4xl active:bg-slate-200 rounded-lg pb-1">-</button>
                    <span id="modalQty" class="w-10 sm:w-12 text-center font-bold text-xl sm:text-2xl text-slate-800">1</span>
                    <button onclick="adjustQty(1)" class="w-10 h-10 sm:w-14 sm:h-14 flex items-center justify-center text-slate-600 font-bold text-3xl sm:text-4xl active:bg-slate-200 rounded-lg pb-1">+</button>
                </div>
                <button onclick="addToCart()" class="flex-1 theme-green text-white font-bold py-3 sm:py-4 rounded-xl flex justify-center items-center gap-2 active:scale-95 transition-transform text-xl sm:text-2xl">
                    <i data-lucide="plus" class="w-5 h-5 sm:w-7 sm:h-7"></i> 放入背包 <span id="modalBtnPrice" class="ml-1 sm:ml-2 bg-white/20 px-2 py-0.5 sm:px-3 sm:py-1 rounded text-lg sm:text-xl"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // *** 替換成您的最新 Google Apps Script 部署網址 ***
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZomnJRCpnTT6IJXXuCBdTlaqDhPITyt-2ACh8JZBz42rctAaAfYdpwNYgBtvzHXtNCQ/exec'; 
        
        const state = {
            user: null, token: null, isGuestMode: false,
            system: { isOpen: false, openedShops: [], deadline: '' },
            data: { allShops: [], menuData: {}, shopImages: {}, shopPhones: {}, shopExtraNames: {}, userOrders: [], popularityCache: {} },
            cart: [], currentTab: 'menu', activeShop: '',
            tempItem: null, adminProxyName: '', sortByPop: false,
            pendingUpdates: {},
            adminDataCache: null
        };

        lucide.createIcons();

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isGuestLogin = urlParams.get('guest') === '1';

            if (isGuestLogin) {
                state.isGuestMode = true;
                document.getElementById('usernameGroup').classList.add('hidden');
                document.getElementById('passwordGroup').classList.add('hidden');
                document.getElementById('guestModeBadge').classList.remove('hidden');
                document.getElementById('nameLabel').innerHTML = '請輸入您的暱稱 (必填) <span class="text-red-500">*</span>';
                document.getElementById('nameOptionalText')?.remove();
                document.getElementById('loginBtnText').textContent = '開始點餐';
                document.getElementById('loginSubtitle').textContent = '團長已經開好表單，填寫暱稱即可加入！';
                
                document.getElementById('loginPage').classList.remove('-translate-y-full');
            } else {
                const savedToken = localStorage.getItem('pickmeal_token');
                const savedUser = localStorage.getItem('pickmeal_user');
                if (savedToken && savedUser) {
                    state.token = savedToken;
                    state.user = JSON.parse(savedUser);
                    
                    const isGuestUser = state.user.isGuest || state.user.role !== '管理';
                    document.getElementById('profileTabText').textContent = isGuestUser ? '我的紀錄' : '指揮所';
                    document.getElementById('profileIcon').setAttribute('data-lucide', isGuestUser ? 'file-text' : 'user');
                    
                    loadInitialData();
                } else {
                    document.getElementById('loginPage').classList.remove('-translate-y-full');
                }
            }
        };

        function showLoading(text = '皮客覓準備中...') {
            document.getElementById('loadingText').textContent = text;
            const el = document.getElementById('loading');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.remove('opacity-0'), 10);
        }
        function hideLoading() {
            const el = document.getElementById('loading');
            el.classList.add('opacity-0');
            setTimeout(() => el.classList.add('hidden'), 300);
        }

        function showAlert(msg, title = '系統提示') {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = msg;
            const el = document.getElementById('alertBox');
            el.classList.remove('hidden');
            setTimeout(() => {
                el.classList.remove('opacity-0');
                el.querySelector('div').classList.remove('scale-95');
            }, 10);
        }
        function closeAlert() {
            const el = document.getElementById('alertBox');
            el.classList.add('opacity-0');
            el.querySelector('div').classList.add('scale-95');
            setTimeout(() => el.classList.add('hidden'), 300);
        }

        let confirmCallback = null;
        function showConfirm(msg, callback) {
            document.getElementById('confirmMessage').textContent = msg;
            confirmCallback = callback;
            const el = document.getElementById('confirmBox');
            el.classList.remove('hidden');
            setTimeout(() => {
                el.classList.remove('opacity-0');
                el.querySelector('div').classList.remove('scale-95');
            }, 10);
        }
        function closeConfirm(result) {
            const el = document.getElementById('confirmBox');
            el.classList.add('opacity-0');
            el.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                el.classList.add('hidden');
                if (result && confirmCallback) confirmCallback();
            }, 300);
        }

        async function apiCall(action, data = {}) {
            if(!SCRIPT_URL) {
                showAlert('請先在 HTML 中設定 SCRIPT_URL 網址！', '系統設定錯誤');
                hideLoading(); return null;
            }
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, token: state.token, data })
                });
                const result = await response.json();
                if (result.status === 'error') {
                    if (result.message.includes('Token')) logout();
                    throw new Error(result.message);
                }
                return result.data;
            } catch (error) {
                hideLoading();
                showAlert(error.message, '連線異常');
                return null;
            }
        }

        async function login() {
            const n = document.getElementById('displayName').value.trim();

            if (state.isGuestMode) {
                if (!n) return showAlert('必須輸入您的稱呼，才能幫您標記物資喔！');
                showLoading('正在為您建立臨時通行證...');
                const res = await apiCall('guestLogin', { name: n });
                handleLoginSuccess(res);
            } else {
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value.trim();
                if (!u || !p) return showAlert('請輸入完整的探險家帳號與密碼！');

                showLoading('正在驗證探險家身分...');
                const res = await apiCall('login', { username: u, password: p, name: n });
                handleLoginSuccess(res);
            }
        }

        function handleLoginSuccess(res) {
            if (res) {
                state.token = res.token;
                state.user = res.user;
                localStorage.setItem('pickmeal_token', res.token);
                localStorage.setItem('pickmeal_user', JSON.stringify(res.user));
                
                const isGuest = state.user.isGuest || state.user.role !== '管理';
                document.getElementById('profileTabText').textContent = isGuest ? '我的紀錄' : '指揮所';
                document.getElementById('profileIcon').setAttribute('data-lucide', isGuest ? 'file-text' : 'user');
                
                processInitialData(res.initialData);
                enterApp();
            }
        }

        function logout() {
            localStorage.removeItem('pickmeal_token');
            localStorage.removeItem('pickmeal_user');
            window.location.href = window.location.pathname;
        }

        async function loadInitialData() {
            showLoading('正在與基地同步資料...');
            const res = await apiCall('getInitialData');
            if (res) {
                processInitialData(res);
                enterApp();
            }
        }

        function processInitialData(data) {
            state.system = data.systemStatus;
            state.data = data;
            
            const roleName = state.user.isGuest ? '探險家(團購)' : (state.user.role === '管理' ? '指揮官' : '探險家');
            document.getElementById('userGreeting').textContent = `${roleName} ${state.user.name}`;
            document.getElementById('appDeadline').textContent = state.system.deadline ? `打烊時間: ${state.system.deadline}` : '隨時可發射洋蔥號';
            
            if (state.system.openedShops.length > 0 && (!state.activeShop || !state.system.openedShops.includes(state.activeShop))) {
                state.activeShop = state.system.openedShops[0];
            }
        }

        function enterApp() {
            hideLoading();
            document.getElementById('loginPage').classList.add('-translate-y-full');
            document.getElementById('mainApp').classList.remove('hidden');
            switchTab('menu');
        }

        function switchTab(tabId) {
            state.currentTab = tabId;
            ['menu', 'cart', 'profile'].forEach(id => {
                const btn = document.getElementById(`tab-${id}`);
                if (id === tabId) {
                    btn.classList.add('theme-text');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('theme-text');
                    btn.classList.add('text-slate-400');
                }
            });
            const content = document.getElementById('mainContent');
            if (tabId === 'menu') renderMenuTab(content);
            if (tabId === 'cart') renderCartTab(content);
            if (tabId === 'profile') renderProfileTab(content);
            lucide.createIcons();
        }

        function renderMenuTab(container) {
            if (!state.system.isOpen) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-8 text-center text-slate-500">
                        <div class="w-28 h-28 theme-light rounded-full flex items-center justify-center mb-6">
                            <i data-lucide="moon" class="w-14 h-14 theme-text"></i>
                        </div>
                        <h2 class="text-4xl font-bold text-slate-700 mb-4">日落了</h2>
                        <p class="text-2xl leading-relaxed">皮客覓已休息，<br>目前基地不開放物資採集。</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            let html = `<div class="p-4 space-y-5">`;

            if (state.user.role === '管理') {
                html += `
                <div class="bg-amber-50 border border-amber-200 rounded-3xl p-5 shadow-sm relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-24 h-24 bg-amber-100 rounded-bl-full -z-10"></div>
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="headset" class="w-8 h-8 text-amber-600"></i>
                        <span class="font-bold text-amber-800 text-xl">指揮官呼叫支援 (代點模式)</span>
                    </div>
                    <input type="text" id="proxyNameInput" value="${state.adminProxyName}" onchange="state.adminProxyName = this.value" class="w-full bg-white border border-amber-200 rounded-xl px-4 py-4 text-xl focus:outline-none focus:ring-2 focus:ring-amber-500" placeholder="輸入代點姓名 (留空則為自己點)">
                </div>`;
            }

            html += `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-2 flex overflow-x-auto no-scrollbar gap-2 sticky top-0 z-10">
                    ${state.system.openedShops.map(shop => `
                        <button onclick="state.activeShop='${shop}'; renderMenuTab(document.getElementById('mainContent'))" 
                            class="whitespace-nowrap px-6 py-4 rounded-2xl font-bold text-xl transition-all ${state.activeShop === shop ? 'theme-green text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}">
                            ${shop}
                        </button>
                    `).join('')}
                </div>`;

            const imgUrl = state.data.shopImages[state.activeShop];
            const phone = state.data.shopPhones[state.activeShop];
            const extraName = state.data.shopExtraNames ? state.data.shopExtraNames[state.activeShop] : '';
            
            let phoneBtnText = '';
            if (extraName && phone) phoneBtnText = `${extraName} ． ${phone}`;
            else if (extraName) phoneBtnText = extraName;
            else if (phone) phoneBtnText = phone;

            if (imgUrl || phoneBtnText) {
                html += `<div class="flex gap-4 mt-2">`;
                if(imgUrl) {
                    const isImg = imgUrl.match(/\.(jpeg|jpg|gif|png|webp)$/i) != null || imgUrl.includes('drive.google') || imgUrl.includes('imgur');
                    const clickAction = isImg ? `openLightbox('${imgUrl}')` : `window.open('${imgUrl}', '_blank')`;
                    const iconName = isImg ? 'image' : 'external-link';
                    
                    html += `
                    <div class="flex-1 bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex items-center justify-center cursor-pointer hover:bg-slate-50 active:scale-95 transition-all min-w-0" onclick="${clickAction}">
                        <div class="flex items-center gap-2 min-w-0">
                            <div class="w-10 h-10 theme-light rounded-xl flex items-center justify-center shrink-0"><i data-lucide="${iconName}" class="w-6 h-6 theme-text"></i></div>
                            <span class="font-bold text-slate-700 text-lg truncate">${isImg ? '查看菜單' : '前往官網'}</span>
                        </div>
                    </div>`;
                }
                if(phoneBtnText) {
                    const asTag = phone ? `a href="tel:${phone}"` : `div`;
                    const closeTag = phone ? `a` : `div`;
                    const icon = phone ? `phone` : `store`;
                    
                    html += `
                    <${asTag} class="${phone ? 'cursor-pointer hover:bg-slate-700 active:scale-95' : ''} bg-slate-800 text-white rounded-2xl p-4 shadow-sm flex items-center justify-center gap-2 transition-all px-4 flex-1 min-w-0">
                        <i data-lucide="${icon}" class="w-6 h-6 shrink-0"></i>
                        <span class="truncate font-bold text-lg">${phoneBtnText}</span>
                    </${closeTag}>`;
                }
                html += `</div>`;
            }

            html += `
            <div class="flex justify-between items-center px-2 mb-2 mt-4 border-t border-slate-200 pt-4">
                <span class="text-xl font-bold text-slate-500">選擇美味</span>
                <label class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform">
                    <span class="text-lg font-bold ${state.sortByPop ? 'text-red-500' : 'text-slate-400'}"><i data-lucide="flame" class="w-5 h-5 inline pb-0.5"></i> 人氣熱銷排序</span>
                    <div class="relative inline-flex items-center">
                        <input type="checkbox" class="sr-only peer" onchange="state.sortByPop = this.checked; renderMenuTab(document.getElementById('mainContent'));" ${state.sortByPop ? 'checked' : ''}>
                        <div class="w-14 h-8 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[3px] after:left-[3px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-red-500"></div>
                    </div>
                </label>
            </div>`;

            const menu = state.data.menuData[state.activeShop] || [];
            
            let processedItems = [];
            menu.forEach((item, index) => {
                if (!item['品項']) return;
                let basePrice = 0;
                let priceLabels = [];
                for (let key in item) {
                    if (key === '_originalIndex' || key === '類別' || key === '品項' || key === '_originalRawIndex') continue;
                    if (key.includes('價格') || key.includes('單價') || key === 'L' || key === 'M' || key === '瓶') {
                        const p = parseInt(item[key]);
                        if (!isNaN(p) && p > 0) {
                            priceLabels.push({ label: key, price: p });
                            if (basePrice === 0) basePrice = p;
                        }
                    }
                }
                
                if (basePrice > 0) {
                    const pop = state.data.popularityCache && state.data.popularityCache[item['品項']] ? parseInt(state.data.popularityCache[item['品項']]) : 0;
                    processedItems.push({
                        rawItem: item,
                        rawIndex: item._originalRawIndex !== undefined ? item._originalRawIndex : index,
                        category: item['類別'] || '其他美味',
                        basePrice: basePrice,
                        priceLabels: priceLabels,
                        pop: pop
                    });
                }
            });

            if (state.sortByPop) {
                processedItems.sort((a, b) => b.pop - a.pop);
                
                html += `
                <details class="group bg-white mb-5 rounded-3xl shadow-sm border border-red-200 overflow-hidden" open>
                    <summary class="px-5 py-5 font-black text-[22px] text-red-800 cursor-pointer flex justify-between items-center bg-red-50 hover:bg-red-100 group-open:bg-red-500 group-open:text-white transition-colors border-b border-red-100">
                        <span class="flex items-center gap-2"><i data-lucide="flame" class="w-7 h-7"></i> 人氣排行榜</span>
                        <i data-lucide="chevron-down" class="w-8 h-8 transition-transform group-open:rotate-180"></i>
                    </summary>
                    <div class="divide-y divide-slate-100 bg-white">
                `;
                processedItems.forEach(pItem => {
                    html += renderMenuItemRow(pItem);
                });
                html += `</div></details>`;
            } else {
                let groupedMenu = {};
                processedItems.forEach(pItem => {
                    if (!groupedMenu[pItem.category]) groupedMenu[pItem.category] = [];
                    groupedMenu[pItem.category].push(pItem);
                });

                let catIndex = 0;
                for (let cat in groupedMenu) {
                    const isOpen = catIndex === 0 ? 'open' : ''; 
                    
                    html += `
                    <details class="group bg-white mb-5 rounded-3xl shadow-sm border border-slate-200 overflow-hidden" ${isOpen}>
                        <summary class="px-5 py-5 font-black text-[22px] text-slate-800 cursor-pointer flex justify-between items-center bg-slate-100 hover:bg-slate-200 group-open:bg-[#006241] group-open:text-white transition-colors border-b border-slate-200">
                            ${cat}
                            <i data-lucide="chevron-down" class="w-8 h-8 transition-transform group-open:rotate-180"></i>
                        </summary>
                        <div class="divide-y divide-slate-100 bg-white">
                    `;

                    groupedMenu[cat].forEach(pItem => {
                        html += renderMenuItemRow(pItem);
                    });

                    html += `</div></details>`;
                    catIndex++;
                }
            }
            
            html += `</div>`;
            container.innerHTML = html;
            lucide.createIcons();
        }

        function renderMenuItemRow(pItem) {
            return `
            <div onclick="openItemModal(${pItem.rawIndex})" class="px-5 py-5 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-colors gap-4">
                <div class="flex-1 min-w-0 pr-2">
                    <h4 class="font-bold text-slate-800 text-[21px] leading-snug mb-1 break-words">
                        ${pItem.rawItem['品項']}
                        ${pItem.pop > 0 ? `<span class="inline-flex items-center gap-1 text-base font-bold text-red-500 bg-red-50 px-2.5 py-0.5 rounded-full ml-1 align-middle whitespace-nowrap"><i data-lucide="flame" class="w-4 h-4"></i>${pItem.pop}</span>` : ''}
                    </h4>
                    ${pItem.priceLabels.length > 1 ? `<p class="text-lg text-slate-400 mt-1">多種規格可選</p>` : ''}
                </div>
                <div class="flex items-center gap-3 shrink-0">
                    <span class="font-black theme-text text-[28px] tracking-tight">$${pItem.basePrice}</span>
                    <div class="w-12 h-12 rounded-full theme-light flex items-center justify-center shrink-0">
                        <i data-lucide="plus" class="w-7 h-7 theme-text"></i>
                    </div>
                </div>
            </div>`;
        }

        function openItemModal(itemIndex) {
            const itemData = state.data.menuData[state.activeShop][itemIndex];
            
            state.tempItem = {
                shop: state.activeShop, name: itemData['品項'], basePrice: 0,
                selectedSpec: {}, extraPrice: 0, quantity: 1
            };

            document.getElementById('modalItemName').textContent = itemData['品項'];
            document.getElementById('modalQty').textContent = '1';

            let optionsHtml = '';
            let isFirstPriceSet = false;

            for (let key in itemData) {
                if (key === '_originalIndex' || key === '類別' || key === '品項' || !itemData[key]) continue;

                if (key.includes('價格') || key.includes('單價') || key === 'L' || key === 'M' || key === '瓶') {
                    const price = parseInt(itemData[key]);
                    if (!isNaN(price)) {
                        if(!isFirstPriceSet) {
                            state.tempItem.basePrice = price;
                            state.tempItem.selectedSpec['規格'] = key.includes('單價') ? '' : key;
                            isFirstPriceSet = true;
                        }
                        
                        optionsHtml += `
                        <div class="mb-4 sm:mb-6">
                            <h4 class="text-base sm:text-lg font-bold text-slate-500 mb-2 sm:mb-3 border-l-4 border-[#006241] pl-2 sm:pl-3">選擇${key.includes('單價') ? '價格' : '規格'}</h4>
                            <div class="flex flex-wrap gap-2 sm:gap-3">
                                <label class="relative cursor-pointer">
                                    <input type="radio" name="spec_price" value="${price}" data-label="${key.includes('單價') ? '' : key}" class="peer sr-only" ${isFirstPriceSet && state.tempItem.basePrice === price ? 'checked' : ''} onchange="updateTempItemSpec('規格', this.dataset.label, ${price})">
                                    <div class="px-4 py-2 sm:px-6 sm:py-4 rounded-xl border-2 border-slate-200 text-lg sm:text-xl font-bold text-slate-600 peer-checked:bg-[#006241] peer-checked:text-white peer-checked:border-[#006241] transition-all">
                                        ${key.includes('單價') ? `單價 (+$${price})` : `${key} (+$${price})`}
                                    </div>
                                </label>
                            </div>
                        </div>`;
                    }
                } else {
                    const optString = String(itemData[key]);
                    const options = optString.split(/[\/,]/).map(s => s.trim()).filter(s => s);
                    
                    if (key === '說明' || key === '備註' || key === '描述') {
                        optionsHtml += `
                        <div class="mb-4 sm:mb-6 bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-100">
                            <h4 class="text-sm sm:text-lg font-bold text-slate-600 mb-2 flex justify-between items-center">
                                <span>${key}</span>
                            </h4>
                            <p class="text-base sm:text-lg text-slate-700 leading-relaxed font-medium">${optString}</p>
                        </div>`;
                    } else if (options.length > 0) {
                        state.tempItem.selectedSpec[key] = '';
                        optionsHtml += `
                        <div class="mb-4 sm:mb-6 bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-100">
                            <h4 class="text-sm sm:text-lg font-bold text-slate-600 mb-2 sm:mb-3 flex justify-between items-center">
                                <span>${key}</span>
                                <span class="text-xs sm:text-base font-normal text-slate-400 bg-white px-2 py-0.5 sm:px-3 sm:py-1 rounded-full border border-slate-200">必選</span>
                            </h4>
                            <select onchange="updateTempItemOption('${key}', this.value)" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-3 sm:px-4 sm:py-4 text-base sm:text-xl font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-[#006241] appearance-none cursor-pointer">
                                <option value="" disabled selected>-- 請選擇 --</option>`;
                        
                        options.forEach(opt => {
                            let extra = 0; let displayName = opt;
                            // 完美修正：安全解析加價與括號，避免殘留空括號 ()
                            const priceMatch = opt.match(/\+\s*\$?\s*(\d+)/); 
                            if (priceMatch) {
                                extra = parseInt(priceMatch[1]);
                                // 去除匹配到的金額字串，再清掉包含空白的括號
                                let cleanName = opt.replace(priceMatch[0], '').replace(/\(\s*\)/g, '').trim();
                                displayName = cleanName + ` (+$${extra})`;
                            }
                            const valueData = `${displayName}|${extra}`;
                            optionsHtml += `<option value="${valueData}">${displayName}</option>`;
                        });
                        
                        optionsHtml += `</select></div>`;
                    }
                }
            }

            document.getElementById('modalOptionsArea').innerHTML = optionsHtml;
            updateModalPrice();
            
            const modal = document.getElementById('itemModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('translate-y-full');
            }, 10);
        }

        function closeItemModal() {
            const modal = document.getElementById('itemModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
            state.tempItem = null;
        }

        function updateTempItemSpec(groupName, label, basePrice) {
            state.tempItem.basePrice = basePrice;
            state.tempItem.selectedSpec[groupName] = label;
            updateModalPrice();
        }

        function updateTempItemOption(groupName, valueData) {
            state.tempItem.selectedSpec[groupName] = valueData;
            let totalExtra = 0;
            for(let key in state.tempItem.selectedSpec) {
                if(key !== '規格' && state.tempItem.selectedSpec[key]) {
                    const parts = state.tempItem.selectedSpec[key].split('|');
                    if(parts.length > 1) totalExtra += parseInt(parts[1]);
                }
            }
            state.tempItem.extraPrice = totalExtra;
            updateModalPrice();
        }

        function adjustQty(delta) {
            let q = state.tempItem.quantity + delta;
            if (q < 1) q = 1;
            state.tempItem.quantity = q;
            document.getElementById('modalQty').textContent = q;
            updateModalPrice();
        }

        function updateModalPrice() {
            const singlePrice = state.tempItem.basePrice + state.tempItem.extraPrice;
            const total = singlePrice * state.tempItem.quantity;
            document.getElementById('modalItemPrice').textContent = `$${singlePrice}`;
            document.getElementById('modalBtnPrice').textContent = `$${total}`;
        }

        function addToCart() {
            for(let key in state.tempItem.selectedSpec) {
                if(key !== '規格' && !state.tempItem.selectedSpec[key]) {
                    return showAlert(`請選擇「${key}」！`);
                }
            }

            let specArr = [];
            if(state.tempItem.selectedSpec['規格']) specArr.push(state.tempItem.selectedSpec['規格']);
            for(let key in state.tempItem.selectedSpec) {
                if(key !== '規格' && state.tempItem.selectedSpec[key]) {
                     specArr.push(state.tempItem.selectedSpec[key].split('|')[0]);
                }
            }
            const finalSpec = specArr.join(' / ');
            const finalPrice = state.tempItem.basePrice + state.tempItem.extraPrice;

            state.cart.push({
                shop: state.tempItem.shop, name: state.tempItem.name,
                spec: finalSpec, price: finalPrice, quantity: state.tempItem.quantity,
                name_override: state.adminProxyName || ''
            });

            updateCartBadge();
            closeItemModal();
            
            const tabBtn = document.getElementById('tab-cart');
            tabBtn.classList.add('scale-110', 'text-[#006241]');
            setTimeout(() => tabBtn.classList.remove('scale-110', 'text-[#006241]'), 300);
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (state.cart.length > 0) {
                badge.textContent = state.cart.length;
                badge.classList.remove('hidden');
                badge.classList.add('animate-sprout');
                setTimeout(()=> badge.classList.remove('animate-sprout'), 600);
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderCartTab(container) {
            if (state.cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-8 text-center">
                        <div class="w-36 h-36 bg-slate-100 rounded-full flex items-center justify-center mb-6 relative">
                            <div class="absolute bottom-4 w-20 h-14 bg-slate-300 rounded-b-xl"></div>
                            <div class="absolute bottom-20 w-5 h-5 bg-slate-200 rounded-full"></div>
                        </div>
                        <h2 class="text-3xl font-bold text-slate-700 mb-3">物資背包空空的</h2>
                        <p class="text-slate-500 text-xl">趕快去菜單播下美味的種子吧！</p>

        function checkIsPastDeadline() {
            if (!state.system.deadline) return false;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            return timeStr > state.system.deadline;
        }

        async function submitOrder() {
            if (checkIsPastDeadline()) {
                showAlert('已經超過今日點餐截止時間，皮客覓無法為您搬運物資囉！', '日落了');
                return;
            }
            showLoading('皮客覓奮力處理訂單中...');
            const res = await apiCall('submitOrder', state.cart);
            if (res) {
                showAlert(res, '發射成功！');
                state.cart = [];
                updateCartBadge();
                loadInitialData();
            }
        }

        async function deleteOrder(id) {
            showLoading('正在取消派遣...');
            const res = await apiCall('deleteOrder', { orderId: id });
            if (res) { showAlert(res); loadInitialData(); }
        }

        async function fetchAdminData(viewType) {
            showLoading('讀取物資報告中...');
            const res = await apiCall('adminGetTodayData');
            hideLoading();
            if (res) {
                state.adminDataCache = res; 
                const container = document.getElementById('mainContent');
                if (viewType === 'dashboard') renderAdminDashboard(container, res.summaryByUser);
                if (viewType === 'list') renderAdminOrderList(container, res.summaryByShop);
            }
        }

        function renderAdminDashboard(container, summaryByUser) {
            state.pendingUpdates = {}; 
            hideBatchSaveBar();

                        <div class="flex justify-between items-end mb-4 border-b border-slate-100 pb-4">

                            <div class="text-right">
                                <p class="text-base text-slate-400 font-bold mb-1">應收總計</p>
                                <p class="text-[40px] font-black theme-text leading-none">$${user.total}</p>
                            </div>
                        </div>
                        
                        <div class="space-y-3">`;

                    user.orders.forEach(order => {
                        contentHtml += `
                            <div class="order-item-container flex justify-between items-start p-4 bg-slate-50 rounded-2xl relative transition-all">
                                <div class="flex-1 min-w-0 pr-6">
                                    <span class="text-sm font-bold text-white bg-slate-800 px-2 py-1 rounded mr-2 align-middle inline-block mb-1">${order['店家']}</span>
                                    <span class="font-bold text-slate-700 text-xl align-middle break-words inline-block">${order['品項']} x${order['數量']}</span>
                                    ${order['規格']||order['訂購內容'] ? `<p class="text-lg text-slate-500 mt-1 break-words">${order['規格']||order['訂購內容']}</p>` : ''}
                                </div>
                                <div class="flex flex-col items-end gap-3 shrink-0">
                                    <span class="font-bold text-slate-700 text-2xl leading-none">$${order['小計']}</span>
                                    <button onclick="queueDeleteOrder('${order['訂單編號']}', this)" class="text-slate-400 hover:text-red-500 bg-white shadow-sm p-2.5 rounded-full border border-slate-200 transition-colors active:scale-90" title="標記刪除此訂單">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>`;
                    });

                    contentHtml += `

                        <div class="flex gap-4 mt-6 pt-5 border-t border-slate-100">
                            <button id="btn-pay-${user.name}" onclick="queueStatusUpdate('${orderIds}', 'pay', '${user.paid ? '未繳費' : '已繳費'}', this, '${user.name}')" 
                                class="flex-1 py-4 rounded-xl text-xl font-bold transition-all flex items-center justify-center gap-2 ${user.paid ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-white border-2 border-slate-200 text-slate-600 active:bg-slate-50 shadow-sm'}">
                                <i data-lucide="dollar-sign" class="w-7 h-7"></i> <span>${user.paid ? '已收全額' : '一鍵收滿全額'}</span>

                            <button id="btn-take-${user.name}" onclick="queueStatusUpdate('${orderIds}', 'take', '${user.taken ? '未取餐' : '已取餐'}', this, '${user.name}')" 
                                class="flex-1 py-4 rounded-xl text-xl font-bold transition-all flex items-center justify-center gap-2 ${user.taken ? 'bg-blue-100 text-blue-700 border border-blue-200' : 'bg-white border-2 border-slate-200 text-slate-600 active:bg-slate-50 shadow-sm'}">
                                <i data-lucide="coffee" class="w-7 h-7"></i> <span>${user.taken ? '已全給餐' : '一鍵全部給餐'}</span>

                    </div>
                    ${summaryByUser.length > 0 ? `<button onclick="exportPdf('dispatch')" class="bg-slate-800 text-white font-bold py-2.5 px-4 rounded-xl flex items-center gap-2 hover:bg-slate-700 active:scale-95 transition-all text-lg shadow-sm"><i data-lucide="printer" class="w-5 h-5"></i> 匯出 PDF</button>` : ''}
                </div>
                ${contentHtml}
            </div>`;
            lucide.createIcons();
        }

        function queueStatusUpdate(orderIds, type, status, btnElement, userName) {
            const ids = orderIds.split(',');
            ids.forEach(id => {
                if (!state.pendingUpdates[id]) state.pendingUpdates[id] = {};
                state.pendingUpdates[id][type] = status;
            });

            const isDone = (status === '已繳費' || status === '已取餐');
            const colorClass = type === 'pay' ? 'emerald' : 'blue';
            const iconName = type === 'pay' ? 'dollar-sign' : 'coffee';
            const textDone = type === 'pay' ? '已收全額' : '已全給餐';
            const textNotDone = type === 'pay' ? '一鍵收滿全額' : '一鍵全部給餐';

            btnElement.className = `flex-1 py-4 rounded-xl text-xl font-bold transition-all flex items-center justify-center gap-2 ${isDone ? `bg-${colorClass}-100 text-${colorClass}-700 border border-${colorClass}-200` : 'bg-white border-2 border-slate-200 text-slate-600 active:bg-slate-50 shadow-sm'}`;
            btnElement.innerHTML = `<i data-lucide="${iconName}" class="w-7 h-7"></i> <span>${isDone ? textDone : textNotDone}</span>`;
            
            const nextStatus = isDone ? (type==='pay'?'未繳費':'未取餐') : (type==='pay'?'已繳費':'已取餐');
            btnElement.setAttribute('onclick', `queueStatusUpdate('${orderIds}', '${type}', '${nextStatus}', this, '${userName}')`);

            checkUserAllDone(userName);
            lucide.createIcons();
            updateBatchSaveBar();
        }

        function queueDeleteOrder(orderId, btnElement) {
            const isDeleting = state.pendingUpdates[orderId] && state.pendingUpdates[orderId].delete;

            if (isDeleting) {
                delete state.pendingUpdates[orderId].delete;
                if (Object.keys(state.pendingUpdates[orderId]).length === 0) {
                    delete state.pendingUpdates[orderId];
                }
                
                const container = btnElement.closest('.order-item-container');
                container.classList.remove('opacity-50', 'bg-red-50');
                btnElement.innerHTML = '<i data-lucide="trash-2" class="w-5 h-5"></i>';
                btnElement.classList.remove('text-red-500', 'bg-red-100', 'border-red-200');
                btnElement.classList.add('text-slate-400', 'bg-white', 'border-slate-200');
            } else {
                if (!state.pendingUpdates[orderId]) state.pendingUpdates[orderId] = {};
                state.pendingUpdates[orderId].delete = true;

                const container = btnElement.closest('.order-item-container');
                container.classList.add('opacity-50', 'bg-red-50');
                btnElement.innerHTML = '<i data-lucide="rotate-ccw" class="w-5 h-5"></i>'; 
                btnElement.classList.add('text-red-500', 'bg-red-100', 'border-red-200');
                btnElement.classList.remove('text-slate-400', 'bg-white', 'border-slate-200');
            }

            lucide.createIcons();
            updateBatchSaveBar();
        }

        function checkUserAllDone(userName) {
            const payBtnText = document.querySelector(`#btn-pay-${userName} span`).textContent;
            const takeBtnText = document.querySelector(`#btn-take-${userName} span`).textContent;
            
            const userCard = document.querySelector(`#btn-pay-${userName}`).closest('.user-card');
            const badge = userCard.querySelector('.all-done-badge');

            if (payBtnText === '已收全額' && takeBtnText === '已全給餐') {
                userCard.classList.add('border-emerald-200', 'bg-emerald-50/30');
                userCard.classList.remove('border-slate-200');
                badge.classList.remove('hidden');
            } else {
                userCard.classList.remove('border-emerald-200', 'bg-emerald-50/30');
                userCard.classList.add('border-slate-200');
                badge.classList.add('hidden');
            }
        }

        function updateBatchSaveBar() {
            const count = Object.keys(state.pendingUpdates).length;
            const bar = document.getElementById('batchSaveBar');
            if (count > 0) {
                document.getElementById('batchSaveCountText').textContent = `待更新 ${count} 筆資料`;
                bar.classList.remove('hidden');
                setTimeout(() => {
                    bar.classList.remove('translate-y-full', 'opacity-0');
                }, 10);
            } else {
                hideBatchSaveBar();
            }
        }

        function hideBatchSaveBar() {
            const bar = document.getElementById('batchSaveBar');
            bar.classList.add('translate-y-full', 'opacity-0');
            setTimeout(() => {
                bar.classList.add('hidden');
            }, 300);
        }

        function cancelBatchUpdates() {
            state.pendingUpdates = {};
            hideBatchSaveBar();
            if (state.adminDataCache) {
                renderAdminDashboard(document.getElementById('mainContent'), state.adminDataCache.summaryByUser);
            }
        }

        async function commitBatchUpdates() {
            if (Object.keys(state.pendingUpdates).length === 0) return;
            
            showLoading('正在批次儲存變更...');
            const res = await apiCall('adminBatchUpdateStatus', { updates: state.pendingUpdates });
            if (res) {
                showAlert(res, '儲存成功');
                fetchAdminData('dashboard'); 
            } else {
                hideLoading();
            }
        }

                </div>
                ${contentHtml}
            </div>`;

        }

        function exportPdf(type) {
            const printArea = document.getElementById('printArea');
            let html = '';

            if (type === 'dispatch') {
                html = `<h1 style="font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center;">皮客覓 發餐與核銷點名表</h1>`;
                state.adminDataCache.summaryByUser.forEach(user => {
                    html += `
                    <div style="border: 2px solid #000; margin-bottom: 20px; padding: 15px; page-break-inside: avoid;">
                        <div style="display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 10px;">
                            <h2 style="font-size: 20px; font-weight: bold; margin: 0;">${user.name}</h2>
                            <h3 style="font-size: 18px; margin: 0;">總計: $${user.total}</h3>
                        </div>
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid #000;">
                                    <th style="text-align: left; padding: 5px; width: 60%;">點餐內容</th>
                                    <th style="text-align: right; padding: 5px; width: 15%;">價錢</th>
                                    <th style="text-align: center; padding: 5px; width: 12%;">已繳費</th>
                                    <th style="text-align: center; padding: 5px; width: 12%;">已取餐</th>
                                </tr>
                            </thead>
                            <tbody>`;
                    user.orders.forEach(order => {
                        html += `
                                <tr style="border-bottom: 1px dashed #ccc;">
                                    <td style="padding: 8px 5px;">
                                        <strong>[${order['店家']}]</strong> ${order['品項']} x${order['數量']}<br>
                                        <span style="font-size: 12px; color: #666;">${order['規格']||order['訂購內容']}</span>
                                    </td>
                                    <td style="text-align: right; padding: 8px 5px;">$${order['小計']}</td>
                                    <td style="text-align: center; padding: 8px 5px;"><div style="width: 20px; height: 20px; border: 1px solid #000; display: inline-block;"></div></td>
                                    <td style="text-align: center; padding: 8px 5px;"><div style="width: 20px; height: 20px; border: 1px solid #000; display: inline-block;"></div></td>
                                </tr>`;
                    });
                    html += `</tbody></table></div>`;
                });

            } else if (type === 'order') {
                html = `<h1 style="font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center;">皮客覓 實戰訂購清單 (給店家)</h1>`;
                const shops = Object.keys(state.adminDataCache.summaryByShop);
                shops.forEach(shop => {
                    const shopData = state.adminDataCache.summaryByShop[shop];
                    const phone = state.data.shopPhones[shop] || '無電話';
                    
                    html += `
                    <div style="border: 2px solid #000; margin-bottom: 30px; padding: 15px; page-break-inside: avoid;">
                        <h2 style="font-size: 22px; font-weight: bold; margin: 0 0 5px 0;">${shop}</h2>
                        <p style="font-size: 14px; margin: 0 0 15px 0; color: #333;">聯絡電話: ${phone}</p>
                        
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 2px solid #000;">
                                    <th style="text-align: left; padding: 8px 5px;">訂購品項 (含規格)</th>
                                    <th style="text-align: center; padding: 8px 5px; width: 15%;">份數</th>
                                    <th style="text-align: right; padding: 8px 5px; width: 20%;">小計</th>
                                </tr>
                            </thead>
                            <tbody>`;
                            
                    for (let itemName in shopData.items) {
                        const item = shopData.items[itemName];
                        html += `
                                <tr style="border-bottom: 1px solid #ccc;">
                                    <td style="padding: 10px 5px; font-size: 16px;">${itemName}</td>
                                    <td style="text-align: center; padding: 10px 5px; font-size: 16px; font-weight: bold;">${item.count}</td>
                                    <td style="text-align: right; padding: 10px 5px;">$${item.subtotal}</td>
                                </tr>`;
                    }
                    html += `
                            </tbody>
                        </table>
                        <div style="margin-top: 15px; text-align: right; font-size: 20px; font-weight: bold;">
                            此店家訂購總額: $${shopData.totalAmount}
                        </div>
                    </div>`;
                });
            }
            printArea.innerHTML = html;
            window.print();
        }

        async function silentReload() {
            showLoading('更新設定中...');
            const res = await apiCall('getInitialData');
            if(res) {
                processInitialData(res);
                hideLoading();
            }
        }

            </details>

            <details class="group bg-white rounded-3xl shadow-sm border border-slate-200 mb-6 overflow-hidden">
                <summary class="p-6 font-black text-2xl text-slate-800 cursor-pointer flex justify-between items-center bg-white hover:bg-slate-50 transition-colors border-l-4 border-blue-500">

                    <div class="space-y-4 mt-2">
                        <select id="updateShopName" onchange="loadShopDataForUpdate(this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xl font-bold text-slate-700 focus:ring-2 focus:ring-[#006241] outline-none cursor-pointer">
                            <option value="">-- 選擇要更新的店家 --</option>

                        <input type="text" id="updateShopImg" placeholder="線上圖片網址 或 官網連結 (https://...)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xl focus:ring-2 focus:ring-[#006241] outline-none text-slate-700">

                        <input type="text" id="updateShopExtra" placeholder="店家分店或備註 (例如: 鳳西)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-xl focus:ring-2 focus:ring-[#006241] outline-none text-slate-700">
                        <button onclick="updateShopInfo()" class="w-full bg-slate-800 text-white text-2xl font-bold py-4 rounded-xl hover:bg-slate-700 active:scale-95 transition-all shadow-lg">更新店家圖片與電話</button>
                    </div>
                </div>
            </details>

            <details class="group bg-white rounded-3xl shadow-sm border border-emerald-200 mb-6 overflow-hidden">
                <summary class="p-6 font-black text-2xl text-slate-800 cursor-pointer flex justify-between items-center bg-white hover:bg-emerald-50 transition-colors border-l-4 border-emerald-500">
                    覆寫更新現有店家菜單 (Excel貼上)
                    <i data-lucide="chevron-down" class="w-8 h-8 transition-transform group-open:rotate-180 text-emerald-500"></i>

                <div class="px-6 pb-6 pt-2 border-t border-emerald-100">
                    <p class="text-slate-500 mb-4 font-medium">若店家價格異動，請直接複製整塊新 Excel 菜單貼在此處覆寫。系統會保留原本設定好的圖片與電話。</p>
                    <div class="space-y-4">
                        <select id="overwriteShopName" class="w-full bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-xl font-bold text-emerald-800 focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer">
                            <option value="">-- 選擇要覆寫菜單的店家 --</option>

                        <button onclick="overwriteShopMenu()" class="w-full bg-emerald-600 text-white text-xl font-bold py-4 rounded-xl active:scale-95 transition-transform shadow-lg shadow-emerald-900/30 flex items-center justify-center gap-2">
                            <i data-lucide="copy-check" class="w-6 h-6"></i> 確定覆寫店家菜單
                        </button>

                </div>
            </details>

            <details class="group bg-white rounded-3xl shadow-sm border border-amber-200 mb-6 overflow-hidden">
                <summary class="p-6 font-black text-2xl text-slate-800 cursor-pointer flex justify-between items-center bg-white hover:bg-amber-50 transition-colors border-l-4 border-amber-500">
                    新增全新店家 (從 Excel 建立)
                    <i data-lucide="chevron-down" class="w-8 h-8 transition-transform group-open:rotate-180 text-amber-500"></i>
                </summary>
                <div class="px-6 pb-6 pt-2 border-t border-amber-100">
                    <div class="space-y-5 mt-2">
                        <input type="text" id="newShopName" placeholder="新店家名稱 (例如：丹丹漢堡)" class="w-full bg-amber-50 border border-amber-200 rounded-xl p-4 text-xl font-bold focus:ring-2 focus:ring-amber-500 outline-none text-amber-800">
                        <textarea id="newShopMenuData" placeholder="請將 Excel 菜單資料 (含標題列) 圈選複製，貼上..." rows="6" class="w-full bg-white border border-amber-200 rounded-xl p-4 text-lg focus:ring-2 focus:ring-amber-500 outline-none font-mono whitespace-pre text-slate-600"></textarea>
                        <input type="text" id="newShopImg" placeholder="線上圖片網址或官網 (選填)" class="w-full bg-white border border-amber-200 rounded-xl p-4 text-xl focus:ring-2 focus:ring-amber-500 outline-none text-slate-700">
                        <input type="text" id="newShopPhone" placeholder="聯絡電話 (選填)" class="w-full bg-white border border-amber-200 rounded-xl p-4 text-xl focus:ring-2 focus:ring-amber-500 outline-none text-slate-700">
                        <input type="text" id="newShopExtra" placeholder="店家分店或備註 (選填)" class="w-full bg-white border border-amber-200 rounded-xl p-4 text-xl focus:ring-2 focus:ring-amber-500 outline-none text-slate-700">
                        <button onclick="addNewShop()" class="w-full bg-amber-500 text-white text-xl font-bold py-4 rounded-xl active:scale-95 transition-transform shadow-lg shadow-amber-900/30 flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-6 h-6"></i> 建立新店家

            <details class="group bg-white rounded-3xl shadow-sm border border-purple-200 mb-6 overflow-hidden">

                    <i data-lucide="chevron-down" class="w-8 h-8 transition-transform group-open:rotate-180 text-purple-500"></i>
                </summary>

                    <button onclick="adminUpdatePopularity()" class="w-full bg-purple-50 text-purple-600 border-2 border-purple-200 text-xl font-bold py-4 rounded-xl hover:bg-purple-100 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-2">

            <button onclick="adminCloseAndArchive()" class="w-full bg-red-50 text-red-600 border-2 border-red-200 text-2xl font-bold py-5 rounded-2xl flex items-center justify-center gap-2 hover:bg-red-100 active:scale-95 transition-all mt-8 shadow-sm">
