<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>皮客覓 PickMeal | 小幫手點餐</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Panzoom 套件 -->
    <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>

    <style>
        html { font-size: 16px; }
        body { font-family: 'Nunito', 'Noto Sans TC', -apple-system, sans-serif; background-color: #F4F9F4; color: #333; }
        
        /* 專屬品牌色系 (皮克敏綠與活潑色彩) */
        :root {
            --brand-color: #006241;     /* 星巴克綠 */
            --brand-light: #E8F5E9;     /* 柔和淺綠 */
            --brand-accent: #00875A;    /* 活潑亮綠 */
            --brand-leaf: #81C784;      /* 芽的亮綠 */
            --pik-red: #E53935;         /* 皮克敏紅 */
            --pik-yellow: #FBC02D;      /* 皮克敏黃 */
            --pik-blue: #1E88E5;        /* 皮克敏藍 */
        }
        .bg-brand { background-color: var(--brand-color); }
        .text-brand { color: var(--brand-color); }
        .border-brand { border-color: var(--brand-color); }
        .bg-brand-light { background-color: var(--brand-light); }
        .text-accent { color: var(--brand-accent); }
        
        /* 元件樣式 */
        .card { 
            background-color: white; border-radius: 1.25rem; padding: 1.25rem; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); 
            border: 1px solid #edf2f7; 
            transition: all 0.3s ease; 
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .btn-primary { 
            background-color: var(--brand-color); color: white; font-weight: 900; 
            padding: 0.85rem 1.5rem; border-radius: 9999px; box-shadow: 0 4px 6px rgba(42, 135, 75, 0.25); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 1.125rem; width: 100%; display: block; text-align: center; border: none; cursor: pointer;
        }
        .btn-primary:hover { background-color: #1E6B3A; transform: translateY(-1px); box-shadow: 0 6px 8px rgba(42, 135, 75, 0.3); }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 4px rgba(42, 135, 75, 0.2); }
        .btn-primary:disabled { background-color: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-secondary { 
            background-color: #f3f4f6; color: #4b5563; font-weight: 800; 
            padding: 0.85rem 1.5rem; border-radius: 9999px; 
            transition: all 0.2s; font-size: 1.125rem; width: 100%; border: none; cursor: pointer;
        }
        .btn-secondary:hover { background-color: #e5e7eb; color: #1f2937; }
        .btn-secondary:active { transform: scale(0.96); }
        
        input, select, textarea { 
            font-size: 16px !important; border-radius: 1rem; border: 2px solid #e5e7eb; 
            background-color: #f9fafb; padding: 0.85rem 1rem; width: 100%; outline: none; transition: all 0.2s;
            box-sizing: border-box; font-weight: 600; color: #374151;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--brand-color); background-color: white; box-shadow: 0 0 0 4px rgba(42, 135, 75, 0.1); }

        /* 動畫過渡 */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter, .fade-leave-to { opacity: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 新增：iPhone 底部安全距離 (避免導覽列與系統手勢條重疊) */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)) !important; }
        }

        /* 專屬葉子彈跳動畫 */
        @keyframes sprout-bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        .animate-sprout { animation: sprout-bounce 1s infinite ease-in-out; }
    </style>
</head>
<body class="antialiased pb-20">

    <div id="app" class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#F4F9F4] overflow-hidden">
        
        <!-- 全域 Loading 遮罩 (皮克敏風格) -->
        <div id="loader" class="fixed inset-0 bg-white bg-opacity-95 z-[100] flex flex-col items-center justify-center hidden backdrop-blur-sm">
            <div class="relative w-24 h-24 flex items-center justify-center">
                <!-- 旋轉背景 -->
                <div class="absolute inset-0 border-4 border-brand-light border-t-brand rounded-full animate-spin"></div>
                <!-- 中心小葉子 -->
                <svg class="w-10 h-10 text-brand animate-sprout" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 22C12 22 12 14 12 10C12 6 9 3 5 3C5 3 6 7 10 9C10 9 10.5 12 11 16C11.5 20 12 22 12 22Z" />
                    <path d="M12 22C12 22 12 14 12 10C12 6 15 3 19 3C19 3 18 7 14 9C14 9 13.5 12 13 16C12.5 20 12 22 12 22Z" opacity="0.7"/>
                </svg>
            </div>
            <p class="mt-6 text-brand font-black text-xl tracking-wider" id="loaderText">皮克敏拔腿狂奔中...</p>
        </div>

        <!-- 自訂對話框 Modal -->
        <div id="alertModal" class="fixed inset-0 bg-gray-900 bg-opacity-60 z-[100] flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm">
            <div class="bg-white rounded-[2rem] p-7 w-full max-w-sm transform scale-95 transition-transform duration-300 shadow-2xl">
                <div class="w-12 h-12 bg-brand-light rounded-full flex items-center justify-center mb-4">
                    <svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 id="alertTitle" class="text-2xl font-black mb-3 text-gray-800 tracking-wide">提示</h3>
                <p id="alertMessage" class="text-gray-600 text-lg mb-8 leading-relaxed font-medium"></p>
                <div class="flex gap-3" id="alertButtons">
                    <button onclick="closeAlert()" class="btn-primary" id="alertBtnOk">好的</button>
                </div>
            </div>
        </div>

        <!-- 圖片放大燈箱 Lightbox (Panzoom) -->
        <div id="lightbox" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-[110] flex flex-col hidden touch-none backdrop-blur-md">
            <div class="w-full flex justify-end p-4 absolute top-0 right-0 z-20 pointer-events-none">
                <button onclick="closeLightbox()" class="pointer-events-auto text-white bg-black bg-opacity-50 hover:bg-opacity-70 rounded-full w-12 h-12 flex items-center justify-center text-3xl font-bold transition shadow-lg backdrop-blur-sm">×</button>
            </div>
            <div class="flex-1 flex items-center justify-center overflow-hidden relative w-full h-full" id="lightboxContainer">
                <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain" alt="菜單大圖">
            </div>
            <div class="absolute bottom-8 w-full text-center pointer-events-none text-white opacity-80 text-sm tracking-widest font-bold bg-black bg-opacity-20 py-2">
                雙指縮放・單指拖曳・滾輪縮放
            </div>
        </div>

        <!-- 登入頁面 -->
        <div id="viewLogin" class="p-8 flex flex-col items-center justify-center min-h-screen bg-[#F4F9F4] relative overflow-hidden">
            <!-- 裝飾背景圖形 (皮克敏三原色點綴) -->
            <div class="absolute top-[-5%] left-[-10%] w-48 h-48 bg-[#E53935] rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>
            <div class="absolute bottom-[10%] right-[-10%] w-56 h-56 bg-[#FBC02D] rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            <div class="absolute top-[20%] right-[10%] w-32 h-32 bg-[#1E88E5] rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>

            <!-- 皮客覓 LOGO -->
            <div class="w-32 h-32 bg-white rounded-[2rem] flex items-center justify-center shadow-xl mb-6 relative z-10">
                <div class="w-24 h-24 bg-brand-light rounded-2xl flex flex-col items-center justify-center relative">
                    <!-- 葉子頭 -->
                    <svg class="w-10 h-10 text-brand absolute -top-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 22C12 22 12 14 12 10C12 6 9 3 5 3C5 3 6 7 10 9C10 9 10.5 12 11 16C11.5 20 12 22 12 22Z" />
                        <path d="M12 22C12 22 12 14 12 10C12 6 15 3 19 3C19 3 18 7 14 9C14 9 13.5 12 13 16C12.5 20 12 22 12 22Z" opacity="0.6"/>
                    </svg>
                    <!-- 笑臉餐盤 -->
                    <svg class="w-12 h-12 text-brand mt-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14a4 4 0 00-4-4H5a2 2 0 00-2 2v6a2 2 0 002 2h14a2 2 0 002-2v-6a2 2 0 00-2-2h-3a4 4 0 00-4 4z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 16h.01M15 16h.01"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-4xl font-black text-gray-800 mb-1 text-center tracking-tight z-10">皮客覓 <span class="text-brand">PickMeal</span></h1>
            <p class="text-gray-500 font-bold tracking-widest mb-8 z-10">你的專屬點餐小幫手</p>
            
            <div class="w-full space-y-5 bg-white/80 backdrop-blur-md p-7 rounded-[2.5rem] shadow-lg border border-white z-10">
                <div>
                    <label class="block text-gray-700 text-sm font-black mb-2 ml-2">帳號</label>
                    <input type="text" id="loginUser" placeholder="輸入您的帳號">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-black mb-2 ml-2">密碼</label>
                    <input type="password" id="loginPass" placeholder="輸入您的密碼">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-black mb-2 ml-2">姓名 <span class="text-xs font-bold text-gray-400 font-normal">(選填)</span></label>
                    <input type="text" id="loginName" placeholder="皮克敏該如何稱呼您？">
                </div>
                <button onclick="doLogin()" class="btn-primary mt-8 py-4 text-xl flex items-center justify-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    呼叫皮克敏！
                </button>
            </div>
        </div>

        <!-- 主視圖容器 -->
        <div id="viewMain" class="hidden min-h-screen bg-[#F4F9F4] flex flex-col">
            <!-- Header (圓潤設計) -->
            <header class="bg-brand text-white pt-10 pb-6 px-6 rounded-b-[2.5rem] shadow-lg z-10 relative">
                <div class="absolute top-0 right-0 opacity-10">
                    <svg class="w-48 h-48 -mr-10 -mt-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22C12 22 12 14 12 10C12 6 9 3 5 3C5 3 6 7 10 9C10 9 10.5 12 11 16C11.5 20 12 22 12 22Z" /></svg>
                </div>
                <div class="flex justify-between items-start relative z-10">
                    <div id="greetingText" class="leading-relaxed">
                        <!-- 動態生成問候語 -->
                    </div>
                    <button onclick="logout()" class="bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full w-12 h-12 flex items-center justify-center transition backdrop-blur-sm border border-white/30 shrink-0 shadow-sm">
                        <svg class="w-6 h-6 text-white ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>

            <!-- 內容區 -->
            <main id="mainContent" class="flex-1 p-4 pb-28 overflow-y-auto"></main>

            <!-- 底部導覽列 -->
            <nav class="bg-white border-t border-gray-100 fixed bottom-0 w-full max-w-md flex justify-around pb-safe pt-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-40 rounded-t-3xl">
                <button onclick="switchTab('menu')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition duration-200 group" id="nav-menu">
                    <div class="p-1 rounded-xl group-hover:bg-brand-light mb-1 transition">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                    </div>
                    <span class="text-sm font-black">尋覓</span>
                </button>
                <button onclick="switchTab('cart')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand relative transition duration-200 group" id="nav-cart">
                    <span id="cartBadge" class="absolute top-0 right-[25%] bg-accent text-white text-[10px] font-black rounded-full w-5 h-5 flex items-center justify-center hidden shadow-md ring-2 ring-white">0</span>
                    <div class="p-1 rounded-xl group-hover:bg-brand-light mb-1 transition">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    </div>
                    <span class="text-sm font-black">餐袋</span>
                </button>
                <button onclick="switchTab('orders')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition duration-200 group" id="nav-orders">
                    <div class="p-1 rounded-xl group-hover:bg-brand-light mb-1 transition">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    </div>
                    <span class="text-sm font-black">紀錄</span>
                </button>
                <button onclick="switchTab('admin')" class="hidden flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition duration-200 group" id="nav-admin">
                    <div class="p-1 rounded-xl group-hover:bg-brand-light mb-1 transition">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <span class="text-sm font-black">首腦</span>
                </button>
            </nav>
        </div>

        <!-- 客製化選項 Modal -->
        <div id="configModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-[90] flex items-end justify-center hidden opacity-0 transition-opacity backdrop-blur-sm">
            <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-7 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.15)] flex flex-col max-h-[90vh]" id="configModalContent">
                <!-- 頂部拉桿裝飾 -->
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-4 shrink-0"></div>
                
                <div class="flex justify-between items-start mb-2 border-b border-gray-100 pb-5 shrink-0">
                    <div class="pr-4">
                        <h3 class="text-2xl font-black text-gray-800 leading-tight mb-1" id="cfgName">品項名稱</h3>
                        <div class="inline-flex items-center gap-1 bg-brand-light px-3 py-1 rounded-lg">
                            <svg class="w-4 h-4 text-brand" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
                            <p class="text-brand font-black text-xl" id="cfgPriceBase">$0</p>
                        </div>
                    </div>
                    <button onclick="closeConfig()" class="bg-gray-100 rounded-full p-2.5 text-gray-500 hover:bg-gray-200 hover:text-gray-700 transition shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <!-- 選項區 -->
                <div id="cfgOptions" class="space-y-6 overflow-y-auto no-scrollbar pb-6 pt-2 flex-1">
                    <!-- 動態選項產生區 -->
                </div>

                <!-- 底部加入按鈕區 -->
                <div class="mt-2 pt-4 border-t border-gray-100 flex items-center gap-4 shrink-0 bg-white">
                    <div class="flex items-center bg-gray-50 rounded-2xl p-1 border border-gray-200 shrink-0">
                        <button onclick="adjQty(-1)" class="w-12 h-12 rounded-xl bg-white shadow-sm text-2xl font-black text-brand active:scale-95 transition flex items-center justify-center border border-gray-100">-</button>
                        <span id="cfgQty" class="w-12 text-center text-xl font-black text-gray-800">1</span>
                        <button onclick="adjQty(1)" class="w-12 h-12 rounded-xl bg-white shadow-sm text-2xl font-black text-brand active:scale-95 transition flex items-center justify-center border border-gray-100">+</button>
                    </div>
                    <button onclick="confirmAddToCart()" class="btn-primary flex-1 py-4 text-xl flex justify-between items-center px-6">
                        <span>裝進餐袋</span>
                        <span id="cfgTotal" class="font-black">$0</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🚨 GAS 網址 (請確認為您最新的發布網址)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZomnJRCpnTT6IJXXuCBdTlaqDhPITyt-2ACh8JZBz42rctAaAfYdpwNYgBtvzHXtNCQ/exec';
        
        let state = {
            user: null,
            token: localStorage.getItem('sessionToken'),
            system: { isOpen: false, openedShops: [], deadline: '' },
            allShops: [], 
            menuData: {},
            shopImages: {},
            shopPhones: {},
            userOrders: [],
            cart: [],
            currentTab: 'menu',
            activeShop: '',
            tempItem: null 
        };

        let pzInstance = null; // Panzoom 實例
        let pzWheelHandler = null; // 新增：儲存滾輪事件處理器，避免重複綁定

        // --- UI 工具 ---
        function showLoading(text = '皮克敏奔跑中...') {
            document.getElementById('loaderText').innerText = text;
            document.getElementById('loader').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loader').classList.add('hidden');
        }
        
        function showAlert(msg, title = '提示', buttons = [{text: '好的', primary: true, action: 'closeAlert()'}]) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerHTML = msg;
            
            const btnContainer = document.getElementById('alertButtons');
            btnContainer.innerHTML = '';
            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.className = b.primary ? 'btn-primary flex-1 py-3 text-lg' : 'btn-secondary flex-1 py-3 text-lg';
                btn.innerText = b.text;
                btn.onclick = () => { eval(b.action); };
                btnContainer.appendChild(btn);
            });

            const modal = document.getElementById('alertModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95');
            }, 10);
        }
        function closeAlert() {
            const modal = document.getElementById('alertModal');
            modal.classList.add('opacity-0');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // --- 圖片放大燈箱 ---
        function showLightbox(url) {
            if(!url) return showAlert('店長尚未上傳菜單圖片。', '查無圖片');
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const container = document.getElementById('lightboxContainer');
            
            img.src = url;
            lightbox.classList.remove('hidden');

            setTimeout(() => {
                if (pzInstance) pzInstance.destroy();
                pzInstance = Panzoom(img, {
                    maxScale: 6, minScale: 0.2, contain: 'outside', step: 0.3
                });
                
                // 修正：確實移除舊的滾輪事件，再綁定新的，避免錯亂
                if (pzWheelHandler) {
                    container.removeEventListener('wheel', pzWheelHandler);
                }
                pzWheelHandler = pzInstance.zoomWithWheel;
                container.addEventListener('wheel', pzWheelHandler);
            }, 100);
        }
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            lightbox.classList.add('hidden');
            if (pzInstance) { pzInstance.destroy(); pzInstance = null; }
            img.src = ''; img.style.transform = ''; 
        }

        // --- API 通訊 ---
        async function apiCall(action, data = {}) {
            try {
                // 加上 redirect: 'follow' 與 text/plain 防止 CORS 攔截
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, token: state.token, data })
                });
                const res = await response.json();
                if (res.status === 'error') {
                    if (res.message.includes('過期')) logout();
                    throw new Error(res.message);
                }
                return res.data;
            } catch (error) {
                console.error(error);
                showAlert(`連線發生異常：<br>${error.message}`, '喔不！發生錯誤');
                return null;
            }
        }

        async function init() {
            if (state.token) {
                showLoading('喚醒小幫手中...');
                const initialData = await apiCall('getInitialData');
                hideLoading();
                if (initialData) {
                    const savedUser = JSON.parse(localStorage.getItem('userMeta'));
                    if(savedUser) {
                        state.user = savedUser;
                        applyInitialData(initialData);
                        renderApp();
                    } else logout();
                }
            }
        }

        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const name = document.getElementById('loginName').value.trim();
            
            if (!username || !password) return showAlert('請輸入完整的帳號與密碼。', '資料不全');
            
            showLoading('呼叫皮克敏中...');
            const res = await apiCall('login', { username, password, name });
            hideLoading();
            
            if (res) {
                state.token = res.token;
                state.user = res.user;
                localStorage.setItem('sessionToken', res.token);
                localStorage.setItem('userMeta', JSON.stringify(res.user));
                applyInitialData(res.initialData);
                renderApp();
            }
        }

        function logout() {
            localStorage.removeItem('sessionToken');
            localStorage.removeItem('userMeta');
            location.reload();
        }

        function applyInitialData(data) {
            state.system = data.systemStatus;
            state.allShops = data.allShops || []; 
            state.menuData = data.menuData;
            state.shopImages = data.shopImages;
            state.shopPhones = data.shopPhones || {};
            state.userOrders = data.userOrders;
            
            if(state.system.openedShops.length > 0 && !state.system.openedShops.includes(state.activeShop)) {
                state.activeShop = state.system.openedShops[0];
            }
        }

        function checkIsPastDeadline() {
            if (!state.system.deadline) return false;
            const now = new Date();
            const [hours, minutes] = state.system.deadline.split(':');
            const deadlineTime = new Date();
            deadlineTime.setHours(parseInt(hours, 10), parseInt(minutes, 10), 0, 0);
            return now > deadlineTime;
        }

        function renderApp() {
            document.getElementById('viewLogin').classList.add('hidden');
            document.getElementById('viewMain').classList.remove('hidden');
            
            const hour = new Date().getHours();
            const roleStr = state.user.role === '管理' ? '首腦' : '老師';
            const nameStr = `<span class="text-3xl font-black tracking-wide">${state.user.name} <span class="text-xl font-bold opacity-80">${roleStr}</span></span>`;
            let greeting = '';
            
            const msgs = [
                ['早安，', '專屬皮克敏已上線！為您尋覓美味早餐！'],
                ['午安，', 'Pick me! 讓皮克敏為您送上活力午餐！'],
                ['午安，', '下午茶時間！小幫手為您尋覓療癒甜點！'],
                ['晚安，', '辛苦了一天，讓皮克敏為您準備豐盛晚餐！']
            ];
            let msgIdx = hour < 11 ? 0 : hour < 14 ? 1 : hour < 18 ? 2 : 3;
            
            greeting = `
                <p class="text-sm font-bold opacity-90 mb-1 tracking-wider">${msgs[msgIdx][0]}</p>
                ${nameStr}
                <p class="text-sm font-bold text-brand-light mt-2 opacity-90">${msgs[msgIdx][1]}</p>
            `;
            document.getElementById('greetingText').innerHTML = greeting;

            if (state.user.role === '管理') {
                document.getElementById('nav-admin').classList.remove('hidden');
                document.getElementById('nav-admin').classList.add('flex');
            }
            switchTab('menu');
        }

        function switchTab(tab) {
            state.currentTab = tab;
            ['menu', 'cart', 'orders', 'admin'].forEach(t => {
                const el = document.getElementById(`nav-${t}`);
                if(el) {
                    if(t === tab) {
                        el.classList.remove('text-gray-400');
                        el.classList.add('text-brand');
                    } else {
                        el.classList.remove('text-brand');
                        el.classList.add('text-gray-400');
                    }
                }
            });

            const content = document.getElementById('mainContent');
            content.innerHTML = ''; 
            if (tab === 'menu') renderMenuTab(content);
            else if (tab === 'cart') renderCartTab(content);
            else if (tab === 'orders') renderOrdersTab(content);
            else if (tab === 'admin' && state.user.role === '管理') renderAdminTab(content);
            window.scrollTo(0,0);
        }

                    <div class="bg-brand-light p-2.5 rounded-full text-brand">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>

                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>

                    <div id="${contentId}" class="${hiddenClass} bg-gray-50/50 border-t border-gray-50">

                                <h4 class="text-lg font-black text-gray-800 leading-tight mb-2 group-hover:text-brand transition">${item['品項']}</h4>
                                <p class="text-brand font-black text-lg flex items-baseline">${displayPrice}</p>
                            </div>

                        </div>`;
                });

                html += `       </div>
                    </div>
                </div>`;
                isFirstCategory = false;
            }
            
            html += `</div>`;
            container.innerHTML = html;
        }

        window.toggleCategory = function(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        };

        window.openConfigModal = function(itemIndex) {
            const item = state.menuData[state.activeShop][itemIndex];
            state.tempItem = {
                shop: state.activeShop, name: item['品項'], basePrice: 0, 
                selectedSizeName: '', selections: {}, quantity: 1, name_override: '' 
            };

            // 建立選項 HTML
            document.getElementById('cfgName').innerText = state.tempItem.name;
            document.getElementById('cfgQty').innerText = '1';
            
            const cfgOptions = document.getElementById('cfgOptions');
            let optionsHtml = '';
            const ignoreKeys = ['類別', '品項', '甜度選項', '冰塊選項', '口味與客製化', '附餐飲料'];
            const sizeKeys = Object.keys(item).filter(k => !ignoreKeys.includes(k) && item[k] !== '');
            
            if (sizeKeys.length > 0) {
                optionsHtml += buildRadioGroup('選擇規格', 'size', sizeKeys.map(k => ({ label: k, price: parseInt(item[k]) || 0 })));
                state.tempItem.selectedSizeName = sizeKeys[0];
                state.tempItem.basePrice = parseInt(item[sizeKeys[0]]) || 0;
            }
            if (item['甜度選項'] && item['甜度選項'] !== '甜度固定') {
                const opts = item['甜度選項'].split('/');
                optionsHtml += buildRadioGroup('甜度', 'sweet', opts.map(o => ({label: o})));
                state.tempItem.selections['sweet'] = opts[0];
            }
            if (item['冰塊選項'] && !item['冰塊選項'].includes('固定')) {
                const opts = item['冰塊選項'].split('/');
                optionsHtml += buildRadioGroup('冰塊/溫度', 'ice', opts.map(o => ({label: o})));
                state.tempItem.selections['ice'] = opts[0];
            }
            if (item['口味與客製化']) {
                 const opts = item['口味與客製化'].split('/').map(o => {
                     const match = o.match(/(.*?)\+\$(\d+)/);
                     if(match) return { label: match[1], price: parseInt(match[2]) };
                     return { label: o };
                 });
                 optionsHtml += buildRadioGroup('客製化', 'custom', opts);
                 state.tempItem.selections['custom'] = opts[0].label;
                 if(opts[0].price) state.tempItem._customPrice = opts[0].price;
            }
            if (item['附餐飲料']) {
                const opts = item['附餐飲料'].split('/').map(o => {
                    const match = o.match(/(.*?)\+(\d+)/);
                    if(match) return { label: match[1], price: parseInt(match[2]) };
                    return { label: o };
                });
                optionsHtml += `
                <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                    <h5 class="font-black text-gray-800 text-lg mb-3 flex items-center gap-2">
                        <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        附餐飲料
                    </h5>
                    <select id="cfg-drink" class="w-full text-lg p-4 font-black bg-white border-2 border-gray-200 rounded-xl focus:border-brand shadow-sm" onchange="updateCfgSelection('drink', this.value)">
                        ${opts.map((p, i) => `<option value="${i}">${p.price ? '(+$'+p.price+') ' : ''}${p.label}</option>`).join('')}
                    </select>
                </div>`;
                state.tempItem.selections['drink'] = opts[0].label;
                state.tempItem._drinkOptions = opts; 
            }

            cfgOptions.innerHTML = optionsHtml;
            updateCfgTotal();

            const modal = document.getElementById('configModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('configModalContent').classList.remove('translate-y-full');
            }, 10);
        };

        function buildRadioGroup(title, groupName, options) {
            let html = `
            <div class="mb-4">
                <h5 class="font-black text-gray-800 text-lg mb-3 border-l-4 border-brand pl-2">${title}</h5>
                <div class="flex flex-wrap gap-2.5">`;
            options.forEach((opt, idx) => {
                const checked = idx === 0 ? 'bg-brand text-white border-brand shadow-md' : 'bg-white text-gray-600 border-gray-200 hover:border-brand';
                const priceTxt = opt.price ? `<span class="text-sm opacity-80 ml-1 font-bold">(+$${opt.price})</span>` : '';
                html += `
                <button id="btn-${groupName}-${idx}" 
                    onclick="updateCfgSelection('${groupName}', ${idx}, '${opt.label}', ${opt.price||0}, ${options.length})"
                    class="border-2 rounded-xl px-5 py-3 font-black text-lg transition-all active:scale-95 flex items-center justify-center ${checked}">
                    ${opt.label} ${priceTxt}
                </button>`;
            });
            html += `</div></div>`;
            return html;
        }

        window.updateCfgSelection = function(group, idx, label, price, totalOpts) {
            if (group === 'drink') {
                const opt = state.tempItem._drinkOptions[idx];
                state.tempItem.selections['drink'] = opt.label;
                state.tempItem._drinkPrice = opt.price || 0;
            } else {
                for(let i=0; i<totalOpts; i++){
                    const btn = document.getElementById(`btn-${group}-${i}`);
                    if(btn) {
                        btn.classList.remove('bg-brand', 'text-white', 'border-brand', 'shadow-md');
                        btn.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
                    }
                }
                const activeBtn = document.getElementById(`btn-${group}-${idx}`);
                activeBtn.classList.add('bg-brand', 'text-white', 'border-brand', 'shadow-md');
                activeBtn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');

                if (group === 'size') { state.tempItem.selectedSizeName = label; state.tempItem.basePrice = price; } 
                else { state.tempItem.selections[group] = label; if(group === 'custom') state.tempItem._customPrice = price || 0; }
            }
            updateCfgTotal();
        };

        window.adjQty = function(delta) {
            state.tempItem.quantity += delta;
            if (state.tempItem.quantity < 1) state.tempItem.quantity = 1;
            document.getElementById('cfgQty').innerText = state.tempItem.quantity;
            updateCfgTotal();
        };

        function updateCfgTotal() {
            let unitPrice = state.tempItem.basePrice + (state.tempItem._drinkPrice || 0) + (state.tempItem._customPrice || 0);
            document.getElementById('cfgPriceBase').innerText = `$${unitPrice}`;
            document.getElementById('cfgTotal').innerText = `$${unitPrice * state.tempItem.quantity}`;
        }

        window.closeConfig = function() {
            const modal = document.getElementById('configModal');
            document.getElementById('configModalContent').classList.add('translate-y-full');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.confirmAddToCart = function() {
            let specArr = [];
            if(state.tempItem.selectedSizeName && state.tempItem.selectedSizeName !== '單價') specArr.push(state.tempItem.selectedSizeName);
            if(state.tempItem.selections.sweet) specArr.push(state.tempItem.selections.sweet);
            if(state.tempItem.selections.ice) specArr.push(state.tempItem.selections.ice);
            if(state.tempItem.selections.custom) specArr.push(state.tempItem.selections.custom);
            if(state.tempItem.selections.drink) specArr.push(`附:${state.tempItem.selections.drink}`);

            let unitPrice = state.tempItem.basePrice + (state.tempItem._drinkPrice || 0) + (state.tempItem._customPrice || 0);

            state.cart.push({
                shop: state.tempItem.shop, name: state.tempItem.name, spec: specArr.join(' / '),
                price: unitPrice, quantity: state.tempItem.quantity, name_override: state.tempItem.name_override
            });
            updateCartBadge();
            closeConfig();
            
            if (navigator.vibrate) navigator.vibrate(50);
            showAlert(`已將 <b>${state.tempItem.name}</b> 交給皮克敏！`, '裝進餐袋');
        };

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (state.cart.length > 0) { badge.innerText = state.cart.length; badge.classList.remove('hidden'); } 
            else badge.classList.add('hidden');
        }

        function renderCartTab(container) {
            if (state.cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-[60vh] text-gray-500">
                        <div class="w-32 h-32 bg-white rounded-full flex flex-col items-center justify-center mb-6 shadow-sm border border-gray-100 relative">
                            <svg class="w-10 h-10 text-brand absolute -top-2 opacity-50" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22C12 22 12 14 12 10C12 6 9 3 5 3C5 3 6 7 10 9C10 9 10.5 12 11 16C11.5 20 12 22 12 22Z" /></svg>
                            <svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        </div>
                        <p class="text-2xl font-black text-gray-700">餐袋還是空的</p>
                        <p class="text-lg mt-2 font-bold opacity-70">快請皮克敏幫忙尋覓美食吧！</p>
                    </div>`;
                return;
            }

            const isPastDeadline = checkIsPastDeadline();
            let html = `<h2 class="text-2xl font-black text-gray-800 mb-6 pl-3 border-l-[6px] border-brand rounded-sm">確認餐點清單</h2>`;
            
            if(isPastDeadline) {

            const res = await apiCall('adminUpdateSystemSettings', { isOpen, openedShops: selectedShops, deadline });

                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                hideLoading(); showAlert(`系統已切換為：<b>${isOpen ? '開放點餐' : '關閉點餐'}</b>`, '設定成功');

            } else hideLoading();
        };

            const shop = document.getElementById('advShopSelect').value;
            document.getElementById('advImageUrl').value = shop ? (state.shopImages[shop] || '') : '';

        };

            const shop = document.getElementById('advShopSelect').value;
            const imageUrl = document.getElementById('advImageUrl').value.trim();
            const phone = document.getElementById('advPhone').value.trim();
            if(!shop) return showAlert('請先選擇店家。', '資料缺失');
            
            showLoading('更新資料中...');
            const res = await apiCall('adminUpdateShopInfo', { shop, imageUrl, phone });

            if(res) {
                state.shopImages[shop] = imageUrl; state.shopPhones[shop] = phone;
                showAlert(res, '更新成功');
            }

                                <div class="flex justify-between border-b border-gray-100 last:border-0 py-2">
                                    <span class="truncate pr-2"><span class="text-[10px] text-white font-black mr-1 bg-brand px-1.5 py-0.5 rounded shadow-sm">${o['店家']}</span>${o['品項']}</span>
                                    <span class="font-black text-gray-900 whitespace-nowrap text-lg">x${o['數量']}</span>
                                </div>`).join('')}
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="updateOrderStatus('${orderIdsStr}', 'pay', '${user.paid ? '未繳費' : '已繳費'}')" class="py-3 rounded-xl shadow-sm text-lg font-black transition active:scale-95 border-2 ${user.paid ? 'bg-white text-gray-400 border-gray-200' : 'bg-[#E53935] text-white border-red-600 shadow-md'}">
                                ${user.paid ? '取消已繳' : '確認收錢'}
                            </button>
                            <button onclick="updateOrderStatus('${orderIdsStr}', 'take', '${user.taken ? '未取餐' : '已取餐'}')" class="py-3 rounded-xl shadow-sm text-lg font-black transition active:scale-95 border-2 ${user.taken ? 'bg-white text-gray-400 border-gray-200' : 'bg-[#1E88E5] text-white border-blue-600 shadow-md'}">
                                ${user.taken ? '取消已取' : '確認發餐'}
                            </button>
                        </div>
                    </div>`;
                });

                html += `<div class="mt-8 bg-white p-7 rounded-[2rem] shadow-lg border border-gray-100 flex justify-between items-center relative overflow-hidden mb-10">
                            <p class="text-gray-500 text-lg font-black relative z-10">今日預計總收入</p>
                            <p class="text-4xl font-black text-brand relative z-10">$${totalRevenue}</p>
                         </div>`;
            }
            document.getElementById('mainContent').innerHTML = html;
        };

        window.updateOrderStatus = async function(orderIdsStr, type, status) {
            const orderIds = orderIdsStr.split(',');
            showLoading('更新狀態...');
            const res = await apiCall('adminUpdateStatus', { orderIds, type, status });
            if (res) openDashboard(); else hideLoading();
        };

        window.confirmCloseAll = function() {
            showAlert('<span class="text-red-600 font-black text-xl mb-2 block">危險操作確認</span>您確定要打烊並結清今日所有紀錄嗎？<br><br>這會將今日訂單移至歷史紀錄，並關閉點餐。', '打烊確認', [
                { text: '取消', primary: false, action: 'closeAlert()' },
                { text: '確定結清', primary: true, action: 'executeCloseAll()' }
            ]);
        };

        window.executeCloseAll = async function() {
            closeAlert(); showLoading('皮克敏正在為您打烊與資料封存...');
            const res = await apiCall('adminCloseAndArchive');
            hideLoading();
            if(res) {
                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                showAlert('系統已順利打烊，資料已封存，皮克敏可以去睡覺了！', '打烊完成');
                switchTab('admin');
            }
        };

        window.onload = init;
    </script>
</body>
</html>
