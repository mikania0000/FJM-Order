<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教務處點餐系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 修正：加入 type="text/tailwindcss" 讓瀏覽器支援 @apply 語法，按鈕 CSS 瞬間復活 -->
    <style type="text/tailwindcss">
        /* 基礎字體設定：最少 16px 防止手機自動放大縮放 */
        html { font-size: 16px; }
        body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background-color: #F7F7F7; color: #333; }
        
        /* 專屬品牌色系 (星巴克風) */
        :root {
            --brand-color: #006241;
            --brand-light: #d4e9e2;
        }
        .bg-brand { background-color: var(--brand-color); }
        .text-brand { color: var(--brand-color); }
        .border-brand { border-color: var(--brand-color); }
        .bg-brand-light { background-color: var(--brand-light); }
        
        /* 元件樣式 */
        .card { @apply bg-white rounded-2xl shadow-sm p-5 border border-gray-100 transition-all hover:shadow-md; }
        .btn-primary { @apply bg-brand text-white font-bold py-3 px-6 rounded-full shadow hover:bg-green-800 transition active:scale-95 text-lg w-full; }
        .btn-secondary { @apply bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-full shadow hover:bg-gray-300 transition active:scale-95 text-lg w-full; }
        .btn-outline { @apply border-2 border-brand text-brand font-bold py-2 px-4 rounded-full hover:bg-brand hover:text-white transition active:scale-95; }
        
        /* 輸入框強制 16px 以上，避免 iOS Safari 縮放 */
        input, select, textarea { font-size: 16px !important; @apply rounded-xl border-gray-300 shadow-sm focus:border-green-500 focus:ring focus:ring-green-200 focus:ring-opacity-50 p-3; }

        /* 動畫過渡 */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter, .fade-leave-to { opacity: 0; }
        
        /* 隱藏捲軸但可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased pb-20">

    <!-- App 容器 -->
    <div id="app" class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-white overflow-hidden">
        
        <!-- 全域 Loading 遮罩 -->
        <div id="loader" class="fixed inset-0 bg-white bg-opacity-90 z-[100] flex flex-col items-center justify-center hidden">
            <div class="w-16 h-16 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-brand font-bold text-lg" id="loaderText">載入中...</p>
        </div>

        <!-- 自訂對話框 Modal -->
        <div id="alertModal" class="fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-3xl p-6 w-full max-w-sm transform scale-95 transition-transform duration-300 shadow-2xl">
                <h3 id="alertTitle" class="text-xl font-bold mb-3 text-gray-800">提示</h3>
                <p id="alertMessage" class="text-gray-600 text-lg mb-6 leading-relaxed"></p>
                <div class="flex gap-3" id="alertButtons">
                    <button onclick="closeAlert()" class="btn-primary" id="alertBtnOk">確定</button>
                </div>
            </div>
        </div>

        <!-- 圖片放大燈箱 Lightbox -->
        <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-95 z-[110] flex items-center justify-center hidden flex-col">
            <div class="w-full flex justify-end p-4">
                <button onclick="closeLightbox()" class="text-white bg-gray-800 hover:bg-gray-700 rounded-full w-12 h-12 flex items-center justify-center text-2xl font-bold transition">×</button>
            </div>
            <img id="lightboxImg" src="" class="max-w-full max-h-[85vh] object-contain p-2 transform transition-transform duration-300" onclick="closeLightbox()">
        </div>

        <!-- 頁面區域 -->
        <div id="viewLogin" class="p-8 flex flex-col items-center justify-center min-h-screen bg-brand-light">
            <!-- 尊榮星級 LOGO (V1.1 加入咖啡與餐盤元素) -->
            <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-lg mb-6 border-4 border-brand p-4 relative">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-full h-full text-brand">
                    <!-- 杯子主體 -->
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 8v8a4 4 0 004 4h4a4 4 0 004-4V8H6z" />
                    <!-- 杯耳 -->
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 10h1a2 2 0 012 2v2a2 2 0 01-2 2h-1" />
                    <!-- 蓋子 -->
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14v-2a1 1 0 00-1-1H6a1 1 0 00-1 1v2z" />
                    <!-- 閃亮星星 (星級意象) -->
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v2m0 16v2m-8-10H2m20 0h-2m-2-6l-1.5 1.5M6 18l-1.5 1.5M18 18l1.5 1.5M6 6L4.5 4.5" opacity="0.3" />
                </svg>
                <!-- 小餐盤圖示裝飾 -->
                <div class="absolute -bottom-2 -right-2 bg-white rounded-full p-1.5 shadow border-2 border-brand">
                    <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 13h18M5 17h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-brand mb-1 text-center">星級點餐系統</h1>
            <div class="bg-brand text-white px-3 py-1 rounded-full text-sm font-bold tracking-widest shadow-sm mb-8">V 1.1</div>
            
            <div class="w-full space-y-5 bg-white p-6 rounded-3xl shadow-md">
                <div>
                    <label class="block text-gray-700 text-lg font-bold mb-2">帳號</label>
                    <input type="text" id="loginUser" class="w-full text-lg bg-gray-50" placeholder="請輸入帳號">
                </div>
                <div>
                    <label class="block text-gray-700 text-lg font-bold mb-2">密碼</label>
                    <input type="password" id="loginPass" class="w-full text-lg bg-gray-50" placeholder="請輸入密碼">
                </div>
                <div>
                    <label class="block text-gray-700 text-lg font-bold mb-2">姓名 <span class="text-sm font-normal text-gray-400">(選填)</span></label>
                    <input type="text" id="loginName" class="w-full text-lg bg-gray-50" placeholder="您的稱呼">
                </div>
                <button onclick="doLogin()" class="btn-primary mt-6 shadow-lg">優雅登入</button>
            </div>
        </div>

        <!-- 主視圖容器 (登入後) -->
        <div id="viewMain" class="hidden min-h-screen bg-gray-50 flex flex-col">
            <!-- Header -->
            <header class="bg-brand text-white p-5 rounded-b-3xl shadow-md z-10 sticky top-0">
                <div class="flex justify-between items-start">
                    <div id="greetingText" class="leading-snug">
                        <!-- 動態雞湯問候語將會在這裡生成 -->
                    </div>
                    <button onclick="logout()" class="bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full p-2 transition flex items-center justify-center mt-1">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </header>

            <!-- 內容區 -->
            <main id="mainContent" class="flex-1 p-4 pb-24 overflow-y-auto"></main>

            <!-- 底部導覽列 -->
            <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full max-w-md flex justify-around pb-safe pt-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40">
                <button onclick="switchTab('menu')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition" id="nav-menu">
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <span class="text-sm font-bold">點餐</span>
                </button>
                <button onclick="switchTab('cart')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand relative transition" id="nav-cart">
                    <span id="cartBadge" class="absolute top-1 right-[25%] bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center hidden shadow">0</span>
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="text-sm font-bold">購物車</span>
                </button>
                <button onclick="switchTab('orders')" class="flex flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition" id="nav-orders">
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    <span class="text-sm font-bold">我的訂單</span>
                </button>
                <button onclick="switchTab('admin')" class="hidden flex-col items-center p-2 w-full text-gray-400 hover:text-brand transition" id="nav-admin">
                    <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="text-sm font-bold">店長室</span>
                </button>
            </nav>
        </div>

        <!-- 客製化選項 Modal (滑出) -->
        <div id="configModal" class="fixed inset-0 bg-black bg-opacity-60 z-[90] flex items-end justify-center hidden opacity-0 transition-opacity">
            <div class="bg-white w-full max-w-md rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_20px_rgba(0,0,0,0.1)]" id="configModalContent">
                <div class="flex justify-between items-start mb-4 border-b pb-4">
                    <div>
                        <h3 class="text-2xl font-black text-gray-800" id="cfgName">品項名稱</h3>
                        <p class="text-brand font-bold text-xl mt-1" id="cfgPriceBase">$0</p>
                    </div>
                    <button onclick="closeConfig()" class="bg-gray-100 rounded-full p-2 text-gray-500 hover:bg-gray-200 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <div id="cfgOptions" class="space-y-5 max-h-[55vh] overflow-y-auto no-scrollbar pb-4">
                    <!-- 動態選項產生區 -->
                </div>

                <div class="mt-4 pt-4 border-t flex items-center gap-4">
                    <div class="flex items-center bg-gray-100 rounded-2xl p-1 shadow-inner">
                        <button onclick="adjQty(-1)" class="w-12 h-12 rounded-xl bg-white shadow-sm text-2xl font-bold text-gray-600 active:scale-95 transition">-</button>
                        <span id="cfgQty" class="w-12 text-center text-xl font-black text-gray-800">1</span>
                        <button onclick="adjQty(1)" class="w-12 h-12 rounded-xl bg-white shadow-sm text-2xl font-bold text-gray-600 active:scale-95 transition">+</button>
                    </div>
                    <button onclick="confirmAddToCart()" class="btn-primary flex-1 py-4 text-xl flex justify-between items-center px-6">
                        <span>加入</span>
                        <span id="cfgTotal" class="font-black">$0</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 邏輯腳本 -->
    <script>
        // 🚨 替換成您的 Google Apps Script 網址
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZomnJRCpnTT6IJXXuCBdTlaqDhPITyt-2ACh8JZBz42rctAaAfYdpwNYgBtvzHXtNCQ/exec';
        
        // 全域狀態 (One-Call 核心)
        let state = {
            user: null,
            token: localStorage.getItem('sessionToken'),
            system: { isOpen: false, openedShops: [] },
            allShops: [], // 後端傳來的所有可用店家
            menuData: {},
            shopImages: {},
            userOrders: [],
            cart: [],
            currentTab: 'menu',
            activeShop: '',
            tempItem: null // 正在客製化的品項
        };

        // --- UI 元件函式 ---
        function showLoading(text = '處理中...') {
            document.getElementById('loaderText').innerText = text;
            document.getElementById('loader').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loader').classList.add('hidden');
        }
        
        // 進階 Modal 控制
        function showAlert(msg, title = '提示', buttons = [{text: '確定', primary: true, action: 'closeAlert()'}]) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerHTML = msg;
            
            const btnContainer = document.getElementById('alertButtons');
            btnContainer.innerHTML = '';
            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.className = b.primary ? 'btn-primary flex-1' : 'btn-secondary flex-1';
                btn.innerText = b.text;
                btn.onclick = () => { eval(b.action); };
                btnContainer.appendChild(btn);
            });

            const modal = document.getElementById('alertModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95');
            }, 10);
        }

        function closeAlert() {
            const modal = document.getElementById('alertModal');
            modal.classList.add('opacity-0');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function showLightbox(url) {
            if(!url) return showAlert('店長尚未上傳菜單圖片。', '查無圖片');
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.remove('hidden');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
            document.getElementById('lightboxImg').src = '';
        }

        // --- API 通訊 ---
        async function apiCall(action, data = {}) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, token: state.token, data })
                });
                const res = await response.json();
                if (res.status === 'error') {
                    if (res.message.includes('過期')) logout();
                    throw new Error(res.message);
                }
                return res.data;
            } catch (error) {
                showAlert(error.message, '發生錯誤');
                return null;
            }
        }

        // --- 登入與初始化 ---
        async function init() {
            if (state.token) {
                showLoading('喚醒系統中...');
                const initialData = await apiCall('getInitialData');
                hideLoading();
                if (initialData) {
                    const savedUser = JSON.parse(localStorage.getItem('userMeta'));
                    if(savedUser) {
                        state.user = savedUser;
                        applyInitialData(initialData);
                        renderApp();
                    } else {
                        logout();
                    }
                }
            }
        }

        async function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const name = document.getElementById('loginName').value.trim();
            
            if (!username || !password) return showAlert('請輸入完整的帳號與密碼。', '資料不全');
            
            showLoading('驗證身分中...');
            const res = await apiCall('login', { username, password, name });
            hideLoading();
            
            if (res) {
                state.token = res.token;
                state.user = res.user;
                localStorage.setItem('sessionToken', res.token);
                localStorage.setItem('userMeta', JSON.stringify(res.user));
                applyInitialData(res.initialData);
                renderApp();
            }
        }

        function logout() {
            localStorage.removeItem('sessionToken');
            localStorage.removeItem('userMeta');
            location.reload();
        }

        function applyInitialData(data) {
            state.system = data.systemStatus;
            state.allShops = data.allShops || []; 
            state.menuData = data.menuData;
            state.shopImages = data.shopImages;
            state.userOrders = data.userOrders;
            // 確保 activeShop 合法
            if(state.system.openedShops.length > 0 && !state.system.openedShops.includes(state.activeShop)) {
                state.activeShop = state.system.openedShops[0];
            }
        }

        // --- 視圖渲染切換 ---
        function renderApp() {
            document.getElementById('viewLogin').classList.add('hidden');
            document.getElementById('viewMain').classList.remove('hidden');
            
            // 設定心靈雞湯問候語 (V1.1)
            const hour = new Date().getHours();
            const roleStr = state.user.role === '管理' ? '店長' : '老師';
            const nameStr = `<span class="text-2xl font-bold">${state.user.name} ${roleStr}</span>`;
            let greeting = '';
            
            if (hour >= 5 && hour < 11) {
                const msgs = ['美好的一天開始了，來杯咖啡提神吧！', '早安！吃頓豐盛的早餐，迎接活力的一天！', '早安！點份美味餐點，開啟順心的一天！'];
                greeting = `<p class="text-sm opacity-90 mb-1">早安，</p>${nameStr}<p class="text-sm font-medium text-brand-light mt-1.5">${msgs[Math.floor(Math.random()*msgs.length)]}</p>`;
            } else if (hour >= 11 && hour < 14) {
                const msgs = ['午餐時間到囉！吃飽飽才有力氣繼續奮鬥！', '工作辛苦了，來點美味的午餐犒賞自己吧！', '來個活力滿滿的午餐吧！'];
                greeting = `<p class="text-sm opacity-90 mb-1">午安，</p>${nameStr}<p class="text-sm font-medium text-brand-light mt-1.5">${msgs[Math.floor(Math.random()*msgs.length)]}</p>`;
            } else if (hour >= 14 && hour < 18) {
                const msgs = ['下午茶時間！點份甜點補充能量吧！', '稍作休息，喝杯飲料轉換一下心情。'];
                greeting = `<p class="text-sm opacity-90 mb-1">午安，</p>${nameStr}<p class="text-sm font-medium text-brand-light mt-1.5">${msgs[Math.floor(Math.random()*msgs.length)]}</p>`;
            } else {
                const msgs = ['夜深了，來份宵夜暖暖胃吧！', '辛苦了一整天，好好享用豐盛的晚餐吧！'];
                greeting = `<p class="text-sm opacity-90 mb-1">晚安，</p>${nameStr}<p class="text-sm font-medium text-brand-light mt-1.5">${msgs[Math.floor(Math.random()*msgs.length)]}</p>`;
            }
            document.getElementById('greetingText').innerHTML = greeting;

            if (state.user.role === '管理') {
                document.getElementById('nav-admin').classList.remove('hidden');
                document.getElementById('nav-admin').classList.add('flex');
            }
            
            switchTab('menu');
        }

        function switchTab(tab) {
            state.currentTab = tab;
            // 更新導覽列顏色
            ['menu', 'cart', 'orders', 'admin'].forEach(t => {
                const el = document.getElementById(`nav-${t}`);
                if(el) {
                    if(t === tab) {
                        el.classList.remove('text-gray-400');
                        el.classList.add('text-brand');
                    } else {
                        el.classList.remove('text-brand');
                        el.classList.add('text-gray-400');
                    }
                }
            });

            const content = document.getElementById('mainContent');
            content.innerHTML = ''; // 清空

            if (tab === 'menu') renderMenuTab(content);
            else if (tab === 'cart') renderCartTab(content);
            else if (tab === 'orders') renderOrdersTab(content);
            else if (tab === 'admin' && state.user.role === '管理') renderAdminTab(content);
            
            window.scrollTo(0,0);
        }

        // --- 點餐模組 (Tab: Menu) ---
        function renderMenuTab(container) {
            if (!state.system.isOpen) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-gray-500 mt-10">
                        <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mb-6 shadow-inner">
                            <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <p class="text-2xl font-black text-gray-700">目前未開放點餐</p>
                        <p class="text-lg mt-2 font-medium">請等候店長開團通知</p>
                    </div>`;
                return;
            }

            if (state.system.openedShops.length === 0) {
                 container.innerHTML = `<p class="text-center text-xl text-gray-500 mt-10 font-bold">今日尚無安排店家</p>`;
                 return;
            }

            // 店家 Tab
            let html = `<div class="flex overflow-x-auto space-x-3 pb-3 mb-2 pt-2 no-scrollbar px-1">`;
            state.system.openedShops.forEach(shop => {
                const activeCls = shop === state.activeShop ? 'bg-brand text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50';
                html += `<button onclick="state.activeShop='${shop}'; switchTab('menu')" class="whitespace-nowrap px-6 py-2.5 rounded-full font-bold text-lg transition border ${activeCls}">${shop}</button>`;
            });
            html += `</div>`;

            // 店家菜單圖片 (縮圖)
            const shopImg = state.shopImages[state.activeShop];
            if(shopImg) {
                html += `
                <div class="mb-5 rounded-2xl overflow-hidden shadow-sm relative cursor-pointer group border border-gray-100 bg-white" onclick="showLightbox('${shopImg}')">
                    <div class="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <span class="bg-white text-brand px-5 py-2 rounded-full font-bold shadow-lg flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                            放大菜單
                        </span>
                    </div>
                    <img src="${shopImg}" class="w-full h-36 object-cover" alt="菜單預覽">
                </div>`;
            }

            // 管理員代點輸入框
            if(state.user.role === '管理') {
                html += `
                <div class="mb-5 bg-brand-light p-4 rounded-2xl border border-green-200 flex flex-col gap-2 shadow-inner">
                    <label class="font-bold text-brand text-sm flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        代點模式 (管理員專屬)
                    </label>
                    <input type="text" id="proxyNameInput" class="w-full p-3 rounded-xl border-none focus:ring-2 focus:ring-brand bg-white font-bold text-lg" placeholder="輸入代點姓名 (留空則為自己)">
                </div>`;
            }

            // 菜單清單
            const menu = state.menuData[state.activeShop] || [];
            let currentCategory = '';
            
            html += `<div class="space-y-4 pb-6">`;
            menu.forEach((item, idx) => {
                // 找出價格屬性
                const ignoreKeys = ['類別', '品項', '甜度選項', '冰塊選項', '口味與客製化', '附餐飲料'];
                const priceKeys = Object.keys(item).filter(k => !ignoreKeys.includes(k) && item[k] !== '');
                
                let displayPrice = '';
                if(item['單價']) displayPrice = `$${item['單價']}`;
                else if (priceKeys.length > 0) displayPrice = `自 $${item[priceKeys[0]]} 起`;

                if (item['類別'] !== currentCategory) {
                    currentCategory = item['類別'];
                    html += `<h3 class="text-xl font-black text-gray-800 mt-8 mb-3 pl-3 border-l-4 border-brand">${currentCategory}</h3>`;
                }

                html += `
                <div class="card flex justify-between items-center cursor-pointer hover:border-brand transition-colors p-4" onclick="openConfigModal(${idx})">
                    <div class="pr-4">
                        <h4 class="text-lg font-bold text-gray-800 leading-tight">${item['品項']}</h4>
                        <p class="text-brand font-black mt-2 text-lg">${displayPrice}</p>
                    </div>
                    <button class="bg-gray-100 text-brand rounded-full w-12 h-12 flex-shrink-0 flex items-center justify-center font-bold text-2xl hover:bg-brand-light transition shadow-sm">+</button>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        // --- 客製化 Modal (大小、甜度、冰塊) ---
        function openConfigModal(itemIndex) {
            const item = state.menuData[state.activeShop][itemIndex];
            state.tempItem = {
                shop: state.activeShop,
                name: item['品項'],
                basePrice: 0, 
                selectedSizeName: '',
                selections: {}, 
                quantity: 1,
                name_override: '' 
            };

            // 如果有代點輸入框，抓取其值
            if(state.user.role === '管理') {
                const proxyInput = document.getElementById('proxyNameInput');
                if(proxyInput && proxyInput.value.trim() !== '') {
                    state.tempItem.name_override = proxyInput.value.trim();
                }
            }

            document.getElementById('cfgName').innerText = state.tempItem.name;
            document.getElementById('cfgQty').innerText = '1';
            
            const cfgOptions = document.getElementById('cfgOptions');
            let optionsHtml = '';

            // 1. 分析大小與價格
            const ignoreKeys = ['類別', '品項', '甜度選項', '冰塊選項', '口味與客製化', '附餐飲料'];
            const sizeKeys = Object.keys(item).filter(k => !ignoreKeys.includes(k) && item[k] !== '');
            
            if (sizeKeys.length > 0) {
                optionsHtml += buildRadioGroup('選擇規格', 'size', sizeKeys.map(k => ({ label: k, price: parseInt(item[k]) || 0 })));
                state.tempItem.selectedSizeName = sizeKeys[0];
                state.tempItem.basePrice = parseInt(item[sizeKeys[0]]) || 0;
            }

            // 2. 甜度選項
            if (item['甜度選項'] && item['甜度選項'] !== '甜度固定') {
                const opts = item['甜度選項'].split('/');
                optionsHtml += buildRadioGroup('甜度', 'sweet', opts.map(o => ({label: o})));
                state.tempItem.selections['sweet'] = opts[0];
            } else if (item['甜度選項'] === '甜度固定') {
                state.tempItem.selections['sweet'] = '甜度固定';
            }

            // 3. 冰塊選項
            if (item['冰塊選項'] && !item['冰塊選項'].includes('固定')) {
                const opts = item['冰塊選項'].split('/');
                optionsHtml += buildRadioGroup('冰塊/溫度', 'ice', opts.map(o => ({label: o})));
                state.tempItem.selections['ice'] = opts[0];
            } else if (item['冰塊選項'] && item['冰塊選項'].includes('固定')) {
                state.tempItem.selections['ice'] = item['冰塊選項'];
            }

            // 4. 口味與客製化 (例如飯/麵, +$加價)
            if (item['口味與客製化']) {
                 const opts = item['口味與客製化'].split('/');
                 const parsedOpts = opts.map(o => {
                     const match = o.match(/(.*?)\+\$(\d+)/);
                     if(match) return { label: match[1], price: parseInt(match[2]) };
                     return { label: o };
                 });
                 optionsHtml += buildRadioGroup('客製化選擇', 'custom', parsedOpts);
                 state.tempItem.selections['custom'] = parsedOpts[0].label;
                 if(parsedOpts[0].price) state.tempItem._customPrice = parsedOpts[0].price;
            }

            // 5. 附餐飲料 (丹丹特有邏輯: 可樂(大)+5)
            if (item['附餐飲料']) {
                const opts = item['附餐飲料'].split('/');
                const parsedOpts = opts.map(o => {
                    const match = o.match(/(.*?)\+(\d+)/);
                    if(match) return { label: match[1], price: parseInt(match[2]) };
                    return { label: o };
                });
                
                optionsHtml += `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <h5 class="font-bold text-gray-800 text-lg mb-3 flex items-center gap-2">
                        <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        選擇附餐飲料
                    </h5>
                    <div class="relative">
                        <select id="cfg-drink" class="w-full text-lg p-4 font-bold bg-white appearance-none border border-gray-300 rounded-xl focus:ring-brand focus:border-brand shadow-sm pr-10" onchange="updateCfgSelection('drink', this.value)">
                            ${parsedOpts.map((p, i) => `<option value="${i}">${p.price ? '(+$'+p.price+') ' : ''}${p.label}</option>`).join('')}
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>`;
                state.tempItem.selections['drink'] = parsedOpts[0].label;
                state.tempItem._drinkOptions = parsedOpts; 
            }

            cfgOptions.innerHTML = optionsHtml;
            updateCfgTotal();

            const modal = document.getElementById('configModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('configModalContent').classList.remove('translate-y-full');
            }, 10);
        }

        function buildRadioGroup(title, groupName, options) {
            let html = `
            <div class="mb-2">
                <h5 class="font-bold text-gray-800 text-lg mb-3">${title}</h5>
                <div class="flex flex-wrap gap-2.5">`;
            options.forEach((opt, idx) => {
                const checked = idx === 0 ? 'bg-brand text-white border-brand shadow-md' : 'bg-white text-gray-700 border-gray-300';
                const priceTxt = opt.price ? `<span class="text-sm opacity-80 ml-1">(+$${opt.price})</span>` : '';
                html += `
                <button id="btn-${groupName}-${idx}" 
                    onclick="updateCfgSelection('${groupName}', ${idx}, '${opt.label}', ${opt.price||0}, ${options.length})"
                    class="border-2 rounded-xl px-5 py-2.5 font-bold text-lg transition-all active:scale-95 flex items-center justify-center ${checked}">
                    ${opt.label} ${priceTxt}
                </button>`;
            });
            html += `</div></div>`;
            return html;
        }

        function updateCfgSelection(group, idx, label, price, totalOpts) {
            if (group === 'drink') {
                const opt = state.tempItem._drinkOptions[idx];
                state.tempItem.selections['drink'] = opt.label;
                state.tempItem._drinkPrice = opt.price || 0;
            } else {
                // Radio Buttons
                for(let i=0; i<totalOpts; i++){
                    const btn = document.getElementById(`btn-${group}-${i}`);
                    if(btn) {
                        btn.classList.remove('bg-brand', 'text-white', 'border-brand', 'shadow-md');
                        btn.classList.add('bg-white', 'text-gray-700', 'border-gray-300');
                    }
                }
                const activeBtn = document.getElementById(`btn-${group}-${idx}`);
                activeBtn.classList.add('bg-brand', 'text-white', 'border-brand', 'shadow-md');
                activeBtn.classList.remove('bg-white', 'text-gray-700', 'border-gray-300');

                if (group === 'size') {
                    state.tempItem.selectedSizeName = label;
                    state.tempItem.basePrice = price;
                } else {
                    state.tempItem.selections[group] = label;
                    if(group === 'custom') state.tempItem._customPrice = price || 0;
                }
            }
            updateCfgTotal();
        }

        function adjQty(delta) {
            state.tempItem.quantity += delta;
            if (state.tempItem.quantity < 1) state.tempItem.quantity = 1;
            document.getElementById('cfgQty').innerText = state.tempItem.quantity;
            updateCfgTotal();
        }

        function updateCfgTotal() {
            let unitPrice = state.tempItem.basePrice 
                          + (state.tempItem._drinkPrice || 0)
                          + (state.tempItem._customPrice || 0);
            
            let total = unitPrice * state.tempItem.quantity;
            document.getElementById('cfgPriceBase').innerText = `$${unitPrice}`;
            document.getElementById('cfgTotal').innerText = `$${total}`;
        }

        function closeConfig() {
            const modal = document.getElementById('configModal');
            document.getElementById('configModalContent').classList.add('translate-y-full');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function confirmAddToCart() {
            let specArr = [];
            if(state.tempItem.selectedSizeName && state.tempItem.selectedSizeName !== '單價') specArr.push(state.tempItem.selectedSizeName);
            if(state.tempItem.selections.sweet) specArr.push(state.tempItem.selections.sweet);
            if(state.tempItem.selections.ice) specArr.push(state.tempItem.selections.ice);
            if(state.tempItem.selections.custom) specArr.push(state.tempItem.selections.custom);
            if(state.tempItem.selections.drink) specArr.push(`附:${state.tempItem.selections.drink}`);

            let unitPrice = state.tempItem.basePrice 
                          + (state.tempItem._drinkPrice || 0)
                          + (state.tempItem._customPrice || 0);

            const cartItem = {
                shop: state.tempItem.shop,
                name: state.tempItem.name,
                spec: specArr.join(' / '),
                price: unitPrice,
                quantity: state.tempItem.quantity,
                name_override: state.tempItem.name_override
            };

            state.cart.push(cartItem);
            updateCartBadge();
            closeConfig();
            
            if (navigator.vibrate) navigator.vibrate(50);
            showAlert(`已將 <b>${cartItem.name}</b> 加入購物車。`, '加入成功');
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (state.cart.length > 0) {
                badge.innerText = state.cart.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // --- 購物車模組 (Tab: Cart) ---
        function renderCartTab(container) {
            if (state.cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-gray-500 mt-10">
                        <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mb-6 shadow-inner">
                            <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        </div>
                        <p class="text-2xl font-black text-gray-700">購物車是空的</p>
                    </div>`;
                return;
            }

            let html = `<h2 class="text-2xl font-black text-gray-800 mb-6 pl-2 border-l-4 border-brand">確認餐點清單</h2><div class="space-y-4 pb-6">`;
            let grandTotal = 0;

            state.cart.forEach((item, idx) => {
                const subTotal = item.price * item.quantity;
                grandTotal += subTotal;
                const nameTag = item.name_override ? `<span class="bg-yellow-100 text-yellow-800 text-sm px-2 py-1 rounded ml-2 font-bold shadow-sm">代: ${item.name_override}</span>` : '';
                
                html += `
                <div class="card relative pr-12 border border-gray-200 p-5">
                    <button onclick="removeFromCart(${idx})" class="absolute top-1/2 -translate-y-1/2 right-4 text-red-500 hover:bg-red-50 p-2 rounded-full transition bg-white shadow-sm border border-red-100">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <p class="text-sm font-bold text-white bg-brand px-2 py-0.5 rounded inline-block mb-2">${item.shop}</p>
                    <h4 class="text-xl font-bold text-gray-800 leading-tight">${item.name} ${nameTag}</h4>
                    <p class="text-gray-500 text-base mt-1.5 leading-snug">${item.spec}</p>
                    <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
                        <p class="font-bold text-gray-500 text-lg">$${item.price} <span class="mx-1 text-sm">x</span> ${item.quantity}</p>
                        <p class="font-black text-brand text-2xl">$${subTotal}</p>
                    </div>
                </div>`;
            });

            html += `
                </div>
                <div class="bg-brand-light rounded-3xl p-6 border border-brand mt-2 shadow-sm">
                    <div class="flex justify-between items-end mb-6">
                        <span class="text-gray-700 font-bold text-lg">總計金額</span>
                        <span class="text-4xl font-black text-brand">$${grandTotal}</span>
                    </div>
                    <button onclick="submitOrder()" class="btn-primary py-4 text-2xl shadow-lg flex justify-center items-center gap-2">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        確認送出訂單
                    </button>
                </div>`;
            container.innerHTML = html;
        }

        function removeFromCart(idx) {
            showAlert('確定要移除此項餐點嗎？', '移除確認', [
                { text: '取消', primary: false, action: 'closeAlert()' },
                { text: '移除', primary: true, action: `executeRemove(${idx})` }
            ]);
        }
        function executeRemove(idx) {
            closeAlert();
            state.cart.splice(idx, 1);
            updateCartBadge();
            renderCartTab(document.getElementById('mainContent'));
        }

        async function submitOrder() {
            showLoading('正在送出您的訂單...');
            const res = await apiCall('submitOrder', state.cart);
            if (res) {
                state.cart = []; 
                updateCartBadge();
                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                hideLoading();
                showAlert('訂單已成功送出！您可以在「我的訂單」查看。', '點餐成功');
                switchTab('orders');
            } else {
                hideLoading();
            }
        }

        // --- 我的訂單 (Tab: Orders) ---
        function renderOrdersTab(container) {
            if (state.userOrders.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-gray-500 mt-10">
                        <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mb-6 shadow-inner">
                            <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        </div>
                        <p class="text-2xl font-black text-gray-700">今日尚無訂單紀錄</p>
                    </div>`;
                return;
            }

            let html = `<h2 class="text-2xl font-black text-gray-800 mb-6 pl-2 border-l-4 border-brand">今日訂單紀錄</h2><div class="space-y-4 pb-6">`;
            let grandTotal = 0;

            state.userOrders.forEach(order => {
                grandTotal += parseInt(order['小計']);
                const statusColor = order['繳費狀態'] === '已繳費' ? 'text-green-700 bg-green-100 border-green-200' : 'text-orange-700 bg-orange-100 border-orange-200';
                
                const deleteBtn = state.system.isOpen ? 
                    `<button onclick="confirmDeleteOrder('${order['訂單編號']}')" class="text-sm text-red-500 border border-red-500 px-4 py-1.5 rounded-full hover:bg-red-50 transition active:scale-95 font-bold">取消</button>` : '';

                html += `
                <div class="card p-5 border border-gray-200">
                    <div class="flex justify-between items-start mb-3">
                        <p class="text-sm font-bold text-brand bg-brand-light px-2 py-1 rounded">${order['店家']}</p>
                        <span class="text-sm font-bold px-3 py-1 rounded-full border ${statusColor}">${order['繳費狀態']}</span>
                    </div>
                    <h4 class="text-xl font-bold text-gray-800 mb-1 leading-tight">${order['品項']}</h4>
                    <p class="text-gray-500 text-base leading-snug">${order['規格']}</p>
                    <div class="flex justify-between items-end mt-4 pt-4 border-t border-gray-50">
                        <div class="flex items-center gap-2">
                            <span class="text-gray-500">數量</span>
                            <span class="font-black text-xl text-gray-700">${order['數量']}</span>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <p class="font-black text-2xl text-brand">$${order['小計']}</p>
                            ${deleteBtn}
                        </div>
                    </div>
                </div>`;
            });

            html += `
                </div>
                <div class="mt-2 text-right bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <p class="text-gray-500 text-lg font-bold mb-1">今日應繳總額</p>
                    <p class="text-5xl font-black text-brand">$${grandTotal}</p>
                </div>`;
            container.innerHTML = html;
        }

        function confirmDeleteOrder(orderId) {
            showAlert('確定要取消這筆已送出的訂單嗎？', '取消確認', [
                { text: '保留', primary: false, action: 'closeAlert()' },
                { text: '確定取消', primary: true, action: `executeDeleteOrder('${orderId}')` }
            ]);
        }

        async function executeDeleteOrder(orderId) {
            closeAlert();
            showLoading('正在刪除訂單...');
            const res = await apiCall('deleteOrder', { orderId });
            if (res) {
                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                hideLoading();
                showAlert('該筆訂單已成功取消。', '完成');
                switchTab('orders');
            } else {
                hideLoading();
            }
        }

        // --- 管理員專區 (Tab: Admin) ---
        function renderAdminTab(container) {
            let shopChecksHtml = '';
            state.allShops.forEach(shop => {
                const isChecked = state.system.openedShops.includes(shop) ? 'checked' : '';
                shopChecksHtml += `
                <label class="flex items-center space-x-3 p-4 bg-gray-50 border border-gray-200 rounded-2xl cursor-pointer hover:bg-brand-light hover:border-brand transition shadow-sm">
                    <input type="checkbox" value="${shop}" class="shop-checkbox w-6 h-6 text-brand rounded border-gray-300 focus:ring-brand" ${isChecked}>
                    <span class="text-lg font-black text-gray-700">${shop}</span>
                </label>`;
            });
            if(state.allShops.length === 0) shopChecksHtml = `<p class="text-gray-500 font-bold p-4 bg-gray-100 rounded-xl text-center">尚未建立任何店家</p>`;

            let html = `
            <div class="space-y-6 pb-20">
                <h2 class="text-2xl font-black text-gray-800 pl-2 border-l-4 border-brand mb-6">店長控制中心</h2>
                
                <!-- 開團設定 -->
                <div class="card p-6 border-2 ${state.system.isOpen ? 'border-brand shadow-lg' : 'border-gray-200'}">
                    <h3 class="text-xl font-bold mb-5 flex items-center justify-between">
                        <span class="text-gray-800">今日開團設定</span>
                        <span class="text-sm px-4 py-1.5 rounded-full font-bold shadow-sm border ${state.system.isOpen ? 'bg-green-100 text-green-800 border-green-200' : 'bg-gray-100 text-gray-600 border-gray-300'}">
                            ${state.system.isOpen ? '🟢 營業中' : '⚫ 已打烊'}
                        </span>
                    </h3>
                    
                    <div class="mb-5">
                        <label class="block text-gray-600 font-bold mb-3 text-lg">勾選開放店家：</label>
                        <div class="grid grid-cols-2 gap-3">
                            ${shopChecksHtml}
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-6">
                        <button onclick="saveAdminSettings(true)" class="flex-1 bg-brand text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-green-800 text-lg transition active:scale-95">開啟點餐</button>
                        <button onclick="saveAdminSettings(false)" class="flex-1 bg-gray-200 text-gray-700 font-bold py-4 rounded-2xl shadow hover:bg-gray-300 text-lg transition active:scale-95">關閉點餐</button>
                    </div>
                </div>

                <!-- 統計與打烊 -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="openDashboard()" class="card flex flex-col items-center justify-center py-8 hover:bg-brand-light transition group border border-gray-200 shadow-sm active:scale-95">
                        <div class="w-16 h-16 bg-brand text-white rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform shadow-md">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <span class="font-bold text-gray-800 text-lg">統計報表</span>
                    </button>
                    <button onclick="confirmCloseAll()" class="card flex flex-col items-center justify-center py-8 hover:bg-red-50 transition group border border-gray-200 shadow-sm active:scale-95">
                        <div class="w-16 h-16 bg-red-500 text-white rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform shadow-md">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </div>
                        <span class="font-bold text-gray-800 text-lg">一鍵打烊封存</span>
                    </button>
                </div>

                <!-- 進階設定 (編輯菜單連結) -->
                <div class="card border border-gray-200 p-6 bg-gray-50">
                    <h3 class="text-xl font-bold mb-2 flex items-center gap-2 text-gray-800">
                        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        進階設定
                    </h3>
                    <p class="text-gray-500 mb-5 text-sm font-bold">更新各店家線上的菜單圖片連結。</p>
                    <select id="advShopSelect" class="w-full mb-4 text-lg p-3 font-bold text-gray-700 bg-white border border-gray-300 rounded-xl focus:ring-brand focus:border-brand shadow-sm" onchange="advShopChanged()">
                        <option value="">-- 請選擇欲更新的店家 --</option>
                        ${state.allShops.map(s => `<option value="${s}">${s}</option>`).join('')}
                    </select>
                    <input type="text" id="advImageUrl" placeholder="請貼上新的圖片網址 (https://...)" class="w-full mb-5 text-base font-mono border-gray-300">
                    <button onclick="executeImgUpdate()" class="btn-outline w-full text-lg py-3 bg-white shadow-sm hover:shadow">更新線上圖片</button>
                </div>
            </div>`;
            container.innerHTML = html;
        }

        async function saveAdminSettings(isOpen) {
            const checkboxes = document.querySelectorAll('.shop-checkbox');
            const selectedShops = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            
            showLoading('更新系統設定中...');
            const res = await apiCall('adminUpdateSystemSettings', { isOpen, openedShops: selectedShops });
            if (res) {
                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                hideLoading();
                showAlert(`系統已切換為：<b>${isOpen ? '開放點餐' : '關閉點餐'}</b>`, '設定成功');
                renderAdminTab(document.getElementById('mainContent'));
            } else {
                hideLoading();
            }
        }

        // --- 進階設定 API (更新圖片) ---
        function advShopChanged() {
            const shop = document.getElementById('advShopSelect').value;
            const imgInput = document.getElementById('advImageUrl');
            if(shop && state.shopImages[shop]) {
                imgInput.value = state.shopImages[shop];
            } else {
                imgInput.value = '';
            }
        }

        async function executeImgUpdate() {
            const shop = document.getElementById('advShopSelect').value;
            const imageUrl = document.getElementById('advImageUrl').value.trim();
            if(!shop) return showAlert('請先在上方選擇要修改的店家。', '資料缺失');
            
            showLoading('上傳更新中...');
            const res = await apiCall('adminUpdateShopImage', { shop, imageUrl });
            hideLoading();
            if(res) {
                state.shopImages[shop] = imageUrl; 
                showAlert(res, '更新成功');
            }
        }

        // --- 管理員儀表板 ---
        async function openDashboard() {
            showLoading('產製報表中...');
            const data = await apiCall('adminGetTodayData');
            hideLoading();
            if(!data) return;

            let html = `
            <div class="mb-6 flex items-center justify-between pb-4 border-b border-gray-200">
                <button onclick="switchTab('admin')" class="text-brand font-bold flex items-center bg-brand-light px-3 py-1.5 rounded-full hover:bg-green-200 transition">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 
                    返回
                </button>
                <h2 class="text-2xl font-black text-gray-800">今日報表</h2>
            </div>`;

            // 店家彙整 (打電話用)
            html += `<h3 class="text-xl font-black mt-2 mb-4 px-3 border-l-4 border-brand text-gray-800">外送備餐總表</h3>`;
            if (Object.keys(data.summaryByShop).length === 0) {
                html += `<p class="text-gray-500 mb-6 font-bold">今日尚無訂單資料</p>`;
            } else {
                for (const shop in data.summaryByShop) {
                    html += `<div class="card mb-5 border border-gray-200 p-5">
                        <h4 class="font-black text-lg text-white mb-3 bg-gray-800 inline-block px-4 py-1.5 rounded-xl shadow-sm">${shop}</h4>
                        <ul class="divide-y divide-gray-100">`;
                    for (const item in data.summaryByShop[shop]) {
                        html += `<li class="py-3 flex justify-between items-center text-lg text-gray-800">
                                    <span class="font-bold leading-tight flex-1 pr-4">${item}</span>
                                    <span class="font-black text-2xl text-brand bg-brand-light px-3 py-1 rounded-lg">x${data.summaryByShop[shop][item]}</span>
                                 </li>`;
                    }
                    html += `</ul></div>`;
                }
            }

            // 收費點名單
            html += `<h3 class="text-xl font-black mt-8 mb-4 px-3 border-l-4 border-brand text-gray-800">財務與發餐表</h3>`;
            let totalRevenue = 0;
            
            data.summaryByUser.forEach(user => {
                totalRevenue += user.total;
                const paidCls = user.paid ? 'bg-green-50 text-green-800 border-green-300' : 'bg-red-50 text-red-700 border-red-300';
                html += `
                <div class="card mb-4 border-2 p-5 ${paidCls}">
                    <div class="flex justify-between items-center mb-3 pb-3 border-b ${user.paid ? 'border-green-200' : 'border-red-200'}">
                        <span class="text-xl font-black">${user.name}</span>
                        <span class="text-3xl font-black">$${user.total}</span>
                    </div>
                    <div class="text-base text-gray-700 mb-4 font-medium leading-relaxed">
                        ${user.orders.map(o => `
                            <div class="flex justify-between">
                                <span>${o['店家']} - ${o['品項']}</span>
                                <span class="font-black text-gray-900 ml-2">x${o['數量']}</span>
                            </div>`).join('')}
                    </div>
                    <button onclick="updateOrderStatus('${user.orders.map(o=>o['訂單編號']).join(',')}', 'pay', '${user.paid ? '未繳費' : '已繳費'}')" class="w-full py-3 rounded-xl shadow-sm text-lg font-black transition active:scale-95 ${user.paid ? 'bg-white text-gray-600 border border-gray-300' : 'bg-red-600 text-white shadow-md'}">
                        ${user.paid ? '取消已收' : '確認收錢'}
                    </button>
                </div>`;
            });

            html += `<div class="mt-8 text-right bg-white p-6 rounded-3xl shadow-sm border border-gray-200 mb-20">
                        <p class="text-gray-500 text-lg font-bold mb-1">今日預計總收入</p>
                        <p class="text-5xl font-black text-brand">$${totalRevenue}</p>
                     </div>`;
            
            document.getElementById('mainContent').innerHTML = html;
        }

        async function updateOrderStatus(orderIdsStr, type, status) {
            const orderIds = orderIdsStr.split(',');
            showLoading('更新狀態...');
            const res = await apiCall('adminUpdateStatus', { orderIds, type, status });
            if (res) {
                openDashboard();
            } else {
                hideLoading();
            }
        }

        async function confirmCloseAll() {
            showAlert('<span class="text-red-600 font-black text-xl mb-2 block">危險操作確認</span>您確定要打烊並結清今日所有紀錄嗎？<br><br>這會關閉點餐系統，並將今日訂單移至歷史紀錄，此操作無法復原。', '打烊確認', [
                { text: '取消', primary: false, action: 'closeAlert()' },
                { text: '確定結清', primary: true, action: 'executeCloseAll()' }
            ]);
        }

        async function executeCloseAll() {
            closeAlert();
            showLoading('執行打烊與資料封存...');
            const res = await apiCall('adminCloseAndArchive');
            hideLoading();
            if(res) {
                const initialData = await apiCall('getInitialData');
                if(initialData) applyInitialData(initialData);
                showAlert('系統已順利打烊，資料已封存，為明天做好準備！', '作業完成');
                switchTab('admin');
            }
        }

        // --- 啟動程式 ---
        window.onload = init;
    </script>
</body>
</html>
